<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 聯盟風雲榜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🔥 正在為您計算聯盟排行榜...</div>
    </div>

    <div class="container">
        <div class="back-btn-container">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header" style="justify-content: center; text-align: center;">
            <h1 style="margin: 0; color: var(--theme-main);">🏆 全聯盟榮譽風雲榜</h1>
        </div>

        <h2 style="color:var(--theme-main); margin-top:30px; display:flex; align-items:center; gap:8px;">
            👑 勝利女神榜 <span style="font-size:12px; color:var(--text-muted); font-weight:normal;">(出賽≥5場)</span>
        </h2>
        <div id="winrate-list" class="dashboard" style="display:flex; flex-direction:column; gap:10px;"></div>

        <h2 style="color:#e67e22; margin-top:30px; display:flex; align-items:center; gap:8px;">
            🔥 鐵人全勤榜 <span style="font-size:12px; color:var(--text-muted); font-weight:normal;">(總出賽場數)</span>
        </h2>
        <div id="iron-list" class="dashboard" style="display:flex; flex-direction:column; gap:10px;"></div>

        <h2 style="color:#3498db; margin-top:30px; display:flex; align-items:center; gap:8px;">
            🌧️ 呼風喚雨榜 <span style="font-size:12px; color:var(--text-muted); font-weight:normal;">(最常遇到延賽)</span>
        </h2>
        <div id="rain-list" class="dashboard" style="display:flex; flex-direction:column; gap:10px;"></div>

    </div>

    <script src="app.js"></script>
    <script>
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initRanking() {
            try {
                const [scheduleData, matchesData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl), fetchCSV(CONFIG.girlsUrl)
                ]);

                // 1. 初始化女孩統計資料庫
                let girlStats = {};
                girlsData.forEach(g => {
                    const key = g.name.trim() + "_" + g.team.trim();
                    girlStats[key] = {
                        name: g.name.trim(), team: g.team.trim(), photo: g.photo ? g.photo.trim() : '',
                        wins: 0, losses: 0, delays: 0, games: 0
                    };
                });

                // 2. 核心運算：比對班表與賽程 (已升級終極防呆比對)
                scheduleData.forEach(s => {
                    const girlName = (s.girl_name || '').trim();
                    
                    // 跨表找隊伍，確保就算班表沒寫隊伍也不會漏掉
                    const girlInfo = girlsData.find(g => g.name && g.name.trim() === girlName);
                    const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team || '').trim();
                    
                    const key = girlName + "_" + girlTeam;
                    if(!girlStats[key]) return; 
                    
                    const sYearStr = s.year ? s.year.toString().trim() : '';

                    if(s.working_dates) {
                        const workList = parseWorkingDate(s.working_dates);
                        workList.forEach(w => {
                            // 拆解班表日期數字
                            const wNums = w.date ? w.date.match(/\d+/g) : null;
                            if (!wNums || wNums.length < 2) return;
                            const wMonth = parseInt(wNums[0], 10);
                            const wDay = parseInt(wNums[1], 10);

                            // 尋找對應日期的比賽結果
                            const match = matchesData.find(m => {
                                // 防呆年份與隊伍
                                const mYearStr = m.year ? m.year.toString().trim() : '';
                                if (sYearStr && mYearStr && sYearStr !== mYearStr) return false;
                                if (m.team && m.team.trim() !== girlTeam) return false;
                                
                                // 防呆日期 (數字吸塵器)
                                const mNums = m.date ? m.date.match(/\d+/g) : null;
                                if (mNums && mNums.length >= 2) {
                                    return parseInt(mNums[0], 10) === wMonth && parseInt(mNums[1], 10) === wDay;
                                }
                                return false;
                            });

                            // 計算勝負
                            if(match && match.result) {
                                const res = match.result.trim();
                                if(res === '勝') girlStats[key].wins++;
                                else if(res === '敗') girlStats[key].losses++;
                                else if(res === '延賽') girlStats[key].delays++;
                                
                                if(res === '勝' || res === '敗') girlStats[key].games++; // 有勝負才算有效出賽
                            }
                        });
                    }
                });

                let validGirls = Object.values(girlStats);

                // 👑 排行榜 1: 勝利女神 (勝率最高，且至少出賽 5 場防洗數據)
                let winRateList = validGirls.filter(g => g.games >= 5).map(g => {
                    g.winRate = (g.wins / g.games) * 100;
                    return g;
                }).sort((a,b) => b.winRate - a.winRate).slice(0, 10);

                // 🔥 排行榜 2: 鐵人全勤 (出賽場次最多)
                let ironList = validGirls.filter(g => g.games > 0).sort((a,b) => b.games - a.games).slice(0, 10);

                // 🌧️ 排行榜 3: 雨神降臨 (延賽次數最多)
                let rainList = validGirls.filter(g => g.delays > 0).sort((a,b) => b.delays - a.delays).slice(0, 5);

                // 渲染畫面功能
                function renderList(elementId, list, formatScoreHtml) {
                    const container = document.getElementById(elementId);
                    container.innerHTML = '';
                    if(list.length === 0) {
                        container.innerHTML = `<div class="card" style="padding:15px; color:var(--text-muted); text-align:center; font-weight:bold;">目前累積資料不足...</div>`;
                        return;
                    }
                    list.forEach((g, index) => {
                        let avatar = g.photo ? `<img src="${g.photo}" style="width:45px;height:45px;border-radius:50%;object-fit:cover;border:2px solid var(--theme-main); flex-shrink:0;">` : `<div style="width:45px;height:45px;border-radius:50%;background:#ffe4e8;display:flex;align-items:center;justify-content:center;font-size:22px; flex-shrink:0;">👱‍♀️</div>`;
                        let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `<span style="font-size:16px;">${index+1}</span>`;
                        
                        let html = `
                        <div class="card" style="display:flex; align-items:center; padding:12px 15px; margin-bottom:5px; cursor:pointer;" onclick="window.location.href='detail.html?name=${encodeURIComponent(g.name)}&team=${encodeURIComponent(g.team)}'">
                            <div style="font-size:24px; font-weight:900; width:40px; text-align:center; color:var(--theme-main); flex-shrink:0;">${medal}</div>
                            ${avatar}
                            <div style="flex:1; text-align:left; margin-left:15px; min-width:0;">
                                <div style="font-weight:900; font-size:18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${g.name}</div>
                                <div style="font-size:11px; color:white; background:var(--text-muted); border-radius:10px; padding:2px 8px; display:inline-block; margin-top:3px;">${g.team.replace('桃猿','').replace('兄弟','').replace('悍將','').replace('雄鷹','')}</div>
                            </div>
                            <div style="text-align:right; font-size:20px; flex-shrink:0; margin-left:10px;">
                                ${formatScoreHtml(g)}
                            </div>
                        </div>`;
                        container.innerHTML += html;
                    });
                }

                // 注入三大榜單
                renderList('winrate-list', winRateList, g => `<span style="color:#e74c3c; font-weight:900;">${g.winRate.toFixed(1)}%</span><br><span style="font-size:12px;color:var(--text-muted);">${g.wins}勝${g.losses}敗</span>`);
                renderList('iron-list', ironList, g => `<span style="color:#e67e22; font-weight:900;">${g.games} 場</span>`);
                renderList('rain-list', rainList, g => `<span style="color:#3498db; font-weight:900;">${g.delays} 次</span>`);

            } catch (error) {
                console.error(error);
                document.querySelector('.container').innerHTML += '<p style="color:red; text-align:center; font-weight:bold;">排行榜載入失敗，請檢查資料表格式</p>';
            } finally { hideLoading(); }
        }

        initRanking();
    </script>
</body>
</html>
