<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女神情報局</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🏆 專業數據對齊防護罩 */
        #history-table th, #history-table td {
            white-space: nowrap !important; 
            text-align: center !important;  
            vertical-align: middle !important;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 117, 140, 0.1);
        }
        #history-table th { background-color: rgba(255, 117, 140, 0.05); color: var(--theme-main); font-weight: 900; }
        #history-table td { font-size: 15px !important; color: var(--text-main); }
        
        [data-theme="dark"] #history-table th { background-color: #252525; }
        [data-theme="dark"] #history-table td { border-bottom: 1px solid #333; }

        /* 🍎 粉色圓角泡泡標籤 */
        .info-tag {
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 1px solid #ffccd5;
            border-radius: 20px;
            padding: 5px 14px;
            gap: 8px;
            white-space: nowrap;
        }
        .info-tag .label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
        .info-tag .value { font-size: 15px; color: var(--theme-main); font-weight: 900; }
        [data-theme="dark"] .info-tag { border-color: #ff758c; }

        /* 🆔 身分證左右佈局 */
        .profile-layout {
            display: flex;
            align-items: center; 
            gap: 30px; 
        }
        .profile-left {
            flex: 0 0 auto; 
            min-width: 250px;
            display: flex;
            align-items: center; 
        }
        .profile-right {
            flex: 1; 
            border-left: 1px dashed rgba(255, 117, 140, 0.4);
            padding-left: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 🔍 女神情報局專屬方塊 (🔥 升級為 5 欄並排！) */
        #secret-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 永遠保持 5 個並排 */
            gap: 12px;
            width: 100%;
        }
        .secret-box {
            border: 1px solid #ffccd5;
            border-radius: 16px;
            padding: 15px 5px; 
            text-align: center;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(255, 117, 140, 0.05);
            height: 100%;
        }
        .secret-box .icon { font-size: 24px; margin-bottom: 5px; }
        .secret-box .label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 5px; }
        .secret-box .value { font-size: 14px; color: var(--text-main); font-weight: 900; white-space: nowrap; }
        [data-theme="dark"] .secret-box { border-color: #444; background: #2a2a2a; }

        /* 📱 平板與手機版適應 */
        @media (max-width: 1050px) {
            .profile-layout { flex-direction: column; align-items: stretch; gap: 20px; }
            .profile-left { flex: 1 1 auto; width: 100%; justify-content: center; }
            .profile-right { 
                border-left: none; 
                border-top: 1px dashed rgba(255, 117, 140, 0.4); 
                padding-left: 0; 
                padding-top: 25px; 
            }
        }
        @media (max-width: 768px) {
            #secret-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 480px) {
            #secret-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* 📊 寬敞數據看板 */
        .dashboard-card { flex: 1; min-width: 90px; padding: 20px 5px; text-align: center; border-radius: 16px; }
        .dashboard-label { color: var(--text-muted); font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .dashboard-value { font-size: 20px; font-weight: 900; }

        /* 💊 勝負膠囊標籤 */
        .result-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; color: white; font-weight: bold; font-size: 14px; }
        .result-win { background-color: #ff9aa2; } 
        .result-loss { background-color: #99c2ff; } 
        .result-delay { background-color: #bdc3c7; } 
        .overtime-badge { background: #6c5ce7; color: white; font-size: 11px; padding: 2px 6px; border-radius: 6px; margin-left: 6px; }
        
        /* 篩選器樣式 */
        .filter-select { padding: 8px 15px; border-radius: 12px; border: 1px solid #ffccd5; background: var(--bg-color); color: var(--text-main); font-weight: bold; outline: none; cursor: pointer; font-family: 'Nunito', 'Noto Sans TC'; }
        [data-theme="dark"] .filter-select { border-color: #555; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⚡ 正在調閱女神機密檔案...</div>
    </div>

    <div class="container">
        <div class="back-btn-container" style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="card profile-layout" id="profile-card" style="display: none; padding: 30px; margin-bottom: 25px;">
            <div class="profile-left">
                <div id="avatar-container" class="profile-avatar-large" style="flex-shrink: 0; margin-right: 25px;"></div>
                <div style="flex: 1; text-align: left; min-width: 0; display: flex; flex-direction: column; justify-content: center;">
                    <div style="display: flex; align-items: baseline; gap: 10px;">
                        <h1 id="page-title" style="margin: 0; color: var(--theme-main); font-size: 32px; font-weight: 900;"></h1>
                        <span id="girl-number" style="font-size: 18px; color: var(--text-muted); font-weight: 800;"></span>
                    </div>
                    <div>
                        <div id="team-badge" style="display: inline-block; padding: 4px 15px; border-radius: 12px; color: white; font-weight: bold; font-size: 14px; margin: 12px 0;"></div>
                    </div>
                    <div id="extra-info-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px;"></div>
                    <div id="ig-container" style="margin-top: 10px;"></div>
                </div>
            </div>

            <div class="profile-right">
                <h3 style="margin: 0 0 15px 0; color: var(--theme-main); font-size: 18px; display: flex; align-items: center; gap: 8px;">
                    🔍 女神情報局
                </h3>
                <div id="secret-grid"></div>
            </div>
        </div>

        <div class="dashboard" id="mini-dashboard" style="display: none; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;">
            <div class="card dashboard-card"><div class="dashboard-label">總出賽</div><div class="dashboard-value" id="stat-games" style="color: var(--text-main);">0 場</div></div>
            <div class="card dashboard-card"><div class="dashboard-label">戰績</div><div class="dashboard-value" id="stat-record" style="color: #e74c3c;">0勝 0敗</div></div>
            <div class="card dashboard-card"><div class="dashboard-label">勝率</div><div class="dashboard-value" id="stat-winrate" style="color: #e74c3c;">0%</div></div>
            <div class="card dashboard-card"><div class="dashboard-label">延賽</div><div class="dashboard-value" id="stat-delay" style="color: #95a5a6;">0 場</div></div>
            <div class="card dashboard-card"><div class="dashboard-label">加班總計</div><div class="dashboard-value" id="stat-overtime" style="color: #6c5ce7;">0 場</div></div>
            <div class="card dashboard-card"><div class="dashboard-label">得失分</div><div class="dashboard-value" id="stat-points" style="color: var(--text-main);">0 / 0</div></div>
        </div>

        <div class="card" id="history-card" style="display: none; padding: 0; overflow: hidden;">
            <div style="padding: 20px; border-bottom: 1px solid rgba(255, 117, 140, 0.1); background: var(--card-bg);">
                <h3 style="margin: 0 0 15px 0; color: var(--theme-main); text-align: center;">📅 出勤歷史紀錄</h3>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <select id="filter-year" class="filter-select"><option value="all">所有年度</option></select>
                    <select id="filter-month" class="filter-select"><option value="all">所有月份</option></select>
                </div>
            </div>

            <div style="width: 100%; overflow-x: auto;">
                <table id="history-table" style="min-width: 100%;">
                    <thead>
                        <tr>
                            <th>日期</th><th>場次</th><th>對手</th><th>比分</th><th>結果</th><th>勝投</th><th>敗投</th><th>救援</th><th>MVP</th><th>觀眾數</th><th>比賽時間</th><th>地點</th><th>📍站位</th>
                        </tr>
                    </thead>
                    <tbody id="history-list"></tbody>
                </table>
            </div>
        </div>

        <div id="error-message" style="text-align: center; color: red; display: none; font-weight: bold; margin-top: 50px;">
            找不到該女孩的資料，請回首頁重新選擇！
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allMatchRecords = []; 

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initDetail() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const targetName = urlParams.get('name');
                if (!targetName) { hideLoading(); return; }

                const [girlsData, scheduleData, matchesData] = await Promise.all([
                    fetchCSV(CONFIG.girlsUrl), fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl)
                ]);

                const girlInfo = girlsData.find(g => (g.name || g.girl_name || g['姓名'] || "").trim() === targetName);
                if (!girlInfo) { document.getElementById('error-message').style.display = 'block'; hideLoading(); return; }

                const finalTeam = girlInfo.team || girlInfo['球隊'] || "自由球員";
                document.getElementById('page-title').innerText = targetName;
                const gNum = girlInfo.number || girlInfo.id || girlInfo['號碼'] || "";
                if (gNum) document.getElementById('girl-number').innerText = `No.${gNum}`;
                
                let teamColor = 'var(--theme-main)';
                if(finalTeam.includes('兄弟')) teamColor = '#f1c40f'; 
                else if(finalTeam.includes('味全')) teamColor = '#e74c3c'; 
                else if(finalTeam.includes('統一')) teamColor = '#e67e22'; 
                else if(finalTeam.includes('富邦')) teamColor = '#3498db'; 
                else if(finalTeam.includes('台鋼')) teamColor = '#2ecc71'; 
                const badge = document.getElementById('team-badge');
                badge.innerText = finalTeam;
                badge.style.background = teamColor;

                const photoUrl = girlInfo.photo || girlInfo['圖片'];
                if (photoUrl) {
                    document.getElementById('avatar-container').innerHTML = `<img src="${photoUrl.trim()}" alt="${targetName}" style="width:100%;height:100%;object-fit:cover;">`;
                }

                const extraContainer = document.getElementById('extra-info-container');
                const secretGrid = document.getElementById('secret-grid');
                
                const dict = {
                    'zodiac': { label: '星座', icon: '✨' }, 'constellation': { label: '星座', icon: '✨' },
                    'favorite_player': { label: '最愛球員', icon: '⚾' },
                    'food': { label: '最愛食物', icon: '🍰' },
                    'hobby': { label: '興趣', icon: '🎨' },
                    'birthday': { label: '生日', icon: '🎂' }, // 生日加入圖示與對應
                    'country': { label: '國籍', icon: '🇹🇼' },
                    'height': { label: '身高', icon: '📏' },
                    'weight': { label: '體重', icon: '⚖️' },
                    'years': { label: '年資', icon: '⏳' }
                };

                // 🔥 依照你的要求：設定 5 個方塊，並且是全新的順序
                const secretKeys = ['生日', '星座', '最愛食物', '最愛球員', '興趣'];
                const excludeKeys = ['name', 'girl_name', '姓名', 'team', '球隊', 'photo', 'ig', 'year', 'id', 'number'];
                
                let mappedData = {};

                Object.keys(girlInfo).forEach(k => {
                    const lk = k.toLowerCase();
                    const label = dict[lk] ? dict[lk].label : k;

                    // 是專屬的 5 個項目 -> 塞進情報局陣列
                    if (secretKeys.includes(label)) {
                        mappedData[label] = girlInfo[k];
                    } 
                    // 不是專屬的，且不是排除項目 -> 塞進左邊粉色泡泡區
                    else if (!excludeKeys.includes(lk) && girlInfo[k] && girlInfo[k].toString().trim() !== '') {
                        if (label === '國籍') {
                            extraContainer.innerHTML += `<div class="info-tag"><span class="value">${girlInfo[k]}</span></div>`;
                        } else {
                            extraContainer.innerHTML += `<div class="info-tag"><span class="label">${label}</span><span class="value">${girlInfo[k]}</span></div>`;
                        }
                    }
                });

                // 渲染右邊 5 個情報局方塊
                secretKeys.forEach(title => {
                    let iconObj = Object.values(dict).find(d => d.label === title);
                    let icon = iconObj ? iconObj.icon : '✨';
                    let val = mappedData[title] && mappedData[title].toString().trim() !== '' ? mappedData[title] : '保密中';
                    let valStyle = val === '保密中' ? 'color: var(--text-muted);' : 'color: var(--text-main);';
                    
                    secretGrid.innerHTML += `
                        <div class="secret-box">
                            <div class="icon">${icon}</div>
                            <div class="label">${title}</div>
                            <div class="value" style="${valStyle}">${val}</div>
                        </div>
                    `;
                });

                const schedules = scheduleData.filter(s => (s.girl_name || s.name || s['姓名'] || "").trim() === targetName);
                
                schedules.forEach(s => {
                    if(!s.working_dates) return;
                    const sYear = s.year ? s.year.toString().trim() : '';
                    const workList = parseWorkingDate(s.working_dates);
                    
                    workList.forEach(w => {
                        let record = { date: w.date, year: sYear, month: '', gameNo: '-', opponent: '-', score: '-', winP: '-', lossP: '-', savP: '-', mvpP: '-', attP: '-', durP: '-', locP: '-', pos: w.position || '-', isWin: false, isLoss: false, isDelay: false, scored: 0, allowed: 0, overtimeGames: 0, resHtml: '<span style="color:var(--text-muted);">-</span>' };
                        
                        const wNums = w.date.match(/\d+/g);
                        if (wNums && wNums.length >= 2) {
                            record.month = wNums[0].padStart(2, '0');
                            const wM = parseInt(wNums[0], 10), wD = parseInt(wNums[1], 10);
                            
                            const match = matchesData.find(m => {
                                if(sYear && m.year && sYear !== m.year.toString()) return false;
                                if(m.team && m.team.trim() !== finalTeam) return false;
                                const mNums = m.date ? m.date.match(/\d+/g) : null;
                                return mNums && mNums.length >= 2 && parseInt(mNums[0], 10) === wM && parseInt(mNums[1], 10) === wD;
                            });

                            if(match) {
                                record.year = match.year ? match.year.toString() : sYear;
                                record.gameNo = match.game_no || '-'; record.opponent = match.opponent || match['對手'] || '-';
                                record.score = match.score || match['比分'] || '-'; record.winP = match.win_pitcher || match['勝投'] || '-';
                                record.lossP = match.loss_pitcher || match['敗投'] || '-'; record.savP = match.save || match['救援'] || '-';
                                record.mvpP = match.mvp || match['MVP'] || '-'; record.attP = match.attendance || match['觀眾數'] || '-';
                                record.durP = match.duration || match['比賽時間'] || '-'; record.locP = match.location || match['地點'] || '-';
                                
                                const inn = parseInt(match.innings || match['局數'] || 9);
                                if(inn > 9) {
                                    record.overtimeGames = 1; 
                                    record.score += `<span class="overtime-badge">${inn}局</span>`;
                                }

                                const res = (match.result || match['結果'] || '').trim();
                                const scoreData = parseScoreForTeam(match.score, res);
                                record.scored = scoreData.scored; record.allowed = scoreData.allowed;
                                
                                if(res.includes('勝')) { record.isWin = true; record.resHtml = `<span class="result-badge result-win">勝</span>`; }
                                else if(res.includes('敗')) { record.isLoss = true; record.resHtml = `<span class="result-badge result-loss">敗</span>`; }
                                else if(res.includes('延')) { record.isDelay = true; record.resHtml = `<span class="result-badge result-delay">延賽</span>`; }
                            }
                        }
                        allMatchRecords.push(record);
                    });
                });

                const years = [...new Set(allMatchRecords.map(r => r.year).filter(y => y))].sort().reverse();
                const months = [...new Set(allMatchRecords.map(r => r.month).filter(m => m))].sort();
                
                const yearSelect = document.getElementById('filter-year');
                years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y} 年</option>`);
                
                const monthSelect = document.getElementById('filter-month');
                months.forEach(m => monthSelect.innerHTML += `<option value="${m}">${m} 月</option>`);

                yearSelect.addEventListener('change', renderFilteredData);
                monthSelect.addEventListener('change', renderFilteredData);

                document.getElementById('profile-card').style.display = 'flex';
                document.getElementById('mini-dashboard').style.display = 'flex';
                document.getElementById('history-card').style.display = 'block';
                
                renderFilteredData(); 
                hideLoading();

            } catch (error) {
                console.error(error);
                document.getElementById('error-message').style.display = 'block';
                hideLoading();
            }
        }

        function renderFilteredData() {
            const selYear = document.getElementById('filter-year').value;
            const selMonth = document.getElementById('filter-month').value;

            let fWin = 0, fLoss = 0, fDelay = 0, fOvertimeGames = 0, fScored = 0, fAllowed = 0;
            let historyHtml = '';

            const filteredRecords = allMatchRecords.filter(r => {
                const matchY = (selYear === 'all' || r.year === selYear);
                const matchM = (selMonth === 'all' || r.month === selMonth);
                return matchY && matchM;
            });

            filteredRecords.forEach(r => {
                if(r.isWin) { fWin++; fScored += r.scored; fAllowed += r.allowed; }
                if(r.isLoss) { fLoss++; fScored += r.scored; fAllowed += r.allowed; }
                if(r.isDelay) { fDelay++; }
                if(r.overtimeGames > 0) fOvertimeGames++;

                historyHtml += `<tr>
                    <td style="font-weight:bold;">${r.date}</td>
                    <td style="color:var(--text-muted);">${r.gameNo}</td>
                    <td>${r.opponent}</td>
                    <td style="font-weight:bold;">${r.score}</td>
                    <td>${r.resHtml}</td>
                    <td style="color:#e74c3c;">${r.winP}</td>
                    <td style="color:#3498db;">${r.lossP}</td>
                    <td style="color:#2ecc71;">${r.savP}</td>
                    <td style="color:#f39c12; font-weight:bold;">${r.mvpP}</td>
                    <td style="font-weight:bold;">${r.attP}</td>
                    <td>${r.durP}</td>
                    <td>${r.locP}</td>
                    <td style="color:var(--theme-main); font-weight:900;">${r.pos}</td>
                </tr>`;
            });

            if (historyHtml === '') {
                historyHtml = '<tr><td colspan="13" style="text-align:center; padding:30px; color:var(--text-muted);">此區間尚無出勤紀錄</td></tr>';
            }

            document.getElementById('stat-games').innerText = `${fWin+fLoss} 場`;
            document.getElementById('stat-record').innerText = `${fWin}勝 ${fLoss}敗`;
            document.getElementById('stat-winrate').innerText = (fWin+fLoss) > 0 ? `${((fWin/(fWin+fLoss))*100).toFixed(1)}%` : '0%';
            document.getElementById('stat-delay').innerText = `${fDelay} 場`;
            document.getElementById('stat-overtime').innerText = `${fOvertimeGames} 場`;
            document.getElementById('stat-points').innerText = `${fScored} / ${fAllowed}`;
            document.getElementById('history-list').innerHTML = historyHtml;
        }

        initDetail();
    </script>
</body>
</html>
