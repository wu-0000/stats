<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>女孩詳細數據</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d90000; padding-bottom: 10px; }
        .stats-panel { display: flex; gap: 20px; margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .stat-box { flex: 1; text-align: center; border-right: 1px solid #ddd; }
        .stat-box:last-child { border-right: none; }
        .stat-value { font-size: 24px; font-weight: bold; color: #d90000; }
        .chart-container { width: 300px; margin: 20px auto; }
        .controls { margin: 20px 0; display: flex; gap: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: center; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #eee; }
        .win { color: green; font-weight: bold; }
        .loss { color: red; }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="page-title">載入中...</h1>
        <a href="index.html">返回名單</a>
    </div>

    <div class="controls">
        <select id="year-select">
            <option value="2026">2026 年度</option>
            </select>
        <select id="month-select">
            <option value="all">全年總計</option>
            <option value="3">3 月</option>
            <option value="4">4 月</option>
            <option value="5">5 月</option>
            </select>
    </div>

    <div class="stats-panel">
        <div class="stat-box">勝率<br><span id="stat-winrate" class="stat-value">0%</span></div>
        <div class="stat-box">總場次<br><span id="stat-games" class="stat-value">0</span></div>
        <div class="stat-box">延賽<br><span id="stat-delay" class="stat-value">0</span></div>
        <div class="stat-box">上班時數<br><span id="stat-duration" class="stat-value">0H0M</span></div>
    </div>

    <div class="chart-container">
        <canvas id="winLossChart"></canvas>
    </div>

    <table>
        <thead>
            <tr>
                <th>日期</th><th>對手</th><th>比分</th><th>結果</th><th>勝投</th><th>敗投</th><th>救援</th><th>MVP</th><th>時間</th><th>觀眾數</th><th>地點</th><th>站位</th>
            </tr>
        </thead>
        <tbody id="match-table-body">
            </tbody>
    </table>

    <script src="app.js"></script>
    <script>
        // 取得網址列上的名字 (例如 ?name=籃籃)
        const urlParams = new URLSearchParams(window.location.search);
        const girlName = urlParams.get('name');
        document.getElementById('page-title').innerText = girlName ? `${girlName} 的出勤數據` : '找不到女孩資料';

        let chartInstance = null;
        let allMatches = []; // 儲存該女孩該年度所有比賽
        
        async function loadDetailData() {
            if (!girlName) return;

            const selectedYear = document.getElementById('year-select').value;
            const selectedMonth = document.getElementById('month-select').value;

            // 抓取班表與比賽資料
            const [scheduleData, matchesData] = await Promise.all([
                fetchCSV(CONFIG.scheduleUrl),
                fetchCSV(CONFIG.matchesUrl)
            ]);

            // 1. 找出該女孩在選定年度的班表字串
            const mySchedule = scheduleData.find(s => s.girl_name === girlName && s.year === selectedYear);
            if (!mySchedule || !mySchedule.working_dates) {
                renderUI([], "all"); // 沒上班
                return;
            }

            // 2. 解析班表字串 (如 "03/28(一三三)")
            const workList = parseWorkingDate(mySchedule.working_dates);

            // 3. 結合比賽詳細資料
            allMatches = workList.map(work => {
                // 去 Matches 找對應日期與年度的比賽
                const matchDetail = matchesData.find(m => m.date === work.date && m.year === selectedYear);
                if (matchDetail) {
                    return { ...matchDetail, position: work.position }; // 合併站位資訊
                }
                return null;
            }).filter(m => m !== null);

            // 渲染介面
            renderUI(allMatches, selectedMonth);
        }

        function renderUI(matches, filterMonth) {
            // 月份過濾
            let displayMatches = matches;
            if (filterMonth !== "all") {
                // 假設 CSV 裡的 month 是數字 (例如 "3")
                displayMatches = matches.filter(m => m.month === filterMonth);
            }

            // 統計變數
            let winCount = 0, lossCount = 0, delayCount = 0, totalMinutes = 0;
            const tbody = document.getElementById('match-table-body');
            tbody.innerHTML = '';

            displayMatches.forEach(m => {
                // 累加統計
                if (m.result === '勝') winCount++;
                else if (m.result === '敗') lossCount++;
                else if (m.result === '延賽') delayCount++;

                totalMinutes += parseDuration(m.duration);

                // 決定結果文字顏色
                let resultClass = "";
                if (m.result === '勝') resultClass = 'win';
                if (m.result === '敗') resultClass = 'loss';

                // 產生表格行
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${m.date}</td>
                    <td>${m.opponent}</td>
                    <td>${m.score || "-"}</td>
                    <td class="${resultClass}">${m.result}</td>
                    <td>${m.win_pitcher || "-"}</td>
                    <td>${m.loss_pitcher || "-"}</td>
                    <td>${m.save || "-"}</td>
                    <td>${m.mvp || "-"}</td>
                    <td>${m.duration || "-"}</td>
                    <td>${m.attendance || "-"}</td>
                    <td>${m.location || "-"}</td>
                    <td>${m.position}</td>
                `;
                tbody.appendChild(tr);
            });

            // 更新統計看板
            document.getElementById('stat-winrate').innerText = `${calculateWinRate(winCount, lossCount)}%`;
            document.getElementById('stat-games').innerText = displayMatches.length;
            document.getElementById('stat-delay').innerText = delayCount;
            document.getElementById('stat-duration').innerText = formatMinutes(totalMinutes);

            // 更新圓餅圖
            updateChart(winCount, lossCount, delayCount);
        }

        function updateChart(win, loss, delay) {
            const ctx = document.getElementById('winLossChart').getContext('2d');
            
            // 銷毀舊圖表以避免重疊
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['勝', '敗', '延賽'],
                    datasets: [{
                        data: [win, loss, delay],
                        backgroundColor: ['#4CAF50', '#F44336', '#9E9E9E']
                    }]
                },
                options: { responsive: true }
            });
        }

        // 綁定下拉選單事件，改變時重新渲染
        document.getElementById('year-select').addEventListener('change', loadDetailData);
        document.getElementById('month-select').addEventListener('change', () => {
            const selectedMonth = document.getElementById('month-select').value;
            renderUI(allMatches, selectedMonth);
        });

        // 初始載入
        loadDetailData();
    </script>
</body>
</html>
