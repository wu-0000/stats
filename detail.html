<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女孩詳細數據</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="page-title">載入中...</h1>
            <a href="index.html" class="btn btn-secondary">返回名單</a>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <select id="year-select">
                <option value="2026">2026 年度</option>
            </select>
            <select id="month-select">
                <option value="all">全年總計</option>
                <option value="3">3 月</option>
                <option value="4">4 月</option>
                <option value="5">5 月</option>
            </select>
        </div>

        <div class="dashboard">
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">👑 勝率</div><div id="stat-winrate" style="font-size:28px; color:var(--theme-main); font-weight:900;">0%</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🎉 勝場</div><div id="stat-wins" style="font-size:28px; color:var(--theme-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">💔 敗場</div><div id="stat-losses" style="font-size:28px; color:var(--theme-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🏟️ 總場次</div><div id="stat-games" style="font-size:28px; color:var(--theme-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🌧️ 延賽</div><div id="stat-delay" style="font-size:28px; color:var(--theme-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">⏱️ 上班時數</div><div id="stat-duration" style="font-size:28px; color:var(--theme-main); font-weight:900;">0H0M</div></div>
        </div>

        <div style="width: 300px; margin: 30px auto;">
            <canvas id="winLossChart"></canvas>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>日期</th><th>對手</th><th>比分</th><th>結果</th><th>勝投</th><th>敗投</th><th>救援</th><th>MVP</th><th>時間</th><th>觀眾數</th><th>地點</th><th>站位</th>
                    </tr>
                </thead>
                <tbody id="match-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
