<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女孩詳細數據</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="page-title">載入中...</h1>
            <a href="index.html" class="btn btn-secondary">返回名單</a>
        </div>

        <div style="margin-bottom: 20px; text-align: center;">
            <select id="year-select">
                <option value="2026">2026 年度</option>
            </select>
            <select id="month-select">
                <option value="all">全年總計</option>
                <option value="3">3 月</option>
                <option value="4">4 月</option>
                <option value="5">5 月</option>
            </select>
        </div>

        <div class="dashboard">
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">👑 勝率</div><div id="stat-winrate" style="font-size:28px; color:var(--theme-main); font-weight:900;">0%</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🔥 場均得分</div><div id="stat-avg-score" style="font-size:28px; color:#e74c3c; font-weight:900;">0.0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🛡️ 場均失分</div><div id="stat-avg-allow" style="font-size:28px; color:#3498db; font-weight:900;">0.0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🎉 勝場</div><div id="stat-wins" style="font-size:28px; color:var(--text-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">💔 敗場</div><div id="stat-losses" style="font-size:28px; color:var(--text-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🏟️ 總場次</div><div id="stat-games" style="font-size:28px; color:var(--text-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">🌧️ 延賽</div><div id="stat-delay" style="font-size:28px; color:var(--text-main); font-weight:900;">0</div></div>
            <div class="card"><div style="color:var(--text-muted); font-weight:bold;">⏱️ 上班時數</div><div id="stat-duration" style="font-size:28px; color:var(--text-main); font-weight:900;">0H0M</div></div>
        </div>

        <div style="width: 300px; margin: 30px auto;">
            <canvas id="winLossChart"></canvas>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>日期</th><th>對手</th><th>比分</th><th>結果</th><th>勝投</th><th>敗投</th><th>救援</th><th>MVP</th><th>時間</th><th>觀眾數</th><th>地點</th><th>站位</th>
                    </tr>
                </thead>
                <tbody id="match-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const girlName = urlParams.get('name');
        const girlTeam = urlParams.get('team'); 

        document.getElementById('page-title').innerText = girlName ? `✨ ${girlName} 的出勤數據 ✨` : '找不到女孩資料';

        let chartInstance = null;
        let allMatches = [];
        
async function loadDetailData() {
            if (!girlName) return;
            const selectedYear = document.getElementById('year-select').value;
            const selectedMonth = document.getElementById('month-select').value;

            try {
                // 🎀 這裡多加了 fetchCSV(CONFIG.girlsUrl) 把女孩總表也抓下來看 IG
                const [scheduleData, matchesData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl), fetchCSV(CONFIG.girlsUrl)
                ]);

                // 📷 去找這位女孩的 IG 資料並更新標題
                const girlInfo = girlsData.find(g => g.name && g.name.trim() === girlName && g.team && g.team.trim() === girlTeam);
                let titleHtml = `✨ ${girlName} 的出勤數據 ✨`;
                
                if (girlInfo && girlInfo.ig && girlInfo.ig.trim() !== '') {
                    let igStr = girlInfo.ig.trim();
                    let igLink = igStr.startsWith('http') ? igStr : `https://www.instagram.com/${igStr}/`;
                    titleHtml += ` <a href="${igLink}" target="_blank" style="font-size:14px; background:linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color:white; padding:4px 12px; border-radius:12px; text-decoration:none; vertical-align:middle; margin-left:10px; box-shadow: 0 4px 10px rgba(220, 39, 67, 0.3);">📷 IG</a>`;
                }
                document.getElementById('page-title').innerHTML = titleHtml;

                const mySchedule = scheduleData.find(s => s.girl_name && s.girl_name.trim() === girlName && s.year && s.year.trim() === selectedYear);
                if (!mySchedule || !mySchedule.working_dates) {
                    renderUI([], "all"); return;
                }

                const workList = parseWorkingDate(mySchedule.working_dates);
                allMatches = workList.map(work => {
                    const matchDetail = matchesData.find(m => 
                        m.date && m.date.trim() === work.date.trim() && 
                        m.year && m.year.trim() === selectedYear &&
                        m.team && m.team.trim() === girlTeam 
                    );
                    return matchDetail ? { ...matchDetail, position: work.position } : null;
                }).filter(m => m !== null);

                renderUI(allMatches, selectedMonth);
            } catch (error) { console.error(error); }
        }
        function renderUI(matches, filterMonth) {
            let displayMatches = matches;
            if (filterMonth !== "all") {
                displayMatches = matches.filter(m => m.month && m.month.trim() === filterMonth);
            }

            let winCount = 0, lossCount = 0, delayCount = 0, totalMinutes = 0;
            let totalScored = 0, totalAllowed = 0; // 記錄總得分與失分

            const tbody = document.getElementById('match-table-body');
            tbody.innerHTML = '';

            displayMatches.forEach(m => {
                const resultTrimmed = m.result ? m.result.trim() : "";
                
                if (resultTrimmed === '延賽') {
                    delayCount++;
                } else {
                    if (resultTrimmed === '勝') winCount++;
                    else if (resultTrimmed === '敗') lossCount++;
                    
                    // 🎀 呼叫我們剛剛寫的超聰明計算機
                    const scoreData = parseScoreForTeam(m.score, resultTrimmed);
                    totalScored += scoreData.scored;
                    totalAllowed += scoreData.allowed;
                }
                
                totalMinutes += parseDuration(m.duration);

                let resultClass = resultTrimmed === '勝' ? 'win' : (resultTrimmed === '敗' ? 'loss' : '');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${m.date || "-"}</td><td>${m.opponent || "-"}</td><td>${m.score || "-"}</td>
                    <td><span class="${resultClass}">${m.result || "-"}</span></td><td>${m.win_pitcher || "-"}</td>
                    <td>${m.loss_pitcher || "-"}</td><td>${m.save || "-"}</td><td>${m.mvp || "-"}</td>
                    <td>${m.duration || "-"}</td><td>${m.attendance || "-"}</td><td>${m.location || "-"}</td>
                    <td><span style="background:var(--theme-main);color:white;padding:4px 10px;border-radius:12px;font-size:12px;">${m.position || "-"}</span></td>
                `;
                tbody.appendChild(tr);
            });

            const validGames = winCount + lossCount; // 扣除延賽的有效場次
            const avgScore = validGames > 0 ? (totalScored / validGames).toFixed(1) : "0.0";
            const avgAllow = validGames > 0 ? (totalAllowed / validGames).toFixed(1) : "0.0";

            document.getElementById('stat-winrate').innerText = `${calculateWinRate(winCount, lossCount)}%`;
            document.getElementById('stat-wins').innerText = winCount;
            document.getElementById('stat-losses').innerText = lossCount;
            document.getElementById('stat-games').innerText = displayMatches.length;
            document.getElementById('stat-delay').innerText = delayCount;
            document.getElementById('stat-duration').innerText = formatMinutes(totalMinutes);
            document.getElementById('stat-avg-score').innerText = avgScore; // 顯示場均得分
            document.getElementById('stat-avg-allow').innerText = avgAllow; // 顯示場均失分
            
            updateChart(winCount, lossCount, delayCount);
        }

        // ... 圓餅圖代碼保持不變 ...
        function updateChart(win, loss, delay) {
            const ctx = document.getElementById('winLossChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            if (win === 0 && loss === 0 && delay === 0) return; 
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: { labels: ['勝', '敗', '延賽'], datasets: [{ data: [win, loss, delay], backgroundColor: ['#ff9a9e', '#a1c4fd', '#e2e2e2'], borderWidth: 0 }] },
                options: { responsive: true }
            });
        }

        document.getElementById('year-select').addEventListener('change', loadDetailData);
        document.getElementById('month-select').addEventListener('change', () => renderUI(allMatches, document.getElementById('month-select').value));
        loadDetailData();
    </script>
</body>
</html>
