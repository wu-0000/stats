<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女神情報局</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🏆 專業數據對齊防護罩 (完美不破版) */
        #history-table th, #history-table td {
            white-space: nowrap !important; 
            text-align: center !important;  
            vertical-align: middle !important;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 117, 140, 0.1);
        }
        #history-table th {
            background-color: rgba(255, 117, 140, 0.05);
            color: var(--theme-main);
            font-weight: 900;
        }
        [data-theme="dark"] #history-table th { background-color: #252525; }

        /* 🍎 高質感專業微型資訊卡 (洗刷泡泡廉價感) */
        .info-tag {
            display: inline-flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 5px 10px;
            gap: 8px;
            white-space: nowrap;
        }
        .info-tag .label { font-size: 12px; color: #6c757d; font-weight: bold; }
        .info-tag .value { font-size: 14px; color: var(--theme-main); font-weight: 900; }
        
        [data-theme="dark"] .info-tag { 
            background: #2a2a2a; 
            border-color: #444; 
        }

        /* 加班紫色小標籤 */
        .overtime-badge {
            background: #6c5ce7;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">⚡ 正在載入女神情報...</div>
    </div>

    <div class="container">
        <div class="back-btn-container" style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="profile-header-container card" id="profile-card" style="display: none; align-items: flex-start;">
            <div id="avatar-container" class="profile-avatar-large" style="flex-shrink: 0;"></div>
            <div style="flex: 1; text-align: left; min-width: 0;">
                <h1 id="page-title" style="margin: 0 0 5px 0; color: var(--theme-main); font-size: 32px; font-weight: 900;"></h1>
                <div id="team-badge" style="display: inline-block; padding: 4px 12px; border-radius: 12px; color: white; font-weight: bold; font-size: 14px; margin-bottom: 15px;"></div>
                <div id="extra-info-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;"></div>
                <div id="ig-container"></div>
            </div>
        </div>

        <div class="dashboard" id="mini-dashboard" style="display: none; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px;">
            <div class="card" style="padding: 15px 5px;"><div class="p-label-mini">總出賽</div><div class="p-value-mini" id="stat-games">0 場</div></div>
            <div class="card" style="padding: 15px 5px;"><div class="p-label-mini">戰績</div><div class="p-value-mini" id="stat-record" style="color: #e74c3c;">0勝 0敗</div></div>
            <div class="card" style="padding: 15px 5px;"><div class="p-label-mini">勝率</div><div class="p-value-mini" id="stat-winrate" style="color: #e74c3c;">0%</div></div>
            <div class="card" style="padding: 15px 5px;"><div class="p-label-mini">加班總計</div><div class="p-value-mini" id="stat-overtime" style="color: #6c5ce7;">0 場</div></div>
            <div class="card" style="padding: 15px 5px;"><div class="p-label-mini">得失分</div><div class="p-value-mini" id="stat-points">0 / 0</div></div>
        </div>

        <div class="table-responsive card" id="history-card" style="display: none; padding: 0;">
            <h3 style="margin: 20px; color: var(--theme-main); text-align: center;">📅 本季詳細出勤紀錄</h3>
            <table id="history-table" style="min-width: 100%; border-radius: var(--border-radius); overflow: hidden;">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>場次</th>
                        <th>對手</th>
                        <th>比分</th>
                        <th>結果</th>
                        <th>勝投</th>
                        <th>敗投</th>
                        <th>救援</th>
                        <th>MVP</th>
                        <th>觀眾數</th>
                        <th>比賽時間</th>
                        <th>地點</th>
                        <th>📍站位</th>
                    </tr>
                </thead>
                <tbody id="history-list"></tbody>
            </table>
        </div>

        <div id="error-message" style="text-align: center; color: red; display: none; font-weight: bold; margin-top: 50px;">
            找不到該女孩的資料，請回首頁重新選擇！
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initDetail() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const targetName = urlParams.get('name');
                if (!targetName) { hideLoading(); return; }

                const [girlsData, scheduleData, matchesData] = await Promise.all([
                    fetchCSV(CONFIG.girlsUrl), fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl)
                ]);

                const girlInfo = girlsData.find(g => (g.name || g.girl_name || g['姓名'] || "").trim() === targetName);
                if (!girlInfo) { document.getElementById('error-message').style.display = 'block'; hideLoading(); return; }

                const finalTeam = girlInfo.team || girlInfo['球隊'] || "自由球員";
                document.getElementById('page-title').innerText = targetName;
                
                let teamColor = 'var(--theme-main)';
                if(finalTeam.includes('兄弟')) teamColor = '#f1c40f'; 
                else if(finalTeam.includes('味全')) teamColor = '#e74c3c'; 
                else if(finalTeam.includes('統一')) teamColor = '#e67e22'; 
                else if(finalTeam.includes('富邦')) teamColor = '#3498db'; 
                else if(finalTeam.includes('台鋼')) teamColor = '#2ecc71'; 
                
                const badge = document.getElementById('team-badge');
                badge.innerText = finalTeam;
                badge.style.background = teamColor;

                // 🌟 終極擴充字典：把所有你看得不順眼的英文全部抓出來翻譯
                const keyDictionary = {
                    'id': '號碼', 'number': '號碼', 'no': '號碼',
                    'birthday': '生日', 'height': '身高', 'weight': '體重', 
                    'blood_type': '血型', 'constellation': '星座', 'zodiac': '星座', 
                    'years': '年資', 'favorite_player': '最愛球員', 
                    'food': '喜愛美食', 'hobby': '興趣', 'country': '國籍'
                };

                const extraContainer = document.getElementById('extra-info-container');
                const excludeKeys = ['name', 'girl_name', '姓名', 'team', '球隊', 'photo', 'ig', 'year'];
                Object.keys(girlInfo).forEach(key => {
                    if (!excludeKeys.includes(key.toLowerCase()) && girlInfo[key]) {
                        const prettyLabel = keyDictionary[key.toLowerCase()] || key;
                        extraContainer.innerHTML += `
                            <div class="info-tag">
                                <span class="label">${prettyLabel}</span>
                                <span class="value">${girlInfo[key]}</span>
                            </div>`;
                    }
                });

                const photoUrl = girlInfo.photo || girlInfo['圖片'];
                if (photoUrl) {
                    document.getElementById('avatar-container').innerHTML = `<img src="${photoUrl.trim()}" alt="${targetName}" style="width:100%;height:100%;object-fit:cover;">`;
                }

                // ⚾ 數據計算與表格填充
                let win = 0, loss = 0, delay = 0, totalOvertimeGames = 0, totalScored = 0, totalAllowed = 0, historyHtml = '';
                
                const schedules = scheduleData.filter(s => (s.girl_name || s.name || s['姓名'] || "").trim() === targetName);
                
                schedules.forEach(s => {
                    if(!s.working_dates) return;
                    const workList = parseWorkingDate(s.working_dates);
                    workList.forEach(w => {
                        let resHtml = '-', gNo = '-', opp = '-', sco = '-', winP = '-', lossP = '-', savP = '-', mvpP = '-', attP = '-', durP = '-', locP = '-';
                        const wNums = w.date.match(/\d+/g);
                        if (wNums && wNums.length >= 2) {
                            const wM = parseInt(wNums[0], 10), wD = parseInt(wNums[1], 10);
                            const match = matchesData.find(m => {
                                if(s.year && m.year && s.year.toString() !== m.year.toString()) return false;
                                if(m.team && m.team.trim() !== finalTeam) return false;
                                const mNums = m.date ? m.date.match(/\d+/g) : null;
                                return mNums && mNums.length >= 2 && parseInt(mNums[0], 10) === wM && parseInt(mNums[1], 10) === wD;
                            });

                            if(match) {
                                gNo = match.game_no || '-';
                                opp = match.opponent || match['對手'] || '-';
                                sco = match.score || match['比分'] || '-';
                                winP = match.win_pitcher || match['勝投'] || '-';
                                lossP = match.loss_pitcher || match['敗投'] || '-';
                                savP = match.save || match['救援'] || '-';
                                mvpP = match.mvp || match['MVP'] || '-';
                                attP = match.attendance || match['觀眾數'] || '-';
                                durP = match.duration || match['比賽時間'] || '-';
                                locP = match.location || match['地點'] || '-';
                                
                                const inn = parseInt(match.innings || match['局數'] || 9);
                                if(inn > 9) {
                                    totalOvertimeGames++; 
                                    sco += `<span class="overtime-badge" style="font-size:10px;">${inn}局</span>`;
                                }

                                const res = (match.result || match['結果'] || '').trim();
                                const scoreData = parseScoreForTeam(match.score, res);
                                if(res.includes('勝')) { win++; totalScored += scoreData.scored; totalAllowed += scoreData.allowed; resHtml = `<span class="win">勝</span>`; }
                                else if(res.includes('敗')) { loss++; totalScored += scoreData.scored; totalAllowed += scoreData.allowed; resHtml = `<span class="loss">敗</span>`; }
                                else if(res.includes('延')) { delay++; resHtml = `<span style="background:#bdc3c7; color:white; padding:4px 10px; border-radius:12px;">延賽</span>`; }
                            }
                        }
                        
                        historyHtml += `<tr>
                            <td style="font-weight:bold;">${w.date}</td>
                            <td style="font-size:12px; color:var(--text-muted);">${gNo}</td>
                            <td>${opp}</td>
                            <td style="font-weight:bold;">${sco}</td>
                            <td>${resHtml}</td>
                            <td style="color:#e74c3c;">${winP}</td>
                            <td style="color:#3498db;">${lossP}</td>
                            <td style="color:#2ecc71;">${savP}</td>
                            <td style="color:#f39c12; font-weight:bold;">${mvpP}</td>
                            <td style="font-weight:bold;">${attP}</td>
                            <td style="font-size:12px;">${durP}</td>
                            <td>${locP}</td>
                            <td style="color:var(--theme-main); font-weight:900;">${w.position || '-'}</td>
                        </tr>`;
                    });
                });

                document.getElementById('stat-games').innerText = `${win+loss} 場`;
                document.getElementById('stat-record').innerText = `${win}勝 ${loss}敗`;
                document.getElementById('stat-winrate').innerText = (win+loss) > 0 ? `${((win/(win+loss))*100).toFixed(1)}%` : '0%';
                document.getElementById('stat-overtime').innerText = `${totalOvertimeGames} 場`;
                document.getElementById('stat-points').innerText = `${totalScored} / ${totalAllowed}`;
                document.getElementById('history-list').innerHTML = historyHtml;

                document.getElementById('profile-card').style.display = 'flex';
                document.getElementById('mini-dashboard').style.display = 'grid';
                document.getElementById('history-card').style.display = 'block';
                hideLoading();
            } catch (error) {
                console.error(error);
                document.getElementById('error-message').style.display = 'block';
                hideLoading();
            }
        }
        initDetail();
    </script>
</body>
</html>
