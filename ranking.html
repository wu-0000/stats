<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 全聯盟數據排行榜</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🏆 專業數據表格防破版對齊系統 */
        .pro-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .pro-table th {
            background-color: rgba(255, 117, 140, 0.1);
            color: var(--theme-main);
            font-weight: 900;
            padding: 15px 10px;
        }
        [data-theme="dark"] .pro-table th { background-color: #252525; }
        
        /* 核心：保證名字與數據絕對不換行、完美置中 */
        .pro-table th, .pro-table td {
            white-space: nowrap !important;
            text-align: center;
            vertical-align: middle;
            border-bottom: 1px solid #fff0f5;
            padding: 12px 10px;
        }
        [data-theme="dark"] .pro-table td { border-bottom: 1px solid #333333; }
        
        .pro-table tbody tr:hover {
            background-color: rgba(255, 117, 140, 0.05);
            cursor: pointer;
        }
        
        /* 排名數字樣式 */
        .rank-num { font-size: 16px; font-weight: 900; color: var(--text-muted); }
        .rank-1 { color: #f1c40f; font-size: 20px; } /* 金 */
        .rank-2 { color: #95a5a6; font-size: 18px; } /* 銀 */
        .rank-3 { color: #d35400; font-size: 18px; } /* 銅 */
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">📊 正在運算全聯盟專業數據...</div>
    </div>

    <div class="container">
        <div class="back-btn-container" style="margin-bottom: 20px;">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header" style="justify-content: center; text-align: center;">
            <h1 style="margin: 0; color: var(--theme-main);">📊 全聯盟數據排行榜</h1>
        </div>

        <div class="table-responsive" style="margin-top: 20px;">
            <table class="pro-table">
                <thead>
                    <tr>
                        <th>名次</th>
                        <th>隊伍</th>
                        <th>女孩姓名</th>
                        <th>出賽</th>
                        <th>勝投</th>
                        <th>敗投</th>
                        <th>勝率</th>
                        <th>延賽</th>
                    </tr>
                </thead>
                <tbody id="ranking-list-body">
                    <tr><td colspan="8">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initProRanking() {
            try {
                const [scheduleData, matchesData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl), fetchCSV(CONFIG.girlsUrl)
                ]);

                let girlStats = {};
                girlsData.forEach(g => {
                    const key = g.name.trim() + "_" + g.team.trim();
                    girlStats[key] = {
                        name: g.name.trim(), team: g.team.trim(), 
                        wins: 0, losses: 0, delays: 0, games: 0
                    };
                });

                scheduleData.forEach(s => {
                    const girlName = (s.girl_name || '').trim();
                    const girlInfo = girlsData.find(g => g.name && g.name.trim() === girlName);
                    const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team || '').trim();
                    const key = girlName + "_" + girlTeam;
                    if(!girlStats[key]) return; 
                    
                    const sYearStr = s.year ? s.year.toString().trim() : '';

                    if(s.working_dates) {
                        const workList = parseWorkingDate(s.working_dates);
                        workList.forEach(w => {
                            const wNums = w.date ? w.date.match(/\d+/g) : null;
                            if (!wNums || wNums.length < 2) return;
                            const wM = parseInt(wNums[0], 10), wD = parseInt(wNums[1], 10);

                            const match = matchesData.find(m => {
                                const mYearStr = m.year ? m.year.toString().trim() : '';
                                if (sYearStr && mYearStr && sYearStr !== mYearStr) return false;
                                if (m.team && m.team.trim() !== girlTeam) return false;
                                const mNums = m.date ? m.date.match(/\d+/g) : null;
                                return (mNums && mNums.length >= 2 && parseInt(mNums[0], 10) === wM && parseInt(mNums[1], 10) === wD);
                            });

                            if(match && match.result) {
                                const res = match.result.trim();
                                if(res === '勝') { girlStats[key].wins++; girlStats[key].games++; }
                                else if(res === '敗') { girlStats[key].losses++; girlStats[key].games++; }
                                else if(res === '延賽') { girlStats[key].delays++; }
                            }
                        });
                    }
                });

                // 轉為陣列並預設以「勝率」+「勝場數」排序
                let sortedGirls = Object.values(girlStats)
                    .filter(g => g.games > 0) // 有出賽才列入榜單
                    .map(g => {
                        g.winRate = (g.wins / g.games) * 100;
                        return g;
                    })
                    .sort((a, b) => {
                        if (b.winRate !== a.winRate) return b.winRate - a.winRate; // 先比勝率
                        return b.wins - a.wins; // 勝率一樣比勝場
                    });

                const tbody = document.getElementById('ranking-list-body');
                tbody.innerHTML = '';

                sortedGirls.forEach((g, index) => {
                    const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : 'rank-num';
                    const shortTeam = g.team.replace('桃猿','').replace('兄弟','').replace('悍將','').replace('雄鷹','');
                    
                    let teamColor = 'var(--text-muted)';
                    if(g.team.includes('兄弟')) teamColor = '#f1c40f'; 
                    else if(g.team.includes('味全')) teamColor = '#e74c3c'; 
                    else if(g.team.includes('統一')) teamColor = '#e67e22'; 
                    else if(g.team.includes('富邦')) teamColor = '#3498db'; 
                    else if(g.team.includes('樂天')) teamColor = 'var(--theme-main)'; 

                    const tr = document.createElement('tr');
                    tr.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(g.name)}&team=${encodeURIComponent(g.team)}`;
                    tr.innerHTML = `
                        <td class="${rankClass}">${index + 1}</td>
                        <td><span style="background:${teamColor}; color:white; padding:3px 8px; border-radius:8px; font-size:12px; font-weight:bold;">${shortTeam}</span></td>
                        <td style="font-weight:900; font-size:16px;">${g.name}</td>
                        <td style="font-weight:bold;">${g.games}</td>
                        <td style="color:#e74c3c; font-weight:bold;">${g.wins}</td>
                        <td style="color:#3498db; font-weight:bold;">${g.losses}</td>
                        <td style="font-weight:900;">${g.winRate.toFixed(1)}%</td>
                        <td style="color:var(--text-muted);">${g.delays}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('ranking-list-body').innerHTML = '<tr><td colspan="8" style="color:red;">載入失敗</td></tr>';
            } finally { hideLoading(); }
        }

        initProRanking();
    </script>
</body>
</html>
