<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>樂天女孩 - 年度排行榜</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d90000; padding-bottom: 10px; }
        .controls { margin: 20px 0; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-size: 16px; color: #555; margin-bottom: 10px; }
        .card-winner { font-size: 24px; font-weight: bold; color: #d90000; margin-bottom: 5px; }
        .card-value { font-size: 18px; color: #333; }
        table { width: 100%; border-collapse: collapse; text-align: center; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #eee; cursor: pointer; }
        th:hover { background: #ddd; }
        .rank-1 { background-color: #ffd700; font-weight: bold; } /* 第一名金底 */
        .rank-2 { background-color: #c0c0c0; } /* 第二名銀底 */
        .rank-3 { background-color: #cd7f32; } /* 第三名銅底 */
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 年度排行榜總覽</h1>
        <a href="index.html">返回首頁</a>
    </div>

    <div class="controls">
        <select id="year-select">
            <option value="2026">2026 年度</option>
            </select>
    </div>

    <div class="dashboard" id="top-cards">
        <div class="card"><div class="card-title">👑 勝率女王 (最高勝率)</div><div id="top-winrate" class="card-winner">-</div><div id="top-winrate-val" class="card-value">-</div></div>
        <div class="card"><div class="card-title">🌧️ 延賽體質 (最多延賽)</div><div id="top-delay" class="card-winner">-</div><div id="top-delay-val" class="card-value">-</div></div>
        <div class="card"><div class="card-title">🔋 爆肝楷模 (上班最久)</div><div id="top-duration" class="card-winner">-</div><div id="top-duration-val" class="card-value">-</div></div>
        <div class="card"><div class="card-title">💔 苦吞敗后 (最低勝率)</div><div id="low-winrate" class="card-winner">-</div><div id="low-winrate-val" class="card-value">-</div></div>
    </div>

    <h2>📊 全體女孩數據 (點擊標題可排序)</h2>
    <table id="ranking-table">
        <thead>
            <tr>
                <th>女孩姓名</th>
                <th onclick="sortTable('totalGames')">總場次 ↕</th>
                <th onclick="sortTable('wins')">勝場 ↕</th>
                <th onclick="sortTable('losses')">敗場 ↕</th>
                <th onclick="sortTable('winRate')">勝率 ↕</th>
                <th onclick="sortTable('delays')">延賽 ↕</th>
                <th onclick="sortTable('duration')">上班時數 ↕</th>
            </tr>
        </thead>
        <tbody id="ranking-body">
            <tr><td colspan="7">資料載入與計算中...</td></tr>
        </tbody>
    </table>

    <script src="app.js"></script>
    <script>
        let allStats = []; // 儲存計算完的總資料

        async function loadRankingData() {
            const selectedYear = document.getElementById('year-select').value;
            document.getElementById('ranking-body').innerHTML = '<tr><td colspan="7">資料載入與計算中...</td></tr>';

            try {
                // 一口氣抓取三個資料表
                const [girlsData, scheduleData, matchesData] = await Promise.all([
                    fetchCSV(CONFIG.girlsUrl),
                    fetchCSV(CONFIG.scheduleUrl),
                    fetchCSV(CONFIG.matchesUrl)
                ]);

                // 只挑出樂天女孩
                const rakutenGirls = girlsData.filter(g => g.team && g.team.trim() === "樂天");
                allStats = [];

                // 針對每個女孩進行運算
                rakutenGirls.forEach(girl => {
                    const sched = scheduleData.find(s => s.girl_name && s.girl_name.trim() === girl.name && s.year === selectedYear);
                    if (!sched || !sched.working_dates) return; // 沒班表就跳過

                    const workList = parseWorkingDate(sched.working_dates);
                    let w = 0, l = 0, d = 0, totalMin = 0;

                    workList.forEach(work => {
                        const m = matchesData.find(m => m.date && m.date.trim() === work.date.trim() && m.year === selectedYear);
                        if (m) {
                            const res = m.result ? m.result.trim() : "";
                            if (res === '勝') w++;
                            else if (res === '敗') l++;
                            else if (res === '延賽') d++;
                            totalMin += parseDuration(m.duration);
                        }
                    });

                    const tGames = w + l;
                    // 避免除以 0，若沒有勝敗紀錄，勝率為 0 (避免負值或 NaN)
                    const wRate = tGames > 0 ? parseFloat(((w / tGames) * 100).toFixed(1)) : 0; 

                    allStats.push({
                        name: girl.name,
                        totalGames: tGames + d, // 勝+敗+延賽
                        wins: w,
                        losses: l,
                        delays: d,
                        duration: totalMin, // 分鐘
                        winRate: wRate
                    });
                });

                renderDashboard();
                renderTable(allStats);

            } catch (error) {
                console.error(error);
                document.getElementById('ranking-body').innerHTML = '<tr><td colspan="7" style="color:red;">資料載入失敗</td></tr>';
            }
        }

        function renderDashboard() {
            if (allStats.length === 0) return;

            // 過濾出至少有勝敗紀錄的人來比勝率，比較公平
            const validWinRateStats = allStats.filter(s => (s.wins + s.losses) > 0);

            // 最高勝率
            if (validWinRateStats.length > 0) {
                const topWin = [...validWinRateStats].sort((a, b) => b.winRate - a.winRate)[0];
                document.getElementById('top-winrate').innerText = topWin.name;
                document.getElementById('top-winrate-val').innerText = `${topWin.winRate}%`;

                // 最低勝率
                const lowWin = [...validWinRateStats].sort((a, b) => a.winRate - b.winRate)[0];
                document.getElementById('low-winrate').innerText = lowWin.name;
                document.getElementById('low-winrate-val').innerText = `${lowWin.winRate}%`;
            }

            // 最多延賽
            const topDelay = [...allStats].sort((a, b) => b.delays - a.delays)[0];
            if(topDelay && topDelay.delays > 0) {
                document.getElementById('top-delay').innerText = topDelay.name;
                document.getElementById('top-delay-val').innerText = `${topDelay.delays} 場`;
            }

            // 上班最久
            const topTime = [...allStats].sort((a, b) => b.duration - a.duration)[0];
            if(topTime && topTime.duration > 0) {
                document.getElementById('top-duration').innerText = topTime.name;
                document.getElementById('top-duration-val').innerText = formatMinutes(topTime.duration);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">尚無數據</td></tr>';
                return;
            }

            data.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${s.name}</strong></td>
                    <td>${s.totalGames}</td>
                    <td>${s.wins}</td>
                    <td>${s.losses}</td>
                    <td>${s.winRate}%</td>
                    <td>${s.delays}</td>
                    <td>${formatMinutes(s.duration)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 表格排序功能
        let sortAsc = false;
        function sortTable(key) {
            sortAsc = !sortAsc;
            const sortedData = [...allStats].sort((a, b) => {
                return sortAsc ? a[key] - b[key] : b[key] - a[key];
            });
            renderTable(sortedData);
        }

        document.getElementById('year-select').addEventListener('change', loadRankingData);
        
        // 啟動
        loadRankingData();
    </script>
</body>
</html>
