<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全聯盟數據排行榜</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🎀 標題漸層美化與 SVG 圖示對齊 */
        .header-title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .header h1 {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 2px;
        }

        /* 💊 排行榜切換按鈕 (加入 SVG 圖示對齊) */
        .sort-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
        .sort-tabs button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 900;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .sort-tabs button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .sort-tabs button.active-sort {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border-color: #ff758c;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
            transform: translateY(-2px);
        }
        .sort-tabs button.inactive-sort {
            background: transparent;
            color: var(--text-muted);
            border-color: #ffccd5;
        }
        .sort-tabs button.inactive-sort:hover {
            background: rgba(255, 117, 140, 0.08);
            color: var(--theme-main);
            transform: translateY(-1px);
        }
        [data-theme="dark"] .sort-tabs button.inactive-sort { border-color: #555; color: #aaa; }
        [data-theme="dark"] .sort-tabs button.inactive-sort:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* 🏆 專業數據表格防破版對齊系統 */
        .pro-table-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 117, 140, 0.15);
        }
        [data-theme="dark"] .pro-table-wrapper { border-color: #333; }

        .pro-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .pro-table th {
            background-color: rgba(255, 117, 140, 0.08);
            color: var(--theme-main);
            font-weight: 900;
            padding: 18px 10px;
            font-size: 15px;
        }
        [data-theme="dark"] .pro-table th { background-color: #252525; }
        
        .pro-table th, .pro-table td {
            white-space: nowrap !important;
            text-align: center;
            vertical-align: middle;
            border-bottom: 1px solid #fff0f5;
            padding: 15px 10px;
        }
        [data-theme="dark"] .pro-table td { border-bottom: 1px solid #333333; }
        
        .pro-table tbody tr { transition: background 0.2s; }
        .pro-table tbody tr:hover {
            background-color: rgba(255, 117, 140, 0.05);
            cursor: pointer;
        }
        [data-theme="dark"] .pro-table tbody tr:hover { background-color: rgba(255, 255, 255, 0.03); }
        
        /* 🔥 立體漸層名次勳章 */
        .rank-num { font-size: 16px; font-weight: 900; color: var(--text-muted); }
        .rank-badge {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 14px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700 0%, #F39C12 100%); } 
        .rank-2 { background: linear-gradient(135deg, #E0E0E0 0%, #95A5A6 100%); } 
        .rank-3 { background: linear-gradient(135deg, #E67E22 0%, #D35400 100%); } 
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在運算全聯盟專業數據...</div>
    </div>

    <div class="container">
        <div class="back-btn-container" style="margin-bottom: 15px;">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header" style="justify-content: center; text-align: center; flex-direction: column;">
            <div class="header-title-container">
                <svg viewBox="0 0 24 24" width="32" height="32">
                    <defs>
                        <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff758c" />
                            <stop offset="100%" stop-color="#ff7eb3" />
                        </linearGradient>
                    </defs>
                    <path fill="url(#title-grad)" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <h1>全聯盟數據排行榜</h1>
            </div>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: bold; margin-top: 5px;">點擊下方按鈕切換排行項目</p>
        </div>

        <div class="sort-tabs">
            <button class="active-sort" onclick="sortData('winRate')">
                <svg viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/></svg> 
                最高勝率
            </button>
            <button class="inactive-sort" onclick="sortData('wins')">
                <svg viewBox="0 0 24 24"><path d="M17.5 11.2c-.3 1.1-1 2.1-1.9 2.8.5-1.5.3-3.2-.8-4.5-.4-.4-.9-.7-1.4-.9C13 8 12.8 7.3 12.8 6.5c0-.6.1-1.2.3-1.8-.8.3-1.6.8-2.2 1.5-1.5 1.5-2.2 3.6-1.8 5.7.1.6.3 1.2.6 1.7-.8-.6-1.4-1.3-1.8-2.2-.4-.9-.5-1.9-.4-2.8-.2.2-.4.4-.6.6-1.3 1.5-2 3.5-1.8 5.6.2 2 1.3 3.8 3 4.9 1.7 1.1 3.8 1.4 5.8.9 2-.5 3.7-1.8 4.7-3.5 1-1.8 1.2-3.9.5-5.9z"/></svg> 
                最多勝場
            </button>
            <button class="inactive-sort" onclick="sortData('games')">
                <svg viewBox="0 0 24 24"><path d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.06-.11l5.4-9.71L13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21z"/></svg> 
                鐵人出勤
            </button>
            <button class="inactive-sort" onclick="sortData('delays')">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg> 
                延賽/保留王
            </button>
        </div>

        <div class="table-responsive pro-table-wrapper">
            <table class="pro-table">
                <thead>
                    <tr>
                        <th>名次</th>
                        <th>隊伍</th>
                        <th>女孩姓名</th>
                        <th>出勤</th>
                        <th>勝場</th>
                        <th>敗場</th>
                        <th>和局</th>
                        <th>勝率</th>
                        <th>延賽/保留</th>
                    </tr>
                </thead>
                <tbody id="ranking-list-body">
                    <tr><td colspan="9" style="padding: 30px;">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allGirlsStatsArray = []; 
        let currentSortType = 'winRate';

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initProRanking() {
            try {
                const [scheduleData, matchesData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl), fetchCSV(CONFIG.girlsUrl)
                ]);

                let girlStats = {};
                girlsData.forEach(g => {
                    const key = g.name.trim() + "_" + g.team.trim();
                    girlStats[key] = {
                        name: g.name.trim(), 
                        team: g.team.trim(), 
                        wins: 0, losses: 0, ties: 0, delays: 0, suspends: 0, games: 0
                    };
                });

                scheduleData.forEach(s => {
                    const girlName = (s.girl_name || '').trim();
                    const girlInfo = girlsData.find(g => g.name && g.name.trim() === girlName);
                    const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team || '').trim();
                    const key = girlName + "_" + girlTeam;
                    if(!girlStats[key]) return; 
                    
                    const sYearStr = s.year ? s.year.toString().trim() : '';

                    if(s.working_dates) {
                        const workList = parseWorkingDate(s.working_dates);
                        workList.forEach(w => {
                            const wNums = w.date ? w.date.match(/\d+/g) : null;
                            if (!wNums || wNums.length < 2) return;
                            const wM = parseInt(wNums[0], 10), wD = parseInt(wNums[1], 10);

                            girlStats[key].games++;

                            const match = matchesData.find(m => {
                                const mYearStr = m.year ? m.year.toString().trim() : '';
                                if (sYearStr && mYearStr && sYearStr !== mYearStr) return false;
                                if (m.team && m.team.trim() !== girlTeam) return false;
                                const mNums = m.date ? m.date.match(/\d+/g) : null;
                                return (mNums && mNums.length >= 2 && parseInt(mNums[0], 10) === wM && parseInt(mNums[1], 10) === wD);
                            });

                            if(match && match.result) {
                                const res = match.result.trim();
                                if(res.includes('勝')) { girlStats[key].wins++; }
                                else if(res.includes('敗')) { girlStats[key].losses++; }
                                else if(res.includes('和')) { girlStats[key].ties++; }
                                else if(res.includes('保')) { girlStats[key].suspends++; }
                                else if(res.includes('延')) { girlStats[key].delays++; }
                            }
                        });
                    }
                });

                allGirlsStatsArray = Object.values(girlStats)
                    .filter(g => g.games > 0)
                    .map(g => {
                        const totalDecisions = g.wins + g.losses;
                        g.winRate = totalDecisions > 0 ? (g.wins / totalDecisions) * 100 : 0;
                        g.totalDelays = g.delays + g.suspends; 
                        return g;
                    });

                sortData('winRate'); 

            } catch (error) {
                console.error(error);
                document.getElementById('ranking-list-body').innerHTML = '<tr><td colspan="9" style="color:red; padding:30px;">資料載入失敗</td></tr>';
            } finally { hideLoading(); }
        }

        window.sortData = function(sortType) {
            currentSortType = sortType;

            const buttons = document.querySelectorAll('.sort-tabs button');
            buttons.forEach(btn => {
                if (btn.getAttribute('onclick').includes(sortType)) {
                    btn.className = 'active-sort';
                } else {
                    btn.className = 'inactive-sort';
                }
            });

            allGirlsStatsArray.sort((a, b) => {
                if (sortType === 'winRate') {
                    if (b.winRate !== a.winRate) return b.winRate - a.winRate; 
                    return b.wins - a.wins; 
                } else if (sortType === 'wins') {
                    if (b.wins !== a.wins) return b.wins - a.wins;
                    return b.winRate - a.winRate;
                } else if (sortType === 'games') {
                    if (b.games !== a.games) return b.games - a.games;
                    return b.wins - a.wins;
                } else if (sortType === 'delays') {
                    if (b.totalDelays !== a.totalDelays) return b.totalDelays - a.totalDelays;
                    return b.games - a.games;
                }
            });

            const tbody = document.getElementById('ranking-list-body');
            tbody.innerHTML = '';

            allGirlsStatsArray.forEach((g, index) => {
                let rankDisplay = `<span class="rank-num">${index + 1}</span>`;
                if (index === 0) rankDisplay = `<span class="rank-badge rank-1">1</span>`;
                else if (index === 1) rankDisplay = `<span class="rank-badge rank-2">2</span>`;
                else if (index === 2) rankDisplay = `<span class="rank-badge rank-3">3</span>`;

                let teamColor = 'var(--text-muted)';
                let displayTeam = g.team;

                if (g.team.includes('樂天')) { displayTeam = 'Rakuten Girls'; teamColor = 'var(--theme-main)'; }
                else if (g.team.includes('兄弟')) { displayTeam = 'Passion Sisters'; teamColor = '#f1c40f'; }
                else if (g.team.includes('味全')) { displayTeam = 'Dragon Beauties'; teamColor = '#e74c3c'; }
                else if (g.team.includes('統一')) { displayTeam = 'Uni Girls'; teamColor = '#e67e22'; }
                else if (g.team.includes('富邦')) { displayTeam = 'Fubon Angels'; teamColor = '#3498db'; }
                else if (g.team.includes('台鋼')) { displayTeam = 'WING STARS'; teamColor = '#2ecc71'; }

                const tr = document.createElement('tr');
                tr.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(g.name)}&team=${encodeURIComponent(g.team)}`;
                tr.innerHTML = `
                    <td>${rankDisplay}</td>
                    <td><span style="background:${teamColor}; color:white; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">${displayTeam}</span></td>
                    <td style="font-weight:900; font-size:17px;">${g.name}</td>
                    <td style="font-weight:bold;">${g.games}</td>
                    <td style="color:#e74c3c; font-weight:bold;">${g.wins}</td>
                    <td style="color:#3498db; font-weight:bold;">${g.losses}</td>
                    <td style="color:#2ecc71; font-weight:bold;">${g.ties}</td>
                    <td style="font-weight:900;">${g.winRate.toFixed(1)}%</td>
                    <td style="color:var(--text-muted); font-weight:bold;">${g.totalDelays}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        initProRanking();
    </script>
</body>
</html>
