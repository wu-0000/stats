<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂天女孩 - 年度排行榜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 年度排行榜總覽</h1>
            <a href="index.html" class="btn btn-secondary">返回首頁</a>
        </div>

        <div style="margin-bottom: 20px;">
            <select id="year-select">
                <option value="2026">2026 年度</option>
            </select>
        </div>

        <div class="dashboard" id="top-cards">
            <div class="card"><div style="color:#555">👑 勝率女王</div><div id="top-winrate" style="font-size:24px; color:var(--rakuten-red); font-weight:bold;">-</div><div id="top-winrate-val">-</div></div>
            <div class="card"><div style="color:#555">🌧️ 延賽體質</div><div id="top-delay" style="font-size:24px; color:var(--rakuten-red); font-weight:bold;">-</div><div id="top-delay-val">-</div></div>
            <div class="card"><div style="color:#555">🔋 爆肝楷模</div><div id="top-duration" style="font-size:24px; color:var(--rakuten-red); font-weight:bold;">-</div><div id="top-duration-val">-</div></div>
            <div class="card"><div style="color:#555">💔 苦吞敗后</div><div id="low-winrate" style="font-size:24px; color:var(--rakuten-red); font-weight:bold;">-</div><div id="low-winrate-val">-</div></div>
        </div>

        <h2>📊 全體女孩數據 (點擊標題可排序)</h2>
        <div class="table-responsive">
            <table id="ranking-table">
                <thead>
                    <tr>
                        <th style="cursor:pointer;">女孩姓名</th>
                        <th style="cursor:pointer;" onclick="sortTable('totalGames')">總場次 ↕</th>
                        <th style="cursor:pointer;" onclick="sortTable('wins')">勝場 ↕</th>
                        <th style="cursor:pointer;" onclick="sortTable('losses')">敗場 ↕</th>
                        <th style="cursor:pointer;" onclick="sortTable('winRate')">勝率 ↕</th>
                        <th style="cursor:pointer;" onclick="sortTable('delays')">延賽 ↕</th>
                        <th style="cursor:pointer;" onclick="sortTable('duration')">上班時數 ↕</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <tr><td colspan="7">資料載入與計算中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allStats = []; 

        async function loadRankingData() {
            const selectedYear = document.getElementById('year-select').value;
            try {
                const [girlsData, scheduleData, matchesData] = await Promise.all([
                    fetchCSV(CONFIG.girlsUrl), fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl)
                ]);

                const rakutenGirls = girlsData.filter(g => g.team && g.team.trim() === "樂天");
                allStats = [];

                rakutenGirls.forEach(girl => {
                    const sched = scheduleData.find(s => s.girl_name && s.girl_name.trim() === girl.name && s.year === selectedYear);
                    if (!sched || !sched.working_dates) return; 

                    const workList = parseWorkingDate(sched.working_dates);
                    let w = 0, l = 0, d = 0, totalMin = 0;

                    workList.forEach(work => {
                        const m = matchesData.find(m => m.date && m.date.trim() === work.date.trim() && m.year === selectedYear);
                        if (m) {
                            const res = m.result ? m.result.trim() : "";
                            if (res === '勝') w++; else if (res === '敗') l++; else if (res === '延賽') d++;
                            totalMin += parseDuration(m.duration);
                        }
                    });

                    const tGames = w + l;
                    const wRate = tGames > 0 ? parseFloat(((w / tGames) * 100).toFixed(1)) : 0; 

                    allStats.push({ name: girl.name, totalGames: tGames + d, wins: w, losses: l, delays: d, duration: totalMin, winRate: wRate });
                });

                renderDashboard();
                renderTable(allStats);
            } catch (error) {
                console.error(error);
            }
        }

        function renderDashboard() {
            if (allStats.length === 0) return;
            const validWinRateStats = allStats.filter(s => (s.wins + s.losses) > 0);
            if (validWinRateStats.length > 0) {
                const topWin = [...validWinRateStats].sort((a, b) => b.winRate - a.winRate)[0];
                document.getElementById('top-winrate').innerText = topWin.name;
                document.getElementById('top-winrate-val').innerText = `${topWin.winRate}%`;
                const lowWin = [...validWinRateStats].sort((a, b) => a.winRate - b.winRate)[0];
                document.getElementById('low-winrate').innerText = lowWin.name;
                document.getElementById('low-winrate-val').innerText = `${lowWin.winRate}%`;
            }
            const topDelay = [...allStats].sort((a, b) => b.delays - a.delays)[0];
            if(topDelay && topDelay.delays > 0) {
                document.getElementById('top-delay').innerText = topDelay.name;
                document.getElementById('top-delay-val').innerText = `${topDelay.delays} 場`;
            }
            const topTime = [...allStats].sort((a, b) => b.duration - a.duration)[0];
            if(topTime && topTime.duration > 0) {
                document.getElementById('top-duration').innerText = topTime.name;
                document.getElementById('top-duration-val').innerText = formatMinutes(topTime.duration);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = '';
            if (data.length === 0) return tbody.innerHTML = '<tr><td colspan="7">尚無數據</td></tr>';
            data.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><strong>${s.name}</strong></td><td>${s.totalGames}</td><td>${s.wins}</td><td>${s.losses}</td><td>${s.winRate}%</td><td>${s.delays}</td><td>${formatMinutes(s.duration)}</td>`;
                tbody.appendChild(tr);
            });
        }

        let sortAsc = false;
        function sortTable(key) {
            sortAsc = !sortAsc;
            renderTable([...allStats].sort((a, b) => sortAsc ? a[key] - b[key] : b[key] - a[key]));
        }

        document.getElementById('year-select').addEventListener('change', loadRankingData);
        loadRankingData();
    </script>
</body>
</html>
