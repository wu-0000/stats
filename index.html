<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華職棒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; }
        .rakuten-pink { background-color: #bf0845; }
        .pink-gradient { background: linear-gradient(135deg, #bf0845 0%, #e63946 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 4px solid #bf0845; color: #bf0845; font-weight: bold; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        
        .number-badge { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #bf0845; 
            color: white; 
            width: 28px;
            height: 28px;
            border-radius: 50%; 
            font-size: 0.75rem; 
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 4px rgba(191, 8, 69, 0.2);
        }
    </style>
</head>
<body class="pb-10">

    <header class="pink-gradient text-white py-6 text-center shadow-lg mb-4">
        <h1 class="text-3xl font-bold tracking-wider">📣 中華職棒</h1>
        <p class="mt-1 opacity-90 text-sm">樂天女孩戰報與數據統計</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        
        <div class="flex flex-wrap border-b border-gray-200 mb-6 bg-white rounded-t-lg overflow-hidden text-sm md:text-base">
            <button onclick="switchTab(0)" id="tab0" class="flex-1 py-4 text-center hover:bg-pink-50 transition tab-active">三月</button>
            <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4 text-center hover:bg-pink-50 transition">四月</button>
            <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4 text-center hover:bg-pink-50 transition">五月</button>
            <button onclick="switchTab(3)" id="tab3" class="flex-1 py-4 text-center hover:bg-pink-50 transition">總表</button>
            <button onclick="switchTab(4)" id="tab4" class="flex-1 py-4 text-center hover:bg-pink-50 transition">女孩介紹</button>
        </div>

        <div id="statsSection">
            <div id="statsDashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="card p-4 text-center border-b-4 border-pink-100">
                    <p class="text-gray-500 text-xs">應援場次</p>
                    <p id="totalGames" class="text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="card p-4 text-center border-b-4 border-green-100">
                    <p class="text-gray-500 text-xs">團隊勝場 (W)</p>
                    <p id="teamWins" class="text-2xl font-bold text-green-500">-</p>
                </div>
                <div class="card p-4 text-center border-b-4 border-red-100">
                    <p class="text-gray-500 text-xs">團隊敗場 (L)</p>
                    <p id="teamLosses" class="text-2xl font-bold text-red-400">-</p>
                </div>
                <div class="card p-4 text-center border-l-4 border-pink-500">
                    <p class="text-gray-500 text-xs">統計期間</p>
                    <p id="currentMonthLabel" class="text-2xl font-bold text-pink-600">三月</p>
                </div>
            </div>

            <section class="card overflow-hidden mb-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-pink-50 text-pink-700 text-sm">
                                <th class="p-4"># 姓名</th>
                                <th class="p-4">應援場次</th>
                                <th class="p-4">戰績</th>
                                <th class="p-4">勝率</th>
                            </tr>
                        </thead>
                        <tbody id="girlTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="introSection" class="hidden">
            <div class="card p-10 text-center">
                <div class="text-5xl mb-4">🌸</div>
                <h2 class="text-2xl font-bold text-pink-600 mb-2">女孩詳細介紹</h2>
                <p class="text-gray-500 text-sm">此頁面為預留空間，未來將展示女孩個人特寫與相關簡介。</p>
            </div>
        </div>
    </main>

    <div id="girlModal" class="modal fixed w-full h-full top-0 left-0 flex items-center justify-center opacity-0 pointer-events-none z-50">
        <div class="modal-overlay absolute w-full h-full bg-black opacity-50" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto max-h-[90vh]">
            <div class="modal-content py-4 px-6 text-left">
                <div class="flex justify-between items-center pb-3 border-b mb-4">
                    <p class="text-2xl font-bold text-pink-600" id="modalGirlName"></p>
                    <div class="cursor-pointer text-gray-400 text-xl" onclick="closeModal()">✕</div>
                </div>
                <div id="modalContent" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // 最終修正後的順序與背號
        const girlRoster = [
            { id: "00", name: "琳妲" }, { id: "3", name: "穆又甯" }, { id: "6", name: "宋宋" }, 
            { id: "7", name: "筠熹" }, { id: "8", name: "貝佳頤" }, { id: "9", name: "高橋佳帆" }, 
            { id: "10", name: "卉妮" }, { id: "12", name: "穎樂" }, { id: "15", name: "孟潔" }, 
            { id: "17", name: "笑笑" }, { id: "18", name: "熊霓" }, { id: "19", name: "KIRA" }, 
            { id: "20", name: "MIKA" }, { id: "22", name: "河智媛" }, { id: "24", name: "廉世彬" }, 
            { id: "25", name: "禹洙漢" }, { id: "26", name: "高佳彬" }, { id: "27", name: "若潼" }, 
            { id: "33", name: "言梓璇" }, { id: "34", name: "金佳垠" }, { id: "36", name: "禹菡" }, 
            { id: "66", name: "岱縈" }, { id: "67", name: "崔荷潾" }, { id: "77", name: "曲曲" }, 
            { id: "87", name: "彭彭" }, { id: "88", name: "沈珈妤" }, { id: "97", name: "溫妮" }
        ];

        const games_mar = [
            { date: "2026-03-28", opp: "中信兄弟", res: "W", score: "2:3" },
            { date: "2026-03-29", opp: "味全龍", res: "L", score: "3:2" },
            { date: "2026-03-31", opp: "台鋼雄鷹", res: "L", score: "3:1" }
        ];

        const games_apr = [
            { date: "2026-04-01", opp: "台鋼雄鷹", res: "L", score: "6:1" },
            { date: "2026-04-10", opp: "中信兄弟", res: "W", score: "2:4" },
            { date: "2026-04-11", opp: "中信兄弟", res: "W", score: "1:2" },
            { date: "2026-04-12", opp: "中信兄弟", res: "L", score: "14:4" },
            { date: "2026-04-15", opp: "統一獅", res: "L", score: "5:1" },
            { date: "2026-04-16", opp: "統一獅", res: "L", score: "7:3" },
            { date: "2026-04-21", opp: "富邦悍將", res: "W", score: "1:6" },
            { date: "2026-04-22", opp: "富邦悍將", res: "W", score: "2:4" },
            { date: "2026-04-24", opp: "味全龍", res: "延賽", score: "-" },
            { date: "2026-04-25", opp: "味全龍", res: "L", score: "4:1" },
            { date: "2026-04-26", opp: "味全龍", res: "W", score: "2:3" }
        ];

        const games_may = [
            { date: "2026-05-08", opp: "統一獅", res: "-", score: "" },
            { date: "2026-05-09", opp: "統一獅", res: "-", score: "" },
            { date: "2026-05-10", opp: "統一獅", res: "-", score: "" },
            { date: "2026-05-20", opp: "中信兄弟", res: "-", score: "" },
            { date: "2026-05-22", opp: "富邦悍將", res: "-", score: "" },
            { date: "2026-05-23", opp: "富邦悍將", res: "-", score: "" },
            { date: "2026-05-24", opp: "富邦悍將", res: "-", score: "" },
            { date: "2026-05-29", opp: "台鋼雄鷹", res: "-", score: "" },
            { date: "2026-05-30", opp: "台鋼雄鷹", res: "-", score: "" },
            { date: "2026-05-31", opp: "台鋼雄鷹", res: "-", score: "" }
        ];

        let currentTabIdx = 0;
        const allMonths = [games_mar, games_apr, games_may];

        function getAttendance(name, monthIdx) {
            return allMonths[monthIdx].map(g => g.date).filter(() => Math.random() > 0.4);
        }

        function render() {
            const tbody = document.getElementById('girlTableBody');
            tbody.innerHTML = '';
            
            if (currentTabIdx === 4) {
                document.getElementById('statsSection').classList.add('hidden');
                document.getElementById('introSection').classList.remove('hidden');
                return;
            } else {
                document.getElementById('statsSection').classList.remove('hidden');
                document.getElementById('introSection').classList.add('hidden');
            }

            let displayData = [];
            let dashboard = { total: 0, wins: 0, losses: 0, label: "" };

            if (currentTabIdx < 3) {
                const mGames = allMonths[currentTabIdx];
                const validGames = mGames.filter(g => g.res !== "延賽");
                dashboard.total = validGames.length;
                dashboard.wins = validGames.filter(g => g.res === 'W').length;
                dashboard.losses = validGames.filter(g => g.res === 'L').length;
                dashboard.label = ["三月", "四月", "五月"][currentTabIdx];

                girlRoster.forEach(girl => {
                    const att = getAttendance(girl.name, currentTabIdx);
                    let w = 0, l = 0, count = 0;
                    att.forEach(date => {
                        const g = mGames.find(x => x.date === date);
                        if (g && g.res !== "延賽") {
                            count++;
                            if (g.res === 'W') w++;
                            if (g.res === 'L') l++;
                        }
                    });
                    displayData.push({ ...girl, count, w, l, att });
                });
            } else {
                dashboard.label = "2026 總累計統計";
                let allValid = [...games_mar, ...games_apr].filter(g => g.res !== "延賽");
                dashboard.total = allValid.length;
                dashboard.wins = allValid.filter(g => g.res === 'W').length;
                dashboard.losses = allValid.filter(g => g.res === 'L').length;

                girlRoster.forEach(girl => {
                    let tw = 0, tl = 0, tc = 0, tAtt = [];
                    [0, 1].forEach(mIdx => {
                        const att = getAttendance(girl.name, mIdx);
                        tAtt = tAtt.concat(att);
                        att.forEach(date => {
                            const g = allMonths[mIdx].find(x => x.date === date);
                            if (g && g.res !== "延賽") {
                                tc++;
                                if (g.res === 'W') tw++;
                                if (g.res === 'L') tl++;
                            }
                        });
                    });
                    displayData.push({ ...girl, count: tc, w: tw, l: tl, att: tAtt });
                });
            }

            document.getElementById('totalGames').innerText = dashboard.total;
            document.getElementById('teamWins').innerText = dashboard.wins;
            document.getElementById('teamLosses').innerText = dashboard.losses;
            document.getElementById('currentMonthLabel').innerText = dashboard.label;

            displayData.forEach(item => {
                const rate = item.count > 0 ? ((item.w / item.count) * 100).toFixed(1) : "0.0";
                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50 transition cursor-pointer";
                tr.onclick = () => showDetail(item);
                tr.innerHTML = `
                    <td class="p-4 flex items-center">
                        <span class="number-badge">${item.id}</span>
                        <b class="text-gray-700">${item.name}</b>
                    </td>
                    <td class="p-4 text-sm text-gray-600">${item.count} 場</td>
                    <td class="p-4 text-sm">${currentTabIdx === 2 ? '-' : item.w+'W-'+item.l+'L'}</td>
                    <td class="p-4 font-bold text-pink-600">${currentTabIdx === 2 ? '-' : rate + '%'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showDetail(girl) {
            document.getElementById('modalGirlName').innerText = `${girl.id} ${girl.name}`;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';
            const sortedAtt = [...girl.att].sort().reverse();
            sortedAtt.forEach(date => {
                let g = null;
                allMonths.forEach(m => { if(!g) g = m.find(x => x.date === date); });
                if (g) {
                    const div = document.createElement('div');
                    let border = "border-gray-200";
                    let resTag = g.res;
                    let resClass = "text-gray-400";
                    if(g.res === 'W') { border = "border-green-400"; resClass = "text-green-500"; }
                    else if(g.res === 'L') { border = "border-red-300"; resClass = "text-red-400"; }
                    else if(g.res === '延賽') { border = "border-blue-300"; resTag = "⛈️ 延賽"; resClass = "text-blue-500"; }
                    div.className = `p-3 bg-white rounded-lg border-l-4 shadow-sm ${border}`;
                    div.innerHTML = `
                        <div class="flex justify-between items-center text-sm">
                            <div><p class="text-[10px] text-gray-400 font-mono">${date}</p><p class="font-bold text-gray-700">vs ${g.opp}</p></div>
                            <div class="text-right"><p class="font-bold text-gray-600">${g.score || '-'}</p><p class="text-xs font-bold ${resClass}">${resTag}</p></div>
                        </div>`;
                    content.appendChild(div);
                }
            });
            document.getElementById('girlModal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() { document.getElementById('girlModal').classList.add('opacity-0', 'pointer-events-none'); }
        function switchTab(i) {
            currentTabIdx = i;
            [0,1,2,3,4].forEach(idx => document.getElementById('tab'+idx).classList.remove('tab-active'));
            document.getElementById('tab'+i).classList.add('tab-active');
            render();
        }
        render();
    </script>
</body>
</html>
