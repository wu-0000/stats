<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啦啦隊數據統計 - 首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1>啦啦隊數據總覽</h1>
            <div>
                <a href="daily.html" class="btn btn-secondary">📅 每日站位</a>
                <a href="ranking.html" class="btn">🏆 排行榜</a>
            </div>
        </div>

        <div id="team-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center;">
            <button class="btn" onclick="changeTeam('樂天')">樂天桃猿</button>
            <button class="btn btn-secondary" onclick="changeTeam('中信兄弟')">中信兄弟</button>
            <button class="btn btn-secondary" onclick="changeTeam('味全龍')">味全龍</button>
            <button class="btn btn-secondary" onclick="changeTeam('統一獅')">統一獅</button>
            <button class="btn btn-secondary" onclick="changeTeam('富邦悍將')">富邦悍將</button>
            <button class="btn btn-secondary" onclick="changeTeam('台鋼雄鷹')">台鋼雄鷹</button>
        </div>

        <div id="girl-list" class="grid">
            <p style="grid-column: 1 / -1; text-align: center;">資料載入中...</p>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        let allGirlsData = []; // 用來儲存從 Google Sheets 抓下來的所有女孩

        async function loadGirls() {
            try {
                // 1. 只抓一次資料，存入 allGirlsData
                allGirlsData = await fetchCSV(CONFIG.girlsUrl);
                // 2. 預設顯示樂天
                changeTeam('樂天'); 
            } catch (error) {
                console.error(error);
                document.getElementById('girl-list').innerHTML = '<p style="color:red; text-align:center;">資料連線失敗！</p>';
            }
        }

        // 🎀 切換隊伍的功能
// 🎀 切換隊伍的功能 (升級 IG 按鈕版)
        function changeTeam(teamName) {
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => {
                if (tab.innerText.includes(teamName)) {
                    tab.className = 'btn'; 
                } else {
                    tab.className = 'btn btn-secondary'; 
                }
            });

            const listContainer = document.getElementById('girl-list');
            listContainer.innerHTML = ''; 

            const teamGirls = allGirlsData.filter(g => g.team && g.team.trim() === teamName);

            if (teamGirls.length === 0) {
                listContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); margin-top: 20px;">
                    目前還沒有建立「${teamName}」的女孩資料喔！</p>`;
                return;
            }

            teamGirls.forEach(girl => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girl.name)}&team=${encodeURIComponent(teamName)}`;
                
                // 📷 判斷有沒有填寫 IG，自動產生專屬漸層按鈕
                let igHtml = '';
                if (girl.ig && girl.ig.trim() !== '') {
                    let igStr = girl.ig.trim();
                    // 如果只打帳號，程式自動幫你補全 IG 網址
                    let igLink = igStr.startsWith('http') ? igStr : `https://www.instagram.com/${igStr}/`;
                    
                    // event.stopPropagation() 是魔法：保證你點 IG 按鈕時是開新網頁，不會不小心點進去詳細數據頁
                    igHtml = `<a href="${igLink}" target="_blank" onclick="event.stopPropagation()" 
                                 style="display:inline-block; margin-top:12px; background:linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
                                 color:white; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:bold; text-decoration:none; box-shadow: 0 4px 10px rgba(220, 39, 67, 0.3);">
                                 📷 Instagram
                              </a>`;
                }

                card.innerHTML = `
                    <div style="font-size: 24px; color: var(--text-muted); margin-bottom: 8px; font-weight: 900;">${girl.id || "00"}</div>
                    <div style="font-size: 18px; font-weight: bold; color: var(--text-main);">${girl.name}</div>
                    ${igHtml}
                `;
                listContainer.appendChild(card);
            });
        }
        }

        // 啟動程式
        loadGirls();
    </script>
</body>
</html>
