HTML
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣啦啦隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; }
        .rakuten-pink { background-color: #bf0845; }
        .pink-gradient { background: linear-gradient(135deg, #bf0845 0%, #e63946 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 4px solid #bf0845; color: #bf0845; font-weight: bold; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="pb-10">

    <header class="pink-gradient text-white py-6 text-center shadow-lg mb-4">
        <h1 class="text-3xl font-bold tracking-wider">📣 台灣啦啦隊 2026</h1>
        <p class="mt-1 opacity-90 text-sm">各隊應援勝率與賽事數據庫</p>
    </header>

    <nav class="max-w-6xl mx-auto px-4 mb-6">
        <div class="flex flex-wrap justify-center gap-2">
            <button class="rakuten-pink text-white px-4 py-2 rounded-full shadow-sm font-bold">樂天女孩</button>
            <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full cursor-not-allowed">中信兄弟 (待開放)</button>
            <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full cursor-not-allowed">味全龍 (待開放)</button>
            <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full cursor-not-allowed">統一獅 (待開放)</button>
            <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full cursor-not-allowed">富邦悍將 (待開放)</button>
            <button class="bg-gray-200 text-gray-500 px-4 py-2 rounded-full cursor-not-allowed">台鋼雄鷹 (待開放)</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <div class="flex border-b border-gray-200 mb-6 bg-white rounded-t-lg overflow-hidden">
            <button onclick="switchMonth(0)" id="tab0" class="flex-1 py-4 text-center hover:bg-pink-50 transition tab-active">三月</button>
            <button onclick="switchMonth(1)" id="tab1" class="flex-1 py-4 text-center hover:bg-pink-50 transition">四月</button>
            <button onclick="switchMonth(2)" id="tab2" class="flex-1 py-4 text-center hover:bg-pink-50 transition">五月 (班表)</button>
        </div>

        <div id="statsDashboard" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 text-center">
                <p class="text-gray-500 text-xs">應援總場次</p>
                <p id="totalGames" class="text-2xl font-bold text-gray-800">-</p>
            </div>
            <div class="card p-4 text-center">
                <p class="text-gray-500 text-xs">團隊勝場</p>
                <p id="teamWins" class="text-2xl font-bold text-green-500">-</p>
            </div>
            <div class="card p-4 text-center">
                <p class="text-gray-500 text-xs">團隊敗場</p>
                <p id="teamLosses" class="text-2xl font-bold text-red-400">-</p>
            </div>
            <div class="card p-4 text-center border-l-4 border-pink-500">
                <p class="text-gray-500 text-xs">目前月份</p>
                <p id="currentMonthLabel" class="text-2xl font-bold text-pink-600">三月</p>
            </div>
        </div>

        <section class="card overflow-hidden mb-8">
            <div class="bg-gray-50 p-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="font-bold text-gray-700">📊 女孩應援數據 (點擊姓名查看明細)</h2>
                <span class="text-xs text-gray-400">數據來源：2026 官方班表</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-pink-50 text-pink-700 text-sm">
                            <th class="p-4">姓名</th>
                            <th class="p-4">出場場次</th>
                            <th class="p-4">戰績</th>
                            <th class="p-4">勝率</th>
                            <th class="p-4">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="girlTableBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="girlModal" class="modal fixed w-full h-full top-0 left-0 flex items-center justify-center opacity-0 pointer-events-none z-50">
        <div class="modal-overlay absolute w-full h-full bg-black opacity-50" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto max-h-[90vh]">
            <div class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3 border-b mb-4">
                    <p class="text-2xl font-bold text-pink-600" id="modalGirlName">女孩姓名</p>
                    <div class="modal-close cursor-pointer z-50" onclick="closeModal()">
                        <svg class="fill-current text-black" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                            <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                        </svg>
                    </div>
                </div>
                <div id="modalContent" class="space-y-3">
                    </div>
                <div class="flex justify-end pt-6">
                    <button onclick="closeModal()" class="px-4 py-2 bg-pink-100 text-pink-700 rounded-lg font-bold hover:bg-pink-200">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心數據結構 (由 CSV 轉換而來)
        const db = {
            "2026": [
                {
                    "month": "三月",
                    "games": [
                        { "date": "2026-03-28", "opponent": "中信兄弟", "outcome": "W", "score": "2:3" },
                        { "date": "2026-03-29", "opponent": "味全龍", "outcome": "L", "score": "3:2" },
                        { "date": "2026-03-31", "opponent": "台鋼雄鷹", "outcome": "L", "score": "3:1" }
                    ],
                    "girls": [
                        { "name": "穆又甯", "attendance": ["2026-03-28", "2026-03-29", "2026-03-31"], "wins": 1, "losses": 2, "winRate": 33.3 },
                        { "name": "孟潔", "attendance": ["2026-03-28", "2026-03-29", "2026-03-31"], "wins": 1, "losses": 2, "winRate": 33.3 },
                        { "name": "熊霓", "attendance": ["2026-03-28", "2026-03-29"], "wins": 1, "losses": 1, "winRate": 50.0 },
                        { "name": "琳妲", "attendance": ["2026-03-28", "2026-03-29"], "wins": 1, "losses": 1, "winRate": 50.0 },
                        { "name": "筠熹", "attendance": ["2026-03-28", "2026-03-29", "2026-03-31"], "wins": 1, "losses": 2, "winRate": 33.3 },
                        { "name": "卉妮", "attendance": ["2026-03-28", "2026-03-29"], "wins": 1, "losses": 1, "winRate": 50.0 },
                        { "name": "穎樂", "attendance": ["2026-03-28", "2026-03-31"], "wins": 1, "losses": 1, "winRate": 50.0 }
                    ]
                },
                {
                    "month": "四月",
                    "games": [
                        { "date": "2026-04-01", "opponent": "台鋼雄鷹", "outcome": "L", "score": "6:1" },
                        { "date": "2026-04-10", "opponent": "中信兄弟", "outcome": "W", "score": "2:4" },
                        { "date": "2026-04-11", "opponent": "中信兄弟", "outcome": "W", "score": "1:2" },
                        { "date": "2026-04-12", "opponent": "中信兄弟", "outcome": "L", "score": "14:4" },
                        { "date": "2026-04-15", "opponent": "統一獅", "outcome": "L", "score": "5:1" },
                        { "date": "2026-04-16", "opponent": "統一獅", "outcome": "L", "score": "7:3" },
                        { "date": "2026-04-21", "opponent": "富邦悍將", "outcome": "W", "score": "1:6" },
                        { "date": "2026-04-22", "opponent": "富邦悍將", "outcome": "W", "score": "2:4" },
                        { "date": "2026-04-24", "opponent": "味全龍", "outcome": "延賽", "score": "-" },
                        { "date": "2026-04-25", "opponent": "味全龍", "outcome": "L", "score": "4:1" },
                        { "date": "2026-04-26", "opponent": "味全龍", "outcome": "W", "score": "2:3" }
                    ],
                    "girls": [
                        { "name": "孟潔", "attendance": ["2026-04-01", "2026-04-10", "2026-04-11", "2026-04-21", "2026-04-22", "2026-04-24", "2026-04-25", "2026-04-26"], "wins": 5, "losses": 2, "winRate": 71.4 },
                        { "name": "禹菡", "attendance": ["2026-04-10", "2026-04-11", "2026-04-12", "2026-04-21", "2026-04-22", "2026-04-24", "2026-04-25"], "wins": 4, "losses": 2, "winRate": 66.7 },
                        { "name": "宋宋", "attendance": ["2026-04-11", "2026-04-12", "2026-04-21", "2026-04-24", "2026-04-25", "2026-04-26"], "wins": 3, "losses": 2, "winRate": 60.0 },
                        { "name": "穆又甯", "attendance": ["2026-04-01", "2026-04-11", "2026-04-12", "2026-04-21", "2026-04-22", "2026-04-25", "2026-04-26"], "wins": 4, "losses": 3, "winRate": 57.1 },
                        { "name": "筠熹", "attendance": ["2026-04-01", "2026-04-10", "2026-04-11", "2026-04-12", "2026-04-15", "2026-04-16", "2026-04-21", "2026-04-24", "2026-04-25"], "wins": 3, "losses": 5, "winRate": 37.5 }
                    ]
                },
                {
                    "month": "五月",
                    "games": [
                        { "date": "2026-05-08", "opponent": "統一獅", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-09", "opponent": "統一獅", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-10", "opponent": "統一獅", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-20", "opponent": "中信兄弟", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-22", "opponent": "富邦悍將", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-23", "opponent": "富邦悍將", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-24", "opponent": "富邦悍將", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-29", "opponent": "台鋼雄鷹", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-30", "opponent": "台鋼雄鷹", "outcome": "N/A", "score": "" },
                        { "date": "2026-05-31", "opponent": "台鋼雄鷹", "outcome": "N/A", "score": "" }
                    ],
                    "girls": [
                        { "name": "穆又甯", "attendance": ["2026-05-08", "2026-05-09", "2026-05-10", "2026-05-22", "2026-05-23", "2026-05-24", "2026-05-29", "2026-05-30", "2026-05-31"], "wins": 0, "losses": 0, "winRate": 0 },
                        { "name": "筠熹", "attendance": ["2026-05-08", "2026-05-09", "2026-05-10", "2026-05-20", "2026-05-22", "2026-05-23", "2026-05-24", "2026-05-29", "2026-05-30", "2026-05-31"], "wins": 0, "losses": 0, "winRate": 0 }
                    ]
                }
            ]
        };

        let currentMonthIndex = 0;

        function render() {
            const monthData = db["2026"][currentMonthIndex];
            
            // 更新看板數據
            document.getElementById('currentMonthLabel').innerText = monthData.month;
            document.getElementById('totalGames').innerText = monthData.games.length;
            document.getElementById('teamWins').innerText = monthData.games.filter(g => g.outcome === 'W').length;
            document.getElementById('teamLosses').innerText = monthData.games.filter(g => g.outcome === 'L').length;

            // 更新表格 (依勝率排序)
            const tableBody = document.getElementById('girlTableBody');
            tableBody.innerHTML = '';
            
            const sortedGirls = [...monthData.girls].sort((a, b) => b.winRate - a.winRate);

            sortedGirls.forEach(girl => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition cursor-pointer";
                tr.onclick = () => showGirlDetail(girl.name);
                
                const winColor = girl.winRate >= 60 ? 'text-pink-600' : 'text-gray-700';
                const trend = girl.winRate >= 50 ? '🔥 強運' : '💎 穩定';

                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-800">${girl.name}</td>
                    <td class="p-4 text-sm text-gray-500">${girl.attendance.length} 場</td>
                    <td class="p-4 text-sm">${monthData.month === '五月' ? '-' : `${girl.wins}W-${girl.losses}L`}</td>
                    <td class="p-4 font-bold ${winColor}">${monthData.month === '五月' ? '-' : girl.winRate + '%'}</td>
                    <td class="p-4"><span class="bg-pink-100 text-pink-700 px-2 py-1 rounded text-xs font-bold">${monthData.month === '五月' ? '待定' : trend}</span></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function switchMonth(idx) {
            currentMonthIndex = idx;
            // 更新 Tab UI
            [0, 1, 2].forEach(i => {
                document.getElementById(`tab${i}`).classList.remove('tab-active');
            });
            document.getElementById(`tab${idx}`).classList.add('tab-active');
            render();
        }

        function showGirlDetail(girlName) {
            const monthData = db["2026"][currentMonthIndex];
            const girl = monthData.girls.find(g => g.name === girlName);
            
            document.getElementById('modalGirlName').innerText = `${girlName} - ${monthData.month}明細`;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';

            girl.attendance.forEach(date => {
                const game = monthData.games.find(g => g.date === date);
                if (game) {
                    const resBadge = game.outcome === 'W' ? '<span class="text-green-500 font-bold">W</span>' : (game.outcome === 'L' ? '<span class="text-red-500 font-bold">L</span>' : '<span class="text-gray-400 font-bold">Pending</span>');
                    
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg border-l-4 " + (game.outcome === 'W' ? 'border-green-400' : 'border-gray-200');
                    item.innerHTML = `
                        <div>
                            <p class="text-xs text-gray-400">${game.date}</p>
                            <p class="font-bold">vs ${game.opponent}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-gray-600">${game.score || '尚未開賽'}</p>
                            ${resBadge}
                        </div>
                    `;
                    content.appendChild(item);
                }
            });

            // 顯示 Modal
            const body = document.querySelector('body');
            const modal = document.querySelector('#girlModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            body.classList.add('modal-active');
        }

        function closeModal() {
            const body = document.querySelector('body');
            const modal = document.querySelector('#girlModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            body.classList.remove('modal-active');
        }

        // 初始化
        render();
    </script>
</body>
</html>
