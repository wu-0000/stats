<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy"
content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">

<title>中華職棒啦啦隊</title>

<link rel="stylesheet" href="styles.css">
<script src="app.js" defer></script>
</head>

<body>

<header class="header">
    <h1>📣 中華職棒啦啦隊</h1>
</header>

<div id="tabList">
    <button data-tab="0" id="tab0">三月</button>
    <button data-tab="1" id="tab1">四月</button>
    <button data-tab="2" id="tab2">五月</button>
    <button data-tab="3" id="tab3">總表</button>
</div>

<table>
<thead>
<tr>
<th>姓名</th>
<th>場次</th>
<th>戰績</th>
<th>勝率</th>
</tr>
</thead>
<tbody id="girlTableBody"></tbody>
</table>

<!-- Modal -->
<div id="girlModal" class="modal hidden">
    <button id="modalOverlay" class="overlay"></button>

    <div class="modal-box">
        <div class="modal-header">
            <span id="modalGirlName"></span>
            <button id="modalClose">✕</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

</body>
</html>
