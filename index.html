<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華職棒啦啦隊 - 數據系統</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' cdn.tailwindcss.com fonts.googleapis.com fonts.gstatic.com; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' cdn.tailwindcss.com fonts.googleapis.com;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; }
        .pink-gradient { background: linear-gradient(135deg, #bf0845 0%, #e63946 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 4px solid #bf0845; color: #bf0845; font-weight: bold; }
        .number-badge { display: inline-flex; align-items: center; justify-content: center; background: #bf0845; color: white; width: 24px; height: 24px; border-radius: 50%; font-size: 0.65rem; font-weight: bold; margin-right: 8px; flex-shrink: 0; }
        .col-name { width: 40%; }
        @media (max-width: 640px) { td, th { padding: 12px 2px !important; font-size: 0.85rem; } }
    </style>
</head>
<body class="pb-10">

    <header class="pink-gradient text-white py-6 text-center shadow-lg mb-4">
        <h1 class="text-2xl md:text-3xl font-bold tracking-wider">📣 中華職棒啦啦隊</h1>
        <p class="mt-1 opacity-90 text-xs">應援戰報與女孩表現數據統計</p>
    </header>

    <main class="max-w-6xl mx-auto px-2 md:px-4">
        
        <div id="mainPage">
            <div class="flex flex-wrap border-b border-gray-200 mb-6 bg-white rounded-t-lg overflow-hidden text-sm">
                <button data-tab="0" class="tab-btn flex-1 py-4 text-center hover:bg-pink-50 transition tab-active">三月</button>
                <button data-tab="1" class="tab-btn flex-1 py-4 text-center hover:bg-pink-50 transition">四月</button>
                <button data-tab="2" class="tab-btn flex-1 py-4 text-center hover:bg-pink-50 transition">五月</button>
                <button data-tab="3" class="tab-btn flex-1 py-4 text-center hover:bg-pink-50 transition">總表</button>
                <button data-tab="4" class="tab-btn flex-1 py-4 text-center hover:bg-pink-50 transition font-bold text-pink-600">女孩介紹</button>
            </div>

            <div id="statsSection">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6 text-center px-1">
                    <div class="card p-3 border-b-4 border-pink-100"><p class="text-gray-500 text-[10px] md:text-xs">應援場次</p><p id="totalGames" class="text-lg md:text-2xl font-bold text-gray-800">-</p></div>
                    <div class="card p-3 border-b-4 border-green-100"><p class="text-gray-500 text-[10px] md:text-xs">團隊勝場</p><p id="teamWins" class="text-lg md:text-2xl font-bold text-green-500">-</p></div>
                    <div class="card p-3 border-b-4 border-red-100"><p class="text-gray-500 text-[10px] md:text-xs">團隊敗場</p><p id="teamLosses" class="text-lg md:text-2xl font-bold text-red-400">-</p></div>
                    <div class="card p-3 border-l-4 border-pink-500"><p class="text-gray-500 text-[10px] md:text-xs">統計期間</p><p id="currentMonthLabel" class="text-lg md:text-2xl font-bold text-pink-600">-</p></div>
                </div>

                <section class="card overflow-hidden mb-8">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left table-fixed border-collapse">
                            <thead>
                                <tr class="bg-pink-50 text-pink-700 text-xs md:text-sm">
                                    <th class="p-3 md:p-4 col-name"># 姓名</th>
                                    <th class="p-3 md:p-4 text-center">場次</th>
                                    <th class="p-3 md:p-4 text-center">戰績</th>
                                    <th class="p-3 md:p-4 text-center">勝率</th>
                                </tr>
                            </thead>
                            <tbody id="girlTableBody" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div id="introSection" class="hidden">
                <div class="card p-16 text-center">
                    <div class="text-5xl md:text-6xl mb-6">🌸</div>
                    <h2 class="text-2xl md:text-3xl font-bold text-pink-600 mb-4">女孩詳細介紹</h2>
                    <p class="text-gray-500">此頁面為預留空間。</p>
                </div>
            </div>
        </div>

        <div id="detailPage" class="hidden">
            <button id="backBtn" class="mb-4 flex items-center text-pink-600 font-bold hover:text-pink-800 transition">
                <span class="mr-2">←</span> 返回列表
            </button>
            <div class="card p-4 md:p-6">
                <div class="flex justify-between items-center pb-3 border-b mb-6">
                    <h2 class="text-2xl md:text-3xl font-bold text-pink-600" id="detailGirlName"></h2>
                </div>
                <div id="detailContent" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>

    </main>

    <script>
    (function() {
        // --- 完整的數據資料區 ---
        const girlRoster = [
            { id: "00", name: "琳妲" }, { id: "3", name: "穆又甯" }, { id: "6", name: "宋宋" },
            { id: "7", name: "筠熹" }, { id: "8", name: "貝佳頤" }, { id: "9", name: "高橋佳帆" },
            { id: "10", name: "卉妮" }, { id: "12", name: "穎樂" }, { id: "15", name: "孟潔" },
            { id: "17", name: "笑笑" }, { id: "18", name: "熊霓" }, { id: "19", name: "KIRA" },
            { id: "20", name: "MIKA" }, { id: "22", name: "河智媛" }, { id: "24", name: "廉世彬" },
            { id: "25", name: "禹洙漢" }, { id: "26", name: "高佳彬" }, { id: "27", name: "若潼" },
            { id: "33", name: "言梓璇" }, { id: "34", name: "金佳垠" }, { id: "36", name: "禹菡" },
            { id: "66", name: "岱縈" }, { id: "67", name: "崔荷潾" }, { id: "77", name: "曲曲" },
            { id: "87", name: "彭彭" }, { id: "88", name: "沈珈妤" }, { id: "97", name: "溫妮" }
        ];

        const games = [
            { date: "2026-03-28", opp: "中信兄弟", res: "W", score: "2:3", info: { no: "001", location: "台北大巨蛋", time: "2H56M", audience: "40,000", wp: "陳冠宇", lp: "江忠誠", mvp: "陳晨威" } },
            { date: "2026-03-29", opp: "味全龍", res: "L", score: "3:2", info: { no: "003", location: "台北大巨蛋", time: "2H49M", audience: "17,329", wp: "梅賽鍶", lp: "艾菩樂", sv: "林凱威", mvp: "曾聖安" } },
            { date: "2026-03-31", opp: "台鋼雄鷹", res: "L", score: "3:1" },
            { date: "2026-04-01", opp: "台鋼雄鷹", res: "L", score: "6:1" },
            { date: "2026-04-10", opp: "中信兄弟", res: "W", score: "2:4" },
            { date: "2026-04-11", opp: "中信兄弟", res: "W", score: "1:2" },
            { date: "2026-04-12", opp: "中信兄弟", res: "L", score: "14:4" },
            { date: "2026-04-15", opp: "統一獅", res: "L", score: "5:1" },
            { date: "2026-04-16", opp: "統一獅", res: "L", score: "7:3" },
            { date: "2026-04-21", opp: "富邦悍將", res: "W", score: "1:6" },
            { date: "2026-04-22", opp: "富邦悍將", res: "W", score: "2:4" },
            { date: "2026-04-24", opp: "味全龍", res: "延賽", score: "-" },
            { date: "2026-04-25", opp: "味全龍", res: "L", score: "4:1" },
            { date: "2026-04-26", opp: "味全龍", res: "W", score: "2:3" },
            { date: "2026-05-08", opp: "統一獅", res: "-", score: "" }
            // ... 後續資料可自行補齊
        ];

        const attendanceData = { 
            "琳妲": ["2026-03-28", "2026-03-29", "2026-04-01", "2026-04-10", "2026-04-11", "2026-04-16", "2026-04-24", "2026-04-25", "2026-04-26"],
            "穆又甯": ["2026-03-28", "2026-03-29", "2026-03-31", "2026-04-01", "2026-04-11", "2026-04-12"]
        };
        const stationData = { "3/28": { "琳妲":"一 三 三", "穆又甯":"三 一 一" }, "3/29": { "琳妲":"三 一 一" } };

        let currentTabIdx = 0;

        // 安全處理：防止 HTML 注入
        function safe(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getGamesInPeriod(idx) {
            if (idx === 0) return games.slice(0, 3);
            if (idx === 1) return games.slice(3, 14);
            if (idx === 2) return games.slice(14, 24);
            return games.slice(0, 14);
        }

        function render() {
            const tbody = document.getElementById('girlTableBody');
            tbody.innerHTML = '';

            // 處理 Tab 切換顯示
            if (currentTabIdx === 4) {
                document.getElementById('statsSection').classList.add('hidden');
                document.getElementById('introSection').classList.remove('hidden');
            } else {
                document.getElementById('statsSection').classList.remove('hidden');
                document.getElementById('introSection').classList.add('hidden');
            }

            const monthNames = ["三月", "四月", "五月", "總表統計"];
            document.getElementById('currentMonthLabel').innerText = monthNames[currentTabIdx];

            const activeGames = getGamesInPeriod(currentTabIdx);
            const validGames = activeGames.filter(g => g.res !== "延賽" && g.res !== "-");

            document.getElementById('totalGames').innerText = validGames.length;
            document.getElementById('teamWins').innerText = validGames.filter(g => g.res === 'W').length;
            document.getElementById('teamLosses').innerText = validGames.filter(g => g.res === 'L').length;

            girlRoster.forEach(girl => {
                const allDates = attendanceData[girl.name] || [];
                const periodDates = allDates.filter(d => activeGames.some(g => g.date === d));
                let w = 0, l = 0, validCount = 0;

                periodDates.forEach(d => {
                    const g = activeGames.find(x => x.date === d);
                    if (g && g.res !== "延賽" && g.res !== "-") {
                        validCount++;
                        if (g.res === 'W') w++;
                        if (g.res === 'L') l++;
                    }
                });

                const rate = validCount > 0 ? ((w / validCount) * 100).toFixed(1) : "0.0";
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50 transition cursor-pointer";
                tr.onclick = () => showPageDetail(girl.name);
                tr.innerHTML = `
                    <td class="p-4 flex items-center">
                        <span class="number-badge">${safe(girl.id)}</span>
                        <b class="text-gray-700">${safe(girl.name)}</b>
                    </td>
                    <td class="p-4 text-sm text-center text-gray-600">${periodDates.length}</td>
                    <td class="p-4 text-sm text-center text-gray-500">${currentTabIdx === 2 ? '-' : w+'W-'+l+'L'}</td>
                    <td class="p-4 font-bold text-center text-pink-600">${currentTabIdx === 2 ? '-' : rate+'%'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- 切換到整頁詳細內容 ---
        function showPageDetail(name) {
            const girl = girlRoster.find(g => g.name === name);
            if(!girl) return;

            // 1. 隱藏主頁，顯示詳細頁
            document.getElementById('mainPage').classList.add('hidden');
            document.getElementById('detailPage').classList.remove('hidden');

            // 2. 填充資料
            document.getElementById('detailGirlName').innerText = `${girl.id} ${name} - 個人戰報`;
            
            const allDates = attendanceData[name] || [];
            const activeGames = getGamesInPeriod(currentTabIdx);
            const displayDates = allDates.filter(d => activeGames.some(g => g.date === d));
            
            const content = document.getElementById('detailContent');
            content.innerHTML = '';

            displayDates.slice().reverse().forEach(d => {
                const g = games.find(x => x.date === d);
                if (!g) return;

                let color = "border-gray-200", tag = g.res, text = "text-gray-400";
                if (g.res === 'W') { color = "border-green-400"; text = "text-green-500"; }
                else if (g.res === 'L') { color = "border-red-300"; text = "text-red-400"; }
                else if (g.res === '延賽') { color = "border-blue-300"; tag = "⛈️ 延賽"; text = "text-blue-500"; }

                const div = document.createElement('div');
                div.className = `p-4 bg-gray-50 rounded-xl border-l-8 ${color} shadow-sm`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs text-gray-400 mb-1">${safe(d)}</p>
                            <h4 class="font-bold text-lg text-gray-800">對戰 ${safe(g.opp)}</h4>
                            <p class="text-sm font-semibold mt-1">比數：<span class="text-gray-600">${safe(g.score || '-')}</span></p>
                        </div>
                        <div class="bg-white px-3 py-1 rounded-full shadow-inner text-center">
                            <p class="text-sm font-bold ${text}">${safe(tag)}</p>
                        </div>
                    </div>
                `;

                // 顯示站位 (如果有資料)
                const simpleDate = d.split('-').slice(1).join('/').replace(/^0/, '');
                if (stationData[simpleDate] && stationData[simpleDate][name]) {
                    div.innerHTML += `
                        <div class="mt-3 text-xs font-bold text-pink-600 bg-pink-50 p-2 rounded border border-pink-100">
                            📍 應援站位：${safe(stationData[simpleDate][name])}
                        </div>
                    `;
                }

                content.appendChild(div);
            });

            // 回到頁面頂部
            window.scrollTo(0, 0);
        }

        // --- 返回主列表 ---
        function backToList() {
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('detailPage').classList.add('hidden');
        }

        // --- 事件綁定 ---
        document.addEventListener('DOMContentLoaded', () => {
            render();
            
            // Tab 按鈕
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = (e) => {
                    backToList(); // 切換月份時確保回到清單頁
                    const idx = parseInt(e.target.getAttribute('data-tab'));
                    currentTabIdx = idx;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
                    e.target.classList.add('tab-active');
                    render();
                };
            });

            // 返回按鈕
            document.getElementById('backBtn').onclick = backToList;
        });

    })();
    </script>
</body>
</html>
