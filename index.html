<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啦啦隊數據統計 - 首頁</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🎀 標題漸層美化 */
        .header h1 {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 📱 頂部導覽列：允許換行，為手機版 2x2 鋪路 */
        .header-btns {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; 
        }
        .header-btns .btn {
            white-space: nowrap; padding: 10px 18px; text-align: center;
        }

        /* 💊 果凍感女團分類按鈕 */
        #team-tabs button {
            border-radius: 30px; padding: 10px 22px; font-size: 15px; font-weight: 900;
            border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;
        }
        #team-tabs button.active-tab {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; border-color: #ff758c; box-shadow: 0 6px 15px rgba(255, 117, 140, 0.4); transform: translateY(-3px);
        }
        #team-tabs button.inactive-tab {
            background: transparent; color: var(--text-muted); border-color: #ffccd5;
        }
        #team-tabs button.inactive-tab:hover {
            background: rgba(255, 117, 140, 0.08); color: var(--theme-main); transform: translateY(-2px);
        }
        [data-theme="dark"] #team-tabs button.inactive-tab { border-color: #555; color: #aaa; }
        [data-theme="dark"] #team-tabs button.inactive-tab:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* 🔍 精緻立體搜尋框 */
        .search-container { max-width: 500px; margin: 0 auto 25px auto; }
        .search-input { 
            width: 100%; padding: 15px 25px; border-radius: 40px; border: 2px solid #ffe1e6; font-size: 16px; font-weight: bold;
            color: var(--text-main); background: var(--bg-color); box-shadow: 0 4px 20px rgba(255, 117, 140, 0.05); 
            outline: none; transition: all 0.3s; text-align: center; 
        }
        .search-input:focus { border-color: #ff758c; box-shadow: 0 8px 25px rgba(255, 117, 140, 0.2); transform: translateY(-2px); }
        [data-theme="dark"] .search-input { border-color: #444; }

        /* ✨ 卡片懸浮光影特效 */
        .card {
            position: relative; border-radius: 24px; padding-top: 35px; padding-bottom: 25px;
            background: var(--card-bg, #fff); border: 1px solid rgba(255, 117, 140, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(255, 117, 140, 0.2); border-color: #ff758c; }
        [data-theme="dark"] .card { border-color: #333; background: #2a2a2a; }
        [data-theme="dark"] .card:hover { border-color: #ff758c; box-shadow: 0 15px 35px rgba(255, 117, 140, 0.4); }

        /* 🌱 練習生專屬卡片外框特效 */
        .trainee-card {
            border: 2px dashed rgba(46, 204, 113, 0.4) !important; 
            background: linear-gradient(to bottom, var(--card-bg, #fff), rgba(46, 204, 113, 0.05)); 
        }
        .trainee-card:hover {
            border-color: #2ecc71 !important; 
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.25) !important; 
        }
        [data-theme="dark"] .trainee-card {
            border-color: rgba(46, 204, 113, 0.3) !important;
            background: linear-gradient(to bottom, #2a2a2a, rgba(46, 204, 113, 0.08));
        }
        [data-theme="dark"] .trainee-card:hover {
            border-color: #2ecc71 !important;
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.35) !important;
        }

        /* 👑 卡片左上角背號 */
        .card-number {
            position: absolute; top: 15px; left: 15px; background: rgba(255, 117, 140, 0.1);
            color: var(--theme-main); padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 900; z-index: 10;
        }
        [data-theme="dark"] .card-number { background: rgba(255,117,140,0.2); color: #ff9aa2; }
        
        /* 📸 IG 懸浮按鈕 */
        .ig-btn-corner {
            position: absolute; top: 12px; right: 12px; display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white !important; width: 32px; height: 32px; border-radius: 50%; text-decoration: none;
            box-shadow: 0 4px 10px rgba(220, 39, 67, 0.4); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        .ig-btn-corner:hover { transform: scale(1.15) rotate(5deg); }
        .ig-btn-corner svg { width: 18px; height: 18px; fill: currentColor; }

        /* 🌟 IG 限動風頭像 */
        .avatar-wrapper-custom {
            width: 110px; height: 110px; margin: 0 auto; padding: 4px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ff7eb3 100%); border-radius: 50%; box-shadow: 0 5px 15px rgba(255, 117, 140, 0.2);
        }
        .trainee-card .avatar-wrapper-custom {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2);
        }
        .avatar-wrapper-custom img, .avatar-fallback-custom {
            width: 100%; height: 100%; border: 4px solid var(--card-bg, #fff); border-radius: 50%; 
            object-fit: cover;
            /* 🔥 核心修復：強制讓圖片對齊頂部，不會因為全身照而切掉頭！ */
            object-position: center 10%; 
        }
        .avatar-fallback-custom { display: flex; align-items: center; justify-content: center; font-size: 40px; background: #f8f9fa; }
        [data-theme="dark"] .avatar-wrapper-custom img, [data-theme="dark"] .avatar-fallback-custom { border-color: #2a2a2a; }

        /* 🔥 女孩名字與練習生徽章排版區域 */
        .card-name-wrapper { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .card-name { font-size: 20px; font-weight: 900; color: var(--text-main); margin: 0; letter-spacing: 1px; }
        
        /* 🌱 練習生徽章：空心虛線框 + 微透底色 */
        .trainee-badge-new {
            background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px dashed #2ecc71;
            font-size: 12px; font-weight: 900; padding: 3px 12px; border-radius: 20px; letter-spacing: 1px;
        }
        [data-theme="dark"] .trainee-badge-new { background: rgba(46, 204, 113, 0.15); border-color: #2ecc71; color: #2ecc71; }
        
        .team-badge-small { font-size: 12px; color: white; background: var(--theme-main); display: inline-block; padding: 4px 10px; border-radius: 12px; margin-top: 10px; font-weight: bold; }

        /* ==========================================
           🎉 小遊戲：每日應援女神抽籤
           ========================================== */
        .game-buttons-area { display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 25px 0 35px 0; }
        .lucky-draw-btn {
            background: linear-gradient(135deg, #FFD700 0%, #F39C12 100%); color: white; font-size: 18px; font-weight: 900; padding: 15px 30px; border: none; border-radius: 40px;
            cursor: pointer; box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4); display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s; animation: pulse-glow 2s infinite;
        }
        .lucky-draw-btn:hover { transform: scale(1.05); }
        .lucky-draw-btn svg { width: 24px; height: 24px; fill: currentColor; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(243, 156, 18, 0); } 100% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0); } }

        .lucky-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s;
        }
        .lucky-card {
            background: var(--card-bg, #fff); width: 300px; border-radius: 24px; padding: 30px 20px; text-align: center; position: relative;
            transform: scale(0.5) translateY(100px); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(255, 117, 140, 0.4); border: 4px solid #FFD700; overflow: hidden;
        }
        .lucky-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); animation: sweep 3s infinite;
        }
        @keyframes sweep { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        .close-lucky-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.1); border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; color: var(--text-muted); z-index: 10; }
        .close-lucky-btn:hover { background: #ff758c; color: white; }
        .lucky-fortune { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; padding: 10px 15px; border-radius: 12px; font-size: 16px; font-weight: 900; margin-top: 15px; box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3); }
        [data-theme="dark"] .lucky-card { background: #222; }

        /* 📱 針對手機小螢幕特別微調：變成 2x2 對齊網格 */
        @media (max-width: 480px) {
            .header-btns { gap: 8px; }
            .header-btns .btn { 
                padding: 10px 10px; 
                font-size: 14px; 
                flex: 1 1 calc(50% - 10px); 
            }
            .search-input { font-size: 14px; padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="loading-spinner"></div><div class="loading-text">🎀 正在為您準備女神名單...</div></div>

    <div class="container">
        <div class="header">
            <h1>⚾ 啦啦隊</h1>
            <div class="header-btns">
                <a href="daily.html" class="btn">📅 每日站位</a>
                <a href="ranking.html" class="btn btn-secondary">📊 排行榜</a>
                <a href="fame.html" class="btn" style="background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); border:none;">🏆 風雲榜</a>
                <a href="gacha.html" class="btn" style="background: linear-gradient(135deg, #8e44ad 0%, #3498db 100%); border:none; color: white;">🎁 盲盒抽卡</a>
            </div>
        </div>

        <div class="game-buttons-area">
            <button class="lucky-draw-btn" onclick="drawLuckyGirl()">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm2.19 12.19L6 18l3.81-8.19L18 6l-3.81 8.19zM12 10.9c-.61 0-1.1.49-1.1 1.1s.49 1.1 1.1 1.1 1.1-.49 1.1-1.1-.49-1.1-1.1-1.1z"/></svg>
                抽出今日專屬應援女神
            </button>
        </div>

        <div id="team-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center;">
            <button class="inactive-tab" data-team="樂天" onclick="changeTeam('樂天')">Rakuten Girls</button>
            <button class="inactive-tab" data-team="中信兄弟" onclick="changeTeam('中信兄弟')">Passion Sisters</button>
            <button class="inactive-tab" data-team="味全龍" onclick="changeTeam('味全龍')">Dragon Beauties</button>
            <button class="inactive-tab" data-team="統一獅" onclick="changeTeam('統一獅')">Uni Girls</button>
            <button class="inactive-tab" data-team="富邦悍將" onclick="changeTeam('富邦悍將')">Fubon Angels</button>
            <button class="inactive-tab" data-team="台鋼雄鷹" onclick="changeTeam('台鋼雄鷹')">WING STARS</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 快速搜尋女孩名字..." onkeyup="searchGirl()">
        </div>

        <div id="girl-list" class="grid"></div>
    </div>

    <div id="lucky-modal" class="lucky-modal-overlay" onclick="closeLuckyModal(event)">
        <div class="lucky-card" id="lucky-card-content" onclick="event.stopPropagation()">
            <button class="close-lucky-btn" onclick="closeLuckyModal(event)">✕</button>
            <div style="font-size: 14px; font-weight: bold; color: #F39C12; margin-bottom: 15px;">✨ 你的專屬幸運女神 ✨</div>
            <div id="lucky-avatar"></div>
            <div id="lucky-name" class="card-name" style="font-size: 24px; margin-top: 20px;"></div>
            <div id="lucky-team" class="team-badge-small" style="font-size: 14px; margin-bottom: 15px;"></div>
            <div id="lucky-fortune" class="lucky-fortune"></div>
            <button class="btn" style="width: 100%; margin-top: 20px; font-size: 14px;" id="lucky-profile-btn">查看她的機密情報 🔍</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allGirlsData = []; 
        let currentTeam = '樂天'; 

        const teamNamesMap = {
            '樂天': 'Rakuten Girls', '中信兄弟': 'Passion Sisters', '味全龍': 'Dragon Beauties',
            '統一獅': 'Uni Girls', '富邦悍將': 'Fubon Angels', '台鋼雄鷹': 'WING STARS'
        };

        const fortunes = [
            "今日大吉！活力滿滿度過這一天吧！", "元氣爆發！壞心情全部退散！", "超絕好運！今天下班去買張彩券吧！",
            "魅力四射！今天是你的主場！", "心想事成！女神為你強力應援！", "神清氣爽！工作讀書效率大爆發！",
            "戰力滿點！接收來自女神的專屬應援光波吧！⚡", "幸運爆棚！出門過馬路全都是綠燈！",
            "閃閃發光！今天走到哪你都是全場焦點！", "靈感湧現！遇到什麼難題都能輕鬆解決！"
        ];

        function hideLoading() { const overlay = document.getElementById('loading-overlay'); if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); } }

        async function loadGirls() {
            try {
                allGirlsData = await fetchCSV(CONFIG.girlsUrl);
                const teams = ['樂天', '中信兄弟', '味全龍', '統一獅', '富邦悍將', '台鋼雄鷹'];
                const savedTeam = localStorage.getItem('lastSelectedTeam');
                const defaultTeam = (savedTeam && teams.includes(savedTeam)) ? savedTeam : teams[Math.floor(Math.random() * teams.length)];
                changeTeam(defaultTeam); 
            } catch (error) {
                console.error(error);
                document.getElementById('girl-list').innerHTML = '<p style="color:red; text-align:center;">資料連線失敗！</p>';
            } finally { hideLoading(); }
        }

        function changeTeam(teamName) {
            currentTeam = teamName;
            localStorage.setItem('lastSelectedTeam', teamName); 
            document.getElementById('search-input').value = ''; 
            
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => { tab.className = tab.getAttribute('data-team') === teamName ? 'active-tab' : 'inactive-tab'; });
            
            let teamGirls = allGirlsData.filter(g => g.team && g.team.trim().includes(teamName));
            
            teamGirls.sort((a, b) => {
                const isATrainee = (a.team && a.team.includes('練習生'));
                const isBTrainee = (b.team && b.team.includes('練習生'));
                if (isATrainee && !isBTrainee) return 1;
                if (!isATrainee && isBTrainee) return -1;
                return 0; 
            });

            renderGirlCards(teamGirls, teamName);
        }

        function searchGirl() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (keyword === '') { changeTeam(currentTeam); return; }
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => tab.className = 'inactive-tab');
            const matchedGirls = allGirlsData.filter(g => g.name && g.name.toLowerCase().includes(keyword));
            renderGirlCards(matchedGirls, '搜尋結果');
        }

        function renderGirlCards(girlsArray, contextName) {
            const listContainer = document.getElementById('girl-list');
            listContainer.innerHTML = ''; 

            if (girlsArray.length === 0) {
                listContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); font-size: 18px; margin-top: 20px; font-weight: bold;">找不到相關的女孩資料喔！</p>`;
                return;
            }

            girlsArray.forEach(girl => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                const realTeam = girl.team ? girl.team.trim() : contextName;
                
                const isTrainee = girl.team && girl.team.includes('練習生');
                if (isTrainee) {
                    card.classList.add('trainee-card');
                }

                card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girl.name)}&team=${encodeURIComponent(realTeam)}`;
                
                let igHtml = '';
                const igAccount = girl.ig || girl.IG || girl['IG'] || '';
                if (igAccount.trim() !== '') {
                    let igStr = igAccount.trim();
                    let igLink = igStr.startsWith('http') ? igStr : `https://www.instagram.com/${igStr}/`;
                    igHtml = `<a href="${igLink}" target="_blank" onclick="event.stopPropagation()" class="ig-btn-corner"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.07M12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;
                }

                const photoUrl = girl.photo || girl['圖片'] || girl['image'] || girl.photo_url;
                let avatarHtml = (photoUrl && photoUrl.trim() !== '') ? `<div class="avatar-wrapper-custom"><img src="${photoUrl.trim()}" alt="${girl.name}"></div>` : `<div class="avatar-wrapper-custom"><div class="avatar-fallback-custom">👱‍♀️</div></div>`;
                
                let displayTeamName = realTeam;
                Object.keys(teamNamesMap).forEach(key => { if (realTeam.includes(key)) displayTeamName = teamNamesMap[key]; });
                
                let traineeHtml = '';
                if (isTrainee) {
                    traineeHtml = `<div class="trainee-badge-new">🌱 練習生</div>`;
                }

                const teamBadge = contextName === '搜尋結果' ? `<div class="team-badge-small">${displayTeamName}</div>` : '';
                
                let gNumRaw = girl.number || girl.id || '';
                let numberHtml = '';
                if (gNumRaw && gNumRaw.toString().trim() !== '') {
                    numberHtml = `<div class="card-number">No.${gNumRaw}</div>`;
                }

                card.innerHTML = `${numberHtml}${igHtml}${avatarHtml}
                    <div class="card-name-wrapper">
                        <div class="card-name">${girl.name}</div>
                        ${traineeHtml}
                    </div>
                    ${teamBadge}`;
                    
                listContainer.appendChild(card);
            });
        }

        function drawLuckyGirl() { /* ... */ }
        function closeLuckyModal(event) { /* ... */ }

        loadGirls();
    </script>
</body>
</html>
