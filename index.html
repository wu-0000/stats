<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啦啦隊數據統計 - 首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎀 正在為您準備女神名單...</div>
    </div>

    <div class="container">
        
        <div class="header">
            <h1>✨ 全台啦啦隊女神圖鑑 ✨</h1>
            <div>
                <a href="daily.html" class="btn btn-secondary">📅 每日站位</a>
                <a href="ranking.html" class="btn">🏆 排行榜</a>
                <a href="ranking.html" class="btn" style="background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%); margin-left: 10px;">🏆 風雲榜</a>
            </div>
        </div>

        <div id="team-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center;">
            <button class="btn" onclick="changeTeam('樂天')">樂天桃猿</button>
            <button class="btn btn-secondary" onclick="changeTeam('中信兄弟')">中信兄弟</button>
            <button class="btn btn-secondary" onclick="changeTeam('味全龍')">味全龍</button>
            <button class="btn btn-secondary" onclick="changeTeam('統一獅')">統一獅</button>
            <button class="btn btn-secondary" onclick="changeTeam('富邦悍將')">富邦悍將</button>
            <button class="btn btn-secondary" onclick="changeTeam('台鋼雄鷹')">台鋼雄鷹</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 快速搜尋女孩名字..." onkeyup="searchGirl()">
        </div>

        <div id="girl-list" class="grid">
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        let allGirlsData = []; 
        let currentTeam = '樂天'; 

        // 🎀 關閉讀取畫面的小工具
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        }

        async function loadGirls() {
            try {
                allGirlsData = await fetchCSV(CONFIG.girlsUrl);
                changeTeam('樂天'); 
            } catch (error) {
                console.error(error);
                document.getElementById('girl-list').innerHTML = '<p style="color:red; text-align:center;">資料連線失敗！</p>';
            } finally {
                hideLoading(); // 🎀 不管成功失敗，最後一定關閉讀取畫面
            }
        }

        function changeTeam(teamName) {
            currentTeam = teamName;
            document.getElementById('search-input').value = ''; 

            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => {
                tab.className = tab.innerText.includes(teamName) ? 'btn' : 'btn btn-secondary'; 
            });

            const teamGirls = allGirlsData.filter(g => g.team && g.team.trim() === teamName);
            renderGirlCards(teamGirls, teamName);
        }

        function searchGirl() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (keyword === '') {
                changeTeam(currentTeam);
                return;
            }
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => tab.className = 'btn btn-secondary');
            const matchedGirls = allGirlsData.filter(g => g.name && g.name.toLowerCase().includes(keyword));
            renderGirlCards(matchedGirls, '搜尋結果');
        }

        function renderGirlCards(girlsArray, contextName) {
            const listContainer = document.getElementById('girl-list');
            listContainer.innerHTML = ''; 

            if (girlsArray.length === 0) {
                listContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); margin-top: 20px;">
                    找不到相關的女孩資料喔！</p>`;
                return;
            }

            girlsArray.forEach(girl => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                
                const realTeam = girl.team ? girl.team.trim() : contextName;
                card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girl.name)}&team=${encodeURIComponent(realTeam)}`;
                
                let igHtml = '';
                if (girl.ig && girl.ig.trim() !== '') {
                    let igStr = girl.ig.trim();
                    let igLink = igStr.startsWith('http') ? igStr : `https://www.instagram.com/${igStr}/`;
                    igHtml = `<a href="${igLink}" target="_blank" onclick="event.stopPropagation()" class="ig-btn"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.07M12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>Instagram</a>`;
                }

                let avatarHtml = (girl.photo && girl.photo.trim() !== '') ? `<div class="avatar-wrapper"><img src="${girl.photo.trim()}" alt="${girl.name}"></div>` : `<div class="avatar-wrapper"><div class="avatar-fallback">👱‍♀️</div></div>`;
                const teamBadge = contextName === '搜尋結果' ? `<div style="font-size:12px; color:white; background:var(--theme-main); display:inline-block; padding:2px 8px; border-radius:10px; margin-bottom:10px;">${realTeam}</div>` : '';

                card.innerHTML = `
                    ${teamBadge}
                    ${avatarHtml}
                    <div style="font-size: 20px; color: var(--text-muted); margin-bottom: 2px; font-weight: 900;">${girl.id || "00"}</div>
                    <div style="font-size: 18px; font-weight: bold; color: var(--text-main);">${girl.name}</div>
                    ${igHtml}
                `;
                listContainer.appendChild(card);
            });
        }

        loadGirls();
    </script>
</body>
</html>
