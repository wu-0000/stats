<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; }
        .rakuten-pink { background-color: #bf0845; }
        .pink-gradient { background: linear-gradient(135deg, #bf0845 0%, #e63946 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 4px solid #bf0845; color: #bf0845; font-weight: bold; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        
        .number-badge { 
            display: inline-flex; align-items: center; justify-content: center;
            background: #bf0845; color: white; width: 28px; height: 28px;
            border-radius: 50%; font-size: 0.75rem; font-weight: bold;
            margin-right: 12px; flex-shrink: 0; box-shadow: 0 2px 4px rgba(191, 8, 69, 0.2);
        }
    </style>
</head>

    <header class="pink-gradient text-white py-6 text-center shadow-lg mb-4">

        <p class="mt-1 opacity-90 text-sm">應援戰報與女孩表現數據統計</p>

            <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4 text-center hover:bg-pink-50 transition">四月</button>

            <button onclick="switchTab(4)" id="tab4" class="flex-1 py-4 text-center hover:bg-pink-50 transition font-bold text-pink-600">女孩介紹</button>
        </div>

        <div id="statsSection">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
                <div class="card p-4 border-b-4 border-pink-100">
                    <p class="text-gray-500 text-xs">應援場次</p>
                    <p id="totalGames" class="text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="card p-4 border-b-4 border-green-100">
                    <p class="text-gray-500 text-xs">團隊勝場</p>
                    <p id="teamWins" class="text-2xl font-bold text-green-500">-</p>
                </div>
                <div class="card p-4 border-b-4 border-red-100">
                    <p class="text-gray-500 text-xs">團隊敗場</p>
                    <p id="teamLosses" class="text-2xl font-bold text-red-400">-</p>
                </div>
                <div class="card p-4 border-l-4 border-pink-500">
                    <p class="text-gray-500 text-xs">統計期間</p>
                    <p id="currentMonthLabel" class="text-2xl font-bold text-pink-600">-</p>
                </div>
            </div>

            <section class="card overflow-hidden mb-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-pink-50 text-pink-700 text-sm">

                                <th class="p-4">應援場次</th>
                                <th class="p-4">戰績</th>
                                <th class="p-4">勝率</th>
                            </tr>

                    </table>
                </div>
            </section>
        </div>

            </div>
        </div>
    </main>

        let currentTab = 0;

        function render() {
            const tbody = document.getElementById('girlTableBody');
            tbody.innerHTML = '';
            
            if (currentTab === 4) {
                document.getElementById('statsSection').classList.add('hidden');
                document.getElementById('introSection').classList.remove('hidden');
                return;
            }
            document.getElementById('statsSection').classList.remove('hidden');
            document.getElementById('introSection').classList.add('hidden');

            const monthNames = ["三月", "四月", "五月", "總表"];
            document.getElementById('currentMonthLabel').innerText = monthNames[currentTab];

            let activeGames = [];
            if (currentTab === 0) activeGames = games.slice(0, 3);
            else if (currentTab === 1) activeGames = games.slice(3, 14);
            else if (currentTab === 2) activeGames = games.slice(14, 24);
            else activeGames = games.slice(0, 14); 

            const validGames = activeGames.filter(g => g.res !== "延賽" && g.res !== "-");
            document.getElementById('totalGames').innerText = validGames.length;
            document.getElementById('teamWins').innerText = validGames.filter(g => g.res === 'W').length;
            document.getElementById('teamLosses').innerText = validGames.filter(g => g.res === 'L').length;

            girlRoster.forEach(girl => {
                const dates = attendanceData[girl.name] || [];
                let w = 0, l = 0, count = 0;
                
                dates.forEach(d => {
                    const g = activeGames.find(x => x.date === d);
                    if (g && g.res !== "延賽" && g.res !== "-") {
                        count++;
                        if (g.res === 'W') w++;
                        if (g.res === 'L') l++;
                    }
                });

                const rate = count > 0 ? ((w / count) * 100).toFixed(1) : "0.0";
                const displayCount = dates.filter(d => activeGames.some(g => g.date === d)).length;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50 transition cursor-pointer";
                tr.onclick = () => showDetail(girl.name, dates);
                tr.innerHTML = `
                    <td class="p-4 flex items-center"><span class="number-badge">${girl.id}</span><b>${girl.name}</b></td>
                    <td class="p-4 text-sm">${displayCount} 場</td>
                    <td class="p-4 text-sm">${currentTab === 2 ? '-' : w+'W-'+l+'L'}</td>
                    <td class="p-4 font-bold text-pink-600">${currentTab === 2 ? '-' : rate+'%'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showDetail(name, dates) {
            const girl = girlRoster.find(g => g.name === name);
            document.getElementById('modalGirlName').innerText = `${girl.id} ${name}`;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';
            
            dates.slice().reverse().forEach(d => {
                const g = games.find(x => x.date === d);
                if (!g) return;
                const div = document.createElement('div');
                let color = "border-gray-200", tag = g.res, text = "text-gray-400";
                if (g.res === 'W') { color = "border-green-400"; text = "text-green-500"; }
                else if (g.res === 'L') { color = "border-red-300"; text = "text-red-400"; }
                else if (g.res === '延賽') { color = "border-blue-300"; tag = "⛈️ 延賽"; text = "text-blue-500"; }
                
                div.className = `p-3 bg-white rounded-lg border-l-4 shadow-sm ${color}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div><p class="text-[10px] text-gray-400">${d}</p><p class="font-bold">vs ${g.opp}</p></div>
                        <div class="text-right"><p class="text-sm font-bold text-gray-600">${g.score || '-'}</p><p class="text-xs font-bold ${text}">${tag}</p></div>
                    </div>`;

                // 插入 3/28 詳細戰報
                if (g.info) {
                    const infoBox = document.createElement('div');
                    infoBox.className = "mt-2 p-2 bg-pink-50 rounded text-xs text-gray-600 grid grid-cols-2 gap-y-1 border border-pink-100";
                    infoBox.innerHTML = `
                        <div>⏱️ 時間: ${g.info.time}</div>
                        <div>👥 觀眾: ${g.info.audience}</div>
                        <div>🥎 勝投: ${g.info.wp}</div>
                        <div>打點: ${g.info.rbi}</div>
                        <div class="col-span-2 text-pink-600 font-bold">🏆 MVP: ${g.info.mvp}</div>
                    `;
                    div.appendChild(infoBox);
                }

                content.appendChild(div);
            });
            document.getElementById('girlModal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() { document.getElementById('girlModal').classList.add('opacity-0', 'pointer-events-none'); }
        function switchTab(i) {
            currentTab = i;
            [0,1,2,3,4].forEach(idx => document.getElementById('tab'+idx).classList.remove('tab-active'));
            document.getElementById('tab'+i).classList.add('tab-active');
            render();
        }
        render();
    </script>
</body>
</html>
