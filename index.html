<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啦啦隊數據統計 - 首頁</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 📸 IG 右上角懸浮純 Icon 按鈕 */
        .ig-btn-corner {
            position: absolute;
            top: 12px;
            right: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white !important;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(220, 39, 67, 0.4);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .ig-btn-corner:hover {
            transform: scale(1.15) rotate(5deg);
        }
        .ig-btn-corner svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 確保卡片可以定位右上角的按鈕 */
        .card {
            position: relative;
            padding-top: 25px; /* 稍微增加上方空間給頭像呼吸 */
        }
        
        /* 搜尋結果的隊伍小標籤微調 */
        .team-badge-small {
            font-size: 12px;
            color: white;
            background: var(--theme-main);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎀 正在為您準備女神名單...</div>
    </div>

    <div class="container">
        
        <div class="header">
            <h1>⚾ 啦啦隊出勤數據大比拼</h1>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <a href="daily.html" class="btn">📅 每日站位</a>
                <a href="ranking.html" class="btn btn-secondary">📊 排行榜</a>
                <a href="fame.html" class="btn" style="background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);">🏆 風雲榜</a>
            </div>
        </div>

        <div id="team-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center;">
            <button class="btn" data-team="樂天" onclick="changeTeam('樂天')">Rakuten Girls</button>
            <button class="btn btn-secondary" data-team="中信兄弟" onclick="changeTeam('中信兄弟')">Passion Sisters</button>
            <button class="btn btn-secondary" data-team="味全龍" onclick="changeTeam('味全龍')">Dragon Beauties</button>
            <button class="btn btn-secondary" data-team="統一獅" onclick="changeTeam('統一獅')">Uni Girls</button>
            <button class="btn btn-secondary" data-team="富邦悍將" onclick="changeTeam('富邦悍將')">Fubon Angels</button>
            <button class="btn btn-secondary" data-team="台鋼雄鷹" onclick="changeTeam('台鋼雄鷹')">WING STARS</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 快速搜尋女孩名字..." onkeyup="searchGirl()">
        </div>

        <div id="girl-list" class="grid">
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        let allGirlsData = []; 
        let currentTeam = '樂天'; 

        // ⚾ 英文隊名對照表 (魔法翻譯機)
        const teamNamesMap = {
            '樂天': 'Rakuten Girls',
            '中信兄弟': 'Passion Sisters',
            '味全龍': 'Dragon Beauties',
            '統一獅': 'Uni Girls',
            '富邦悍將': 'Fubon Angels',
            '台鋼雄鷹': 'WING STARS'
        };

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        }

        async function loadGirls() {
            try {
                allGirlsData = await fetchCSV(CONFIG.girlsUrl);
                changeTeam('樂天'); 
            } catch (error) {
                console.error(error);
                document.getElementById('girl-list').innerHTML = '<p style="color:red; text-align:center;">資料連線失敗！</p>';
            } finally {
                hideLoading(); 
            }
        }

        function changeTeam(teamName) {
            currentTeam = teamName;
            document.getElementById('search-input').value = ''; 

            // 根據 data-team 屬性來切換 active 狀態，不被英文文字影響
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => {
                tab.className = tab.getAttribute('data-team') === teamName ? 'btn' : 'btn btn-secondary'; 
            });

            // 過濾底層中文名稱的資料
            const teamGirls = allGirlsData.filter(g => g.team && g.team.trim().includes(teamName));
            renderGirlCards(teamGirls, teamName);
        }

        function searchGirl() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            if (keyword === '') {
                changeTeam(currentTeam);
                return;
            }
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => tab.className = 'btn btn-secondary');
            const matchedGirls = allGirlsData.filter(g => g.name && g.name.toLowerCase().includes(keyword));
            renderGirlCards(matchedGirls, '搜尋結果');
        }

        function renderGirlCards(girlsArray, contextName) {
            const listContainer = document.getElementById('girl-list');
            listContainer.innerHTML = ''; 

            if (girlsArray.length === 0) {
                listContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); margin-top: 20px; font-weight: bold;">
                    找不到相關的女孩資料喔！</p>`;
                return;
            }

            girlsArray.forEach(girl => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.style.position = 'relative'; // 讓 IG 按鈕可以絕對定位
                
                const realTeam = girl.team ? girl.team.trim() : contextName;
                card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girl.name)}&team=${encodeURIComponent(realTeam)}`;
                
                // 📸 渲染右上角 IG 懸浮按鈕
                let igHtml = '';
                if (girl.ig && girl.ig.trim() !== '') {
                    let igStr = girl.ig.trim();
                    let igLink = igStr.startsWith('http') ? igStr : `https://www.instagram.com/${igStr}/`;
                    igHtml = `
                        <a href="${igLink}" target="_blank" onclick="event.stopPropagation()" class="ig-btn-corner" title="前往 IG">
                            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.07M12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                        </a>`;
                }

                // 照片來源 (多種欄位防呆)
                const photoUrl = girl.photo || girl['圖片'] || girl['image'] || girl.photo_url;
                let avatarHtml = (photoUrl && photoUrl.trim() !== '') 
                    ? `<div class="avatar-wrapper"><img src="${photoUrl.trim()}" alt="${girl.name}"></div>` 
                    : `<div class="avatar-wrapper"><div class="avatar-fallback">👱‍♀️</div></div>`;
                
                // 如果是搜尋狀態，把原本的中文球隊名翻譯成英文顯示
                let displayTeamName = realTeam;
                Object.keys(teamNamesMap).forEach(key => {
                    if (realTeam.includes(key)) {
                        displayTeamName = teamNamesMap[key];
                    }
                });
                const teamBadge = contextName === '搜尋結果' ? `<div class="team-badge-small">${displayTeamName}</div>` : '';

                card.innerHTML = `
                    ${igHtml}
                    ${teamBadge}
                    ${avatarHtml}
                    <div style="font-size: 20px; color: var(--text-muted); margin-top: 10px; margin-bottom: 2px; font-weight: 900;">${girl.id || "00"}</div>
                    <div style="font-size: 18px; font-weight: bold; color: var(--text-main); margin-bottom: 5px;">${girl.name}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        loadGirls();
    </script>
</body>
</html>
