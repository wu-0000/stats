<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啦啦隊數據統計 - 首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1>啦啦隊數據總覽</h1>
            <div>
                <a href="daily.html" class="btn btn-secondary">📅 每日站位查詢</a>
                <a href="ranking.html" class="btn">🏆 年度排行榜</a>
            </div>
        </div>

        <div id="girl-list" class="grid">
            <p>資料載入中...</p>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        async function loadGirls() {
            try {
                const girlsData = await fetchCSV(CONFIG.girlsUrl);
                const listContainer = document.getElementById('girl-list');
                listContainer.innerHTML = ''; 

                const rakutenGirls = girlsData.filter(g => g.team && g.team.trim() === "樂天");

                if (rakutenGirls.length === 0) {
                    listContainer.innerHTML = '<p>找不到隊伍是「樂天」的女孩資料。</p>';
                    return;
                }

                rakutenGirls.forEach(girl => {
                    const card = document.createElement('div');
                    // 這裡換成 class="card"
                    card.className = 'card';
                    card.style.cursor = 'pointer';
                    card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girl.name)}`;
                    card.innerHTML = `
                        <div style="font-size: 24px; color: #888; margin-bottom: 5px;">${girl.id || "00"}</div>
                        <div style="font-size: 18px; font-weight: bold;">${girl.name}</div>
                    `;
                    listContainer.appendChild(card);
                });
                
            } catch (error) {
                console.error(error);
                document.getElementById('girl-list').innerHTML = '<p style="color:red;">資料連線失敗！</p>';
            }
        }
        loadGirls();
    </script>
</body>
</html>
