<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中華職棒啦啦隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f7; }
        .rakuten-pink { background-color: #bf0845; }
        .pink-gradient { background: linear-gradient(135deg, #bf0845 0%, #e63946 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 4px solid #bf0845; color: #bf0845; font-weight: bold; }
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        
        .number-badge { 
            display: inline-flex; align-items: center; justify-content: center;
            background: #bf0845; color: white; width: 26px; height: 26px;
            border-radius: 50%; font-size: 0.7rem; font-weight: bold;
            margin-right: 6px; flex-shrink: 0;
        }

        .col-name { width: 40%; }
        .col-count { width: 20%; }
        .col-record { width: 20%; }
        .col-rate { width: 20%; }

        @media (max-width: 640px) {
            td, th { padding: 12px 2px !important; font-size: 0.85rem; }
            .col-name { width: 45%; }
            .number-badge { width: 20px; height: 20px; font-size: 0.6rem; margin-right: 4px; }
            .dashboard-text { font-size: 1.2rem !important; }
        }
    </style>
</head>

    <header class="pink-gradient text-white py-6 text-center shadow-lg mb-4">

    <main class="max-w-6xl mx-auto px-2 md:px-4">

        </div>

        <div id="statsSection">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6 text-center px-1">
                <div class="card p-3 border-b-4 border-pink-100">
                    <p class="text-gray-500 text-[10px] md:text-xs">應援場次</p>
                    <p id="totalGames" class="dashboard-text text-xl md:text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="card p-3 border-b-4 border-green-100">
                    <p class="text-gray-500 text-[10px] md:text-xs">團隊勝場</p>
                    <p id="teamWins" class="dashboard-text text-xl md:text-2xl font-bold text-green-500">-</p>
                </div>
                <div class="card p-3 border-b-4 border-red-100">
                    <p class="text-gray-500 text-[10px] md:text-xs">團隊敗場</p>
                    <p id="teamLosses" class="dashboard-text text-xl md:text-2xl font-bold text-red-400">-</p>
                </div>
                <div class="card p-3 border-l-4 border-pink-500">
                    <p class="text-gray-500 text-[10px] md:text-xs">統計期間</p>
                    <p id="currentMonthLabel" class="dashboard-text text-xl md:text-2xl font-bold text-pink-600">-</p>
                </div>
            </div>

            <section class="card overflow-hidden mb-8">
                <div class="overflow-x-auto">
                    <table class="w-full text-left table-fixed">
                        <thead>
                            <tr class="bg-pink-50 text-pink-700 text-xs md:text-sm">
                                <th class="p-3 md:p-4 col-name"># 姓名</th>
                                <th class="p-3 md:p-4 col-count text-center">場次</th>
                                <th class="p-3 md:p-4 col-record text-center">戰績</th>
                                <th class="p-3 md:p-4 col-rate text-center">勝率</th>
                            </tr>
                        </thead>
                        <tbody id="girlTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </section>
        </div>

    </main>

         * 2. 功能邏輯區
         *************************************************/
        let currentTabIdx = 0;

        function render() {
            const tbody = document.getElementById('girlTableBody');
            tbody.innerHTML = '';
            
            if (currentTabIdx === 4) {
                document.getElementById('statsSection').classList.add('hidden');
                document.getElementById('introSection').classList.remove('hidden');
                return;
            }
            document.getElementById('statsSection').classList.remove('hidden');
            document.getElementById('introSection').classList.add('hidden');

            const monthNames = ["三月", "四月", "五月", "總表統計"];
            document.getElementById('currentMonthLabel').innerText = monthNames[currentTabIdx];

            let activeGames = getGamesInPeriod(currentTabIdx);
            const validGames = activeGames.filter(g => g.res !== "延賽" && g.res !== "-");

            document.getElementById('totalGames').innerText = validGames.length;
            document.getElementById('teamWins').innerText = validGames.filter(g => g.res === 'W').length;
            document.getElementById('teamLosses').innerText = validGames.filter(g => g.res === 'L').length;

            girlRoster.forEach(girl => {
                const allDates = attendanceData[girl.name] || [];
                const periodDates = allDates.filter(d => activeGames.some(g => g.date === d));
                
                let w = 0, l = 0, validCount = 0;
                periodDates.forEach(d => {
                    const g = activeGames.find(x => x.date === d);
                    if (g && g.res !== "延賽" && g.res !== "-") {
                        validCount++;
                        if (g.res === 'W') w++;
                        if (g.res === 'L') l++;
                    }
                });

                const rate = validCount > 0 ? ((w / validCount) * 100).toFixed(1) : "0.0";

                const tr = document.createElement('tr');
                tr.className = "hover:bg-pink-50 transition cursor-pointer";
                tr.onclick = () => showDetail(girl.name);
                tr.innerHTML = `
                    <td class="p-4 flex items-center col-name whitespace-nowrap">
                        <span class="number-badge">${girl.id}</span><b class="text-gray-700">${girl.name}</b>
                    </td>
                    <td class="p-4 text-sm text-center col-count text-gray-600">${periodDates.length} 場</td>
                    <td class="p-4 text-sm text-center col-record text-gray-500">${currentTabIdx === 2 ? '-' : w+'W-'+l+'L'}</td>
                    <td class="p-4 font-bold text-center col-rate text-pink-600">${currentTabIdx === 2 ? '-' : rate+'%'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getGamesInPeriod(idx) {
            if (idx === 0) return games.slice(0, 3);
            if (idx === 1) return games.slice(3, 14);
            if (idx === 2) return games.slice(14, 24);
            return games.slice(0, 14); 
        }

        function showDetail(name) {
            const girl = girlRoster.find(g => g.name === name);
            const allDates = attendanceData[name] || [];
            let activeGames = getGamesInPeriod(currentTabIdx);
            const displayDates = allDates.filter(d => activeGames.some(g => g.date === d));

            document.getElementById('modalGirlName').innerText = `${girl.id} ${name}`;
            const content = document.getElementById('modalContent');
            content.innerHTML = '';
            
            displayDates.slice().reverse().forEach(d => {
                const g = games.find(x => x.date === d);
                if (!g) return;
                
                const div = document.createElement('div');
                let color = "border-gray-200", tag = g.res, text = "text-gray-400";
                if (g.res === 'W') { color = "border-green-400"; text = "text-green-500"; }
                else if (g.res === 'L') { color = "border-red-300"; text = "text-red-400"; }
                else if (g.res === '延賽') { color = "border-blue-300"; tag = "⛈️ 延賽"; text = "text-blue-500"; }
                
                div.className = `p-3 bg-white rounded-lg border-l-4 shadow-sm ${color}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <div><p class="text-[10px] text-gray-400">${d}</p><p class="font-bold text-sm">vs ${g.opp}</p></div>
                        <div class="text-right"><p class="text-sm font-bold text-gray-600">${g.score || '-'}</p><p class="text-xs font-bold ${text}">${tag}</p></div>
                    </div>`;

                if (g.info) {
                    const infoBox = document.createElement('div');
                    infoBox.className = "mt-2 p-2 bg-pink-50 rounded text-[11px] text-gray-600 border border-pink-100 space-y-1";
                    infoBox.innerHTML = `
                        <div class="font-bold text-gray-800 border-b border-pink-200 pb-1 mb-1 text-center">場次: ${g.info.no} | ${g.info.location}</div>
                        <div class="flex justify-between">
                            <span>⏱️ 時間: ${g.info.time}</span>
                            <span>👥 觀眾: ${g.info.audience}</span>
                        </div>
                        <div class="flex justify-between">
                            <span>勝投: ${g.info.wp}</span>
                            <span>敗投: ${g.info.lp}</span>
                        </div>
                        <div class="text-pink-600 font-bold text-center border-t border-pink-100 pt-1 mt-1">🏆 MVP: ${g.info.mvp}</div>
                    `;
                    div.appendChild(infoBox);
                }
                content.appendChild(div);
            });
            document.getElementById('girlModal').classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function closeModal() { 
            document.getElementById('girlModal').classList.add('opacity-0', 'pointer-events-none'); 
            document.body.classList.remove('modal-active');
        }
        function switchTab(i) {
            currentTabIdx = i;
            [0,1,2,3,4].forEach(idx => document.getElementById('tab'+idx).classList.remove('tab-active'));
            document.getElementById('tab'+i).classList.add('tab-active');
            render();
        }

        render();
    </script>
</body>
</html>
