<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日站位查詢</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎀 正在為您準備今日班表...</div>
    </div>

    <div class="container">
        <div class="back-btn-container">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header">
            <h1 style="margin: 0; color: var(--theme-main);">📅 每日站位查詢</h1>
        </div>

        <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
            <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 14px;" onclick="changeDay(-1)">◀ 前一天</button>
            <input type="date" id="date-select" style="font-size: 16px; padding: 10px 15px; font-weight: bold; color: var(--theme-main); text-align: center;" onchange="renderDaily()">
            <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 14px;" onclick="changeDay(1)">後一天 ▶</button>
        </div>

        <div id="team-tabs" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; justify-content: center;">
            <button class="btn" onclick="filterTeam('全聯盟')">全聯盟</button>
            <button class="btn btn-secondary" onclick="filterTeam('樂天')">樂天桃猿</button>
            <button class="btn btn-secondary" onclick="filterTeam('中信兄弟')">中信兄弟</button>
            <button class="btn btn-secondary" onclick="filterTeam('味全龍')">味全龍</button>
            <button class="btn btn-secondary" onclick="filterTeam('統一獅')">統一獅</button>
            <button class="btn btn-secondary" onclick="filterTeam('富邦悍將')">富邦悍將</button>
            <button class="btn btn-secondary" onclick="filterTeam('台鋼雄鷹')">台鋼雄鷹</button>
        </div>

        <div class="table-responsive" style="margin-top: 0; box-shadow: 0 4px 15px rgba(255,117,140,0.1);">
            <table style="min-width: 100%;">
                <thead>
                    <tr>
                        <th style="width: 30%;">隊伍</th>
                        <th style="width: 30%;">女孩</th>
                        <th style="width: 40%;">📍 站位</th>
                    </tr>
                </thead>
                <tbody id="daily-list-body">
                    <tr><td colspan="3" style="text-align: center;">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allSchedule = [];
        let allGirls = [];
        let currentTeamFilter = '全聯盟'; 

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initDaily() {
            try {
                const [scheduleData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.girlsUrl)
                ]);
                allSchedule = scheduleData;
                allGirls = girlsData;

                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                document.getElementById('date-select').value = `${yyyy}-${mm}-${dd}`;

                renderDaily();
            } catch (error) {
                console.error(error);
                document.getElementById('daily-list-body').innerHTML = '<tr><td colspan="3" style="color:red;">資料載入失敗</td></tr>';
            } finally { hideLoading(); }
        }

        // ✨ 新增：日期加減計算機
        function changeDay(offset) {
            const dateInput = document.getElementById('date-select');
            if (!dateInput.value) return;

            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + offset); // 加上或減去天數

            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            
            dateInput.value = `${yyyy}-${mm}-${dd}`; // 更新選單畫面
            renderDaily(); // 重新繪製表格
        }

        function filterTeam(teamName) {
            currentTeamFilter = teamName;
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => { tab.className = tab.innerText.includes(teamName) ? 'btn' : 'btn btn-secondary'; });
            renderDaily(); 
        }

        function renderDaily() {
            const selectedDateStr = document.getElementById('date-select').value;
            if (!selectedDateStr) return;

            const dateParts = selectedDateStr.split('-');
            const targetYear = parseInt(dateParts[0], 10); 
            const targetM = parseInt(dateParts[1], 10); 
            const targetD = parseInt(dateParts[2], 10); 

            const tbody = document.getElementById('daily-list-body');
            tbody.innerHTML = '';

            let foundCount = 0;

            allSchedule.forEach(s => {
                if (s.year) {
                    const sYearStr = s.year.toString().trim();
                    if (sYearStr !== '' && parseInt(sYearStr, 10) !== targetYear) return; 
                }

                if (!s.working_dates) return;
                
                const girlName = s.girl_name ? s.girl_name.trim() : "";
                
                const girlInfo = allGirls.find(g => g.name && g.name.trim() === girlName);
                const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team ? s.team.trim() : "");
                
                if (currentTeamFilter !== '全聯盟' && !girlTeam.includes(currentTeamFilter)) return;

                const workDates = parseWorkingDate(s.working_dates);
                const workToday = workDates.find(w => {
                    if (!w.date) return false;
                    const nums = w.date.match(/\d+/g); 
                    if (nums && nums.length >= 2) {
                        return parseInt(nums[0], 10) === targetM && parseInt(nums[1], 10) === targetD;
                    }
                    return false;
                });

                if (workToday) {
                    foundCount++;
                    
                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girlName)}&team=${encodeURIComponent(girlTeam)}`;

                    let teamColor = 'var(--theme-main)';
                    if(girlTeam.includes('兄弟')) teamColor = '#f1c40f'; 
                    else if(girlTeam.includes('味全')) teamColor = '#e74c3c'; 
                    else if(girlTeam.includes('統一')) teamColor = '#e67e22'; 
                    else if(girlTeam.includes('富邦')) teamColor = '#3498db'; 
                    else if(girlTeam.includes('台鋼')) teamColor = '#2ecc71'; 
                    
                    const shortTeam = girlTeam.replace('桃猿','').replace('兄弟','').replace('悍將','').replace('雄鷹','');
                    const teamBadge = `<span style="font-size:13px; color:white; background:${teamColor}; padding:4px 12px; border-radius:12px; font-weight:bold; white-space:nowrap;">${shortTeam}</span>`;

                    const posText = workToday.position || "未指定";
                    const posTag = `<span style="color:var(--theme-main); font-weight:900; font-size:16px; white-space:nowrap;">📍 ${posText}</span>`;

                    tr.innerHTML = `
                        <td>${teamBadge}</td>
                        <td style="font-weight: 900; font-size: 17px; color: var(--text-main); white-space:nowrap;">${girlName}</td>
                        <td>${posTag}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            if (foundCount === 0) {
                const emptyMsg = currentTeamFilter === '全聯盟' 
                    ? '這天沒有女孩排班喔！' 
                    : `這天【${currentTeamFilter}】沒有女孩排班喔！`;
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--text-muted); font-weight: bold; padding: 30px;">${emptyMsg}</td></tr>`;
            }
        }

        initDaily();
    </script>
</body>
</html>
