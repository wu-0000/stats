<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂天女孩 - 每日站位查詢</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 每日站位查詢</h1>
            <a href="index.html" class="btn btn-secondary">返回首頁</a>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <label>年份：</label>
            <select id="year-select" onchange="loadAvailableDates()">
                <option value="2026">2026</option>
            </select>
            &nbsp;&nbsp;
            <label>比賽日期：</label>
            <select id="date-select">
                <option value="">日期載入中...</option>
            </select>
            <button onclick="searchLineup()" class="btn" style="margin-left: 10px;">查詢</button>
        </div>

        <div id="match-summary" class="card" style="display: none; border-left: 5px solid var(--rakuten-red); margin-bottom: 20px;">
        </div>

        <div id="lineup-result" class="grid">
            <p style="grid-column: 1 / -1; text-align: center; color: #888;">請選擇日期並點擊查詢</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allMatchesData = [];

        async function initDateDropdown() {
            try {
                allMatchesData = await fetchCSV(CONFIG.matchesUrl);
                loadAvailableDates();
            } catch (error) {
                console.error("載入失敗", error);
            }
        }

        function loadAvailableDates() {
            const year = document.getElementById('year-select').value;
            const dates = [...new Set(allMatchesData.filter(m => m.year === year && m.date).map(m => m.date.trim()))].sort();
            document.getElementById('date-select').innerHTML = dates.length === 0 ? '<option value="">該年無比賽資料</option>' : dates.map(d => `<option value="${d}">${d}</option>`).join('');
        }

        async function searchLineup() {
            const targetYear = document.getElementById('year-select').value;
            const targetDate = document.getElementById('date-select').value;
            const resultContainer = document.getElementById('lineup-result');
            const matchSummary = document.getElementById('match-summary');

            if (!targetDate) return alert("請選擇有效的日期！");
            resultContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center;">搜尋中...</p>';

            try {
                const scheduleData = await fetchCSV(CONFIG.scheduleUrl);
                const match = allMatchesData.find(m => m.date === targetDate && m.year === targetYear);
                
                if (match) {
                    matchSummary.style.display = 'block';
                    matchSummary.innerHTML = `<strong>🏟️ 賽事：</strong> 樂天 vs ${match.opponent} (${match.result}) | <strong>比分：</strong> ${match.score} | <strong>地點：</strong> ${match.location}`;
                } else {
                    matchSummary.style.display = 'none';
                }

                let dailyStaff = [];
                scheduleData.forEach(girl => {
                    if (girl.year === targetYear && girl.working_dates) {
                        const works = parseWorkingDate(girl.working_dates);
                        const todayWork = works.find(w => w.date === targetDate);
                        if (todayWork) dailyStaff.push({ name: girl.girl_name, position: todayWork.position });
                    }
                });

                resultContainer.innerHTML = '';
                if (dailyStaff.length === 0) {
                    resultContainer.innerHTML = '<p style="grid-column: 1 / -1; text-align: center;">當天目前沒有排班資料</p>';
                } else {
                    dailyStaff.forEach(staff => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.style.display = 'flex';
                        card.style.justifyContent = 'space-between';
                        card.style.alignItems = 'center';
                        card.style.padding = '15px';
                        card.innerHTML = `<span style="font-weight:bold;">${staff.name}</span><span style="background:var(--rakuten-red);color:white;padding:2px 8px;border-radius:4px;font-size:14px;">${staff.position}</span>`;
                        resultContainer.appendChild(card);
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }
        initDateDropdown();
    </script>
</body>
</html>
