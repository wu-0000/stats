<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日站位查詢</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🎀 標題漸層美化 */
        .header h1 {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 📅 日期選擇器精緻化 */
        .date-control-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: var(--card-bg, #fff);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.08);
            border: 1px solid rgba(255, 117, 140, 0.2);
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }
        .date-btn {
            background: rgba(255, 117, 140, 0.1);
            color: var(--theme-main);
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-btn:hover {
            background: var(--theme-main);
            color: white;
            transform: scale(1.05);
        }
        .date-input {
            font-size: 18px;
            padding: 10px 15px;
            font-weight: 900;
            color: var(--theme-main);
            text-align: center;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            outline: none;
            background: transparent;
            font-family: 'Nunito', 'Noto Sans TC';
        }
        .date-input:focus { border-color: #ff758c; }
        [data-theme="dark"] .date-control-container { background: #2a2a2a; border-color: #444; }
        [data-theme="dark"] .date-input { color: #ff9aa2; border-color: #555; }
        [data-theme="dark"] .date-input::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* 💊 果凍感女團分類按鈕 */
        #team-tabs button {
            border-radius: 30px;
            padding: 10px 22px;
            font-size: 15px;
            font-weight: 900;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        #team-tabs button.active-tab {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border-color: #ff758c;
            box-shadow: 0 6px 15px rgba(255, 117, 140, 0.4);
            transform: translateY(-3px);
        }
        #team-tabs button.inactive-tab {
            background: transparent;
            color: var(--text-muted);
            border-color: #ffccd5;
        }
        #team-tabs button.inactive-tab:hover {
            background: rgba(255, 117, 140, 0.08);
            color: var(--theme-main);
            transform: translateY(-2px);
        }
        [data-theme="dark"] #team-tabs button.inactive-tab { border-color: #555; color: #aaa; }
        [data-theme="dark"] #team-tabs button.inactive-tab:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* 🔍 精緻立體搜尋框 */
        .search-container { max-width: 500px; margin: 0 auto 25px auto; }
        .search-input { 
            width: 100%; 
            padding: 15px 25px; 
            border-radius: 40px; 
            border: 2px solid #ffe1e6; 
            font-size: 16px; 
            font-weight: bold;
            color: var(--text-main);
            background: var(--bg-color);
            box-shadow: 0 4px 20px rgba(255, 117, 140, 0.05); 
            outline: none; 
            transition: all 0.3s; 
        }
        .search-input:focus { 
            border-color: #ff758c; 
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.2); 
            transform: translateY(-2px); 
        }
        [data-theme="dark"] .search-input { border-color: #444; }

        /* 🏆 專業數據對齊防護罩 */
        #history-table th, #history-table td {
            white-space: nowrap !important; 
            text-align: center !important;  
            vertical-align: middle !important;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 117, 140, 0.1);
        }
        #history-table th { background-color: rgba(255, 117, 140, 0.05); color: var(--theme-main); font-weight: 900; font-size: 16px; }
        #history-table td { font-size: 16px !important; color: var(--text-main); transition: background 0.2s; }
        #history-table tbody tr:hover td { background-color: rgba(255, 117, 140, 0.03); }
        
        [data-theme="dark"] #history-table th { background-color: #252525; }
        [data-theme="dark"] #history-table td { border-bottom: 1px solid #333; }
        [data-theme="dark"] #history-table tbody tr:hover td { background-color: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎀 正在為您準備今日班表...</div>
    </div>

    <div class="container">
        <div class="back-btn-container" style="margin-bottom: 15px;">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header">
            <h1>📅 每日站位與賽程查詢</h1>
        </div>

        <div class="date-control-container">
            <button class="date-btn" onclick="changeDay(-1)">◀ 前一天</button>
            <input type="date" id="date-select" class="date-input" onchange="renderDaily()">
            <button class="date-btn" onclick="changeDay(1)">後一天 ▶</button>
        </div>

        <div id="team-tabs" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center;">
            <button class="active-tab" data-team="全聯盟" onclick="filterTeam('全聯盟')">All Teams</button>
            <button class="inactive-tab" data-team="樂天" onclick="filterTeam('樂天')">Rakuten Girls</button>
            <button class="inactive-tab" data-team="中信兄弟" onclick="filterTeam('中信兄弟')">Passion Sisters</button>
            <button class="inactive-tab" data-team="味全龍" onclick="filterTeam('味全龍')">Dragon Beauties</button>
            <button class="inactive-tab" data-team="統一獅" onclick="filterTeam('統一獅')">Uni Girls</button>
            <button class="inactive-tab" data-team="富邦悍將" onclick="filterTeam('富邦悍將')">Fubon Angels</button>
            <button class="inactive-tab" data-team="台鋼雄鷹" onclick="filterTeam('台鋼雄鷹')">WING STARS</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="🔍 快速搜尋女孩名字..." onkeyup="searchGirl()">
        </div>

        <div class="table-responsive card" style="margin-top: 0; padding: 0; overflow: hidden; border-radius: 20px;">
            <table id="history-table" style="min-width: 100%;">
                <thead>
                    <tr>
                        <th style="width: 20%;">隊伍</th>
                        <th style="width: 25%;">女孩</th>
                        <th style="width: 30%;">📍 站位</th>
                        <th style="width: 25%;">🏟️ 比賽地點</th>
                    </tr>
                </thead>
                <tbody id="daily-list-body">
                    <tr><td colspan="4" style="text-align: center; padding: 30px;">資料載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allSchedule = [];
        let allGirls = [];
        let allMatches = []; // 新增：用於比對地點
        let currentTeamFilter = '全聯盟'; 
        let currentSearchName = '';

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initDaily() {
            try {
                // 同時載入 班表、女孩名單、比賽結果(地點)
                const [scheduleData, girlsData, matchesData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), 
                    fetchCSV(CONFIG.girlsUrl),
                    fetchCSV(CONFIG.matchesUrl)
                ]);
                allSchedule = scheduleData;
                allGirls = girlsData;
                allMatches = matchesData;

                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                document.getElementById('date-select').value = `${yyyy}-${mm}-${dd}`;

                renderDaily();
            } catch (error) {
                console.error(error);
                document.getElementById('daily-list-body').innerHTML = '<tr><td colspan="4" style="color:red; padding:30px;">資料載入失敗，請確認檔案連結！</td></tr>';
            } finally { hideLoading(); }
        }

        function changeDay(offset) {
            const dateInput = document.getElementById('date-select');
            if (!dateInput.value) return;

            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + offset); 

            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            
            dateInput.value = `${yyyy}-${mm}-${dd}`; 
            renderDaily(); 
        }

        function filterTeam(teamName) {
            currentTeamFilter = teamName;
            
            // 處理標籤的果凍外觀切換
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => {
                if (tab.getAttribute('data-team') === teamName) {
                    tab.className = 'active-tab';
                } else {
                    tab.className = 'inactive-tab';
                }
            });
            renderDaily(); 
        }

        function searchGirl() {
            currentSearchName = document.getElementById('search-input').value.trim().toLowerCase();
            renderDaily();
        }

        function renderDaily() {
            const selectedDateStr = document.getElementById('date-select').value;
            if (!selectedDateStr) return;

            const dateParts = selectedDateStr.split('-');
            const targetYear = parseInt(dateParts[0], 10); 
            const targetM = parseInt(dateParts[1], 10); 
            const targetD = parseInt(dateParts[2], 10); 

            const tbody = document.getElementById('daily-list-body');
            tbody.innerHTML = '';

            let foundCount = 0;

            allSchedule.forEach(s => {
                if (s.year) {
                    const sYearStr = s.year.toString().trim();
                    if (sYearStr !== '' && parseInt(sYearStr, 10) !== targetYear) return; 
                }

                if (!s.working_dates) return;
                
                const girlName = s.girl_name ? s.girl_name.trim() : "";
                
                // 1. 搜尋過濾
                if (currentSearchName !== '' && !girlName.toLowerCase().includes(currentSearchName)) return;

                const girlInfo = allGirls.find(g => g.name && g.name.trim() === girlName);
                const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team ? s.team.trim() : "");
                
                // 2. 隊伍過濾
                if (currentTeamFilter !== '全聯盟' && !girlTeam.includes(currentTeamFilter)) return;

                const workDates = parseWorkingDate(s.working_dates);
                const workToday = workDates.find(w => {
                    if (!w.date) return false;
                    const nums = w.date.match(/\d+/g); 
                    if (nums && nums.length >= 2) {
                        return parseInt(nums[0], 10) === targetM && parseInt(nums[1], 10) === targetD;
                    }
                    return false;
                });

                if (workToday) {
                    foundCount++;
                    
                    const tr = document.createElement('tr');
                    tr.style.cursor = 'pointer';
                    tr.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girlName)}&team=${encodeURIComponent(girlTeam)}`;

                    let teamColor = 'var(--theme-main)';
                    let displayTeam = girlTeam;

                    if (girlTeam.includes('樂天')) { displayTeam = 'Rakuten Girls'; }
                    else if (girlTeam.includes('兄弟')) { teamColor = '#f1c40f'; displayTeam = 'Passion Sisters'; }
                    else if (girlTeam.includes('味全')) { teamColor = '#e74c3c'; displayTeam = 'Dragon Beauties'; }
                    else if (girlTeam.includes('統一')) { teamColor = '#e67e22'; displayTeam = 'Uni Girls'; }
                    else if (girlTeam.includes('富邦')) { teamColor = '#3498db'; displayTeam = 'Fubon Angels'; }
                    else if (girlTeam.includes('台鋼')) { teamColor = '#2ecc71'; displayTeam = 'WING STARS'; }
                    
                    const teamBadge = `<span style="font-size:12px; color:white; background:${teamColor}; padding:6px 14px; border-radius:15px; font-weight:bold; white-space:nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">${displayTeam}</span>`;

                    const posText = workToday.position || "未指定";
                    const posTag = `<span style="color:var(--theme-main); font-weight:900; font-size:16px; white-space:nowrap;">📍 ${posText}</span>`;

                    // 🔍 尋找比賽地點
                    let locationText = `<span style="color:var(--text-muted);">-</span>`;
                    const match = allMatches.find(m => {
                        const mYear = m.year ? m.year.toString().trim() : targetYear.toString();
                        if (mYear !== targetYear.toString()) return false;
                        
                        // 確保球隊對應
                        if (m.team && m.team.trim() !== '' && !girlTeam.includes(m.team.trim()) && !m.team.trim().includes(girlTeam.replace('桃猿','').replace('兄弟','').replace('悍將','').replace('雄鷹',''))) {
                            return false; 
                        }

                        const mNums = m.date ? m.date.match(/\d+/g) : null;
                        return mNums && mNums.length >= 2 && parseInt(mNums[0], 10) === targetM && parseInt(mNums[1], 10) === targetD;
                    });

                    if (match) {
                        const loc = match.location || match['地點'];
                        if (loc && loc.trim() !== '') {
                            locationText = `<span style="font-weight:bold; color:var(--text-main); white-space:nowrap;">🏟️ ${loc.trim()}</span>`;
                        }
                    }

                    tr.innerHTML = `
                        <td>${teamBadge}</td>
                        <td style="font-weight: 900; font-size: 18px; color: var(--text-main); white-space:nowrap;">${girlName}</td>
                        <td>${posTag}</td>
                        <td>${locationText}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            if (foundCount === 0) {
                let emptyMsg = '這天沒有女孩排班喔！';
                if (currentSearchName !== '') {
                    emptyMsg = `找不到名字包含「${currentSearchName}」的班表喔！`;
                } else if (currentTeamFilter !== '全聯盟') {
                    emptyMsg = `這天【${currentTeamFilter}】沒有女孩排班喔！`;
                }
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); font-weight: bold; padding: 40px; font-size:16px;">${emptyMsg}</td></tr>`;
            }
        }

        initDaily();
    </script>
</body>
</html>
