<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日站位查詢</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎀 正在為您準備今日班表...</div>
    </div>

    <div class="container">
        <div class="back-btn-container">
            <a href="index.html" class="btn btn-secondary">◀ 返回首頁</a>
        </div>

        <div class="header">
            <h1 style="margin: 0; color: var(--theme-main);">📅 每日站位查詢</h1>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <input type="date" id="date-select" style="font-size: 16px; padding: 12px 20px; font-weight: bold; color: var(--theme-main);" onchange="renderDaily()">
        </div>

        <div id="team-tabs" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center;">
            <button class="btn" onclick="filterTeam('全聯盟')">全聯盟</button>
            <button class="btn btn-secondary" onclick="filterTeam('樂天')">樂天桃猿</button>
            <button class="btn btn-secondary" onclick="filterTeam('中信兄弟')">中信兄弟</button>
            <button class="btn btn-secondary" onclick="filterTeam('味全龍')">味全龍</button>
            <button class="btn btn-secondary" onclick="filterTeam('統一獅')">統一獅</button>
            <button class="btn btn-secondary" onclick="filterTeam('富邦悍將')">富邦悍將</button>
            <button class="btn btn-secondary" onclick="filterTeam('台鋼雄鷹')">台鋼雄鷹</button>
        </div>

        <div id="daily-list" class="grid">
            <p style="grid-column: 1 / -1; text-align: center;">資料載入中...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allSchedule = [];
        let allGirls = [];
        let currentTeamFilter = '全聯盟'; // 預設顯示全部

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        }

        async function initDaily() {
            try {
                const [scheduleData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl),
                    fetchCSV(CONFIG.girlsUrl)
                ]);
                allSchedule = scheduleData;
                allGirls = girlsData;

                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                document.getElementById('date-select').value = `${yyyy}-${mm}-${dd}`;

                renderDaily();
            } catch (error) {
                console.error(error);
                document.getElementById('daily-list').innerHTML = '<p style="color:red; text-align:center;">資料載入失敗</p>';
            } finally {
                hideLoading();
            }
        }

        // 🏆 新增：切換球隊的功能
        function filterTeam(teamName) {
            currentTeamFilter = teamName;
            
            // 讓點擊的按鈕亮起來，其他變暗
            const tabs = document.querySelectorAll('#team-tabs button');
            tabs.forEach(tab => {
                tab.className = tab.innerText.includes(teamName) ? 'btn' : 'btn btn-secondary';
            });

            renderDaily(); // 重新繪製畫面
        }

function renderDaily() {
            const selectedDateStr = document.getElementById('date-select').value;
            if (!selectedDateStr) return;

            // 1. 精準拆解使用者選的年、月、日
            const dateParts = selectedDateStr.split('-');
            const targetYear = parseInt(dateParts[0], 10); 
            const targetM = parseInt(dateParts[1], 10); 
            const targetD = parseInt(dateParts[2], 10); 

            const listContainer = document.getElementById('daily-list');
            listContainer.innerHTML = '';

            let foundCount = 0;

            allSchedule.forEach(s => {
                // 🛡️ 檢查年份
                if (s.year) {
                    const sYearStr = s.year.toString().trim();
                    if (sYearStr !== '') {
                        const sYearNum = parseInt(sYearStr, 10);
                        if (sYearNum !== targetYear) return; 
                    }
                }

                if (!s.working_dates) return;
                
                const girlTeam = s.team ? s.team.trim() : "";
                
                // 🛡️ 隊伍過濾
                if (currentTeamFilter !== '全聯盟' && !girlTeam.includes(currentTeamFilter)) return;

                const workDates = parseWorkingDate(s.working_dates);
                
                // 🛡️ 數字吸塵器（精準抓日期）
                const workToday = workDates.find(w => {
                    if (!w.date) return false;
                    const nums = w.date.match(/\d+/g); 
                    if (nums && nums.length >= 2) {
                        const m = parseInt(nums[0], 10);
                        const d = parseInt(nums[1], 10);
                        return m === targetM && d === targetD;
                    }
                    return false;
                });

                // 如果今天有排班，就畫出「站位票根卡片」
                if (workToday) {
                    foundCount++;
                    const girlName = s.girl_name ? s.girl_name.trim() : "";
                    const girlInfo = allGirls.find(g => g.name && g.name.trim() === girlName && g.team && g.team.trim() === girlTeam);
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.cursor = 'pointer';
                    // 讓整張卡片的內容置中
                    card.style.display = 'flex';
                    card.style.flexDirection = 'column';
                    card.style.alignItems = 'center';
                    card.onclick = () => window.location.href = `detail.html?name=${encodeURIComponent(girlName)}&team=${encodeURIComponent(girlTeam)}`;

                    // 📱 IG 按鈕 (如果有的話)
                    let igHtml = '';
                    if (girlInfo && girlInfo.ig && girlInfo.ig.trim() !== '') {
                        let igLink = girlInfo.ig.trim().startsWith('http') ? girlInfo.ig.trim() : `https://www.instagram.com/${girlInfo.ig.trim()}/`;
                        igHtml = `<a href="${igLink}" target="_blank" onclick="event.stopPropagation()" class="ig-btn" style="margin-top:auto;"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.07M12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>Instagram</a>`;
                    }

                    // 🏷️ 球隊標籤顏色
                    let teamColor = 'var(--theme-main)';
                    if(girlTeam.includes('兄弟')) teamColor = '#f1c40f'; 
                    else if(girlTeam.includes('味全')) teamColor = '#e74c3c'; 
                    else if(girlTeam.includes('統一')) teamColor = '#e67e22'; 
                    else if(girlTeam.includes('富邦')) teamColor = '#3498db'; 
                    else if(girlTeam.includes('台鋼')) teamColor = '#2ecc71'; 
                    
                    const teamBadge = `<div style="font-size:12px; color:white; background:${teamColor}; padding:4px 10px; border-radius:12px; margin-bottom:8px; font-weight:bold;">${girlTeam}</div>`;

                    // ✨ 究極放大版：站位專屬票根設計
                    const positionTicket = `
                        <div style="width: 100%; background: var(--theme-light); border: 2px dashed var(--theme-main); padding: 15px 5px; border-radius: 16px; margin: 12px 0; box-sizing: border-box;">
                            <div style="font-size: 13px; color: var(--theme-main); font-weight: bold; margin-bottom: 5px;">📍 今日專屬站位</div>
                            <div style="font-size: 26px; font-weight: 900; color: var(--theme-main); letter-spacing: 1px; line-height: 1.2;">
                                ${workToday.position || "未指定"}
                            </div>
                        </div>
                    `;

                    // 組合卡片 (拿掉大頭貼)
                    card.innerHTML = `
                        ${teamBadge}
                        <div style="font-size: 22px; font-weight: 900; color: var(--text-main); margin-top: 5px;">${girlName}</div>
                        ${positionTicket}
                        ${igHtml}
                    `;
                    listContainer.appendChild(card);
                }
            });

            // 找不到資料的提示
            if (foundCount === 0) {
                const emptyMsg = currentTeamFilter === '全聯盟' 
                    ? '這天沒有女孩排班喔！去別天看看吧🔍' 
                    : `這天【${currentTeamFilter}】沒有女孩排班喔！去別天看看吧🔍`;
                listContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); margin-top: 20px; font-weight: bold; font-size: 16px;">${emptyMsg}</p>`;
            }
        }
        initDaily();
    </script>
</body>
</html>
