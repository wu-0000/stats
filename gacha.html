<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 女神盲盒抽卡機</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🔥 核心修復：強制所有元素不要因為 padding 或 border 而撐破比例 */
        * { box-sizing: border-box; }
        
        body { background: #1a1a1a; color: white; min-height: 100vh; overflow-x: hidden; margin: 0; }
        .header h1 {
            background: linear-gradient(135deg, #FFD700 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 2.5rem;
            margin-top: 20px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* 🎰 抽卡舞台區域 */
        .gacha-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            min-height: 480px;
            perspective: 1000px; /* 3D 景深 */
        }

        /* 🎴 卡片容器 (負責 3D 翻轉，鎖定絕對長寬) */
        .card-container {
            width: 280px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .card-container.flipped { transform: rotateY(180deg) scale(1.05); }
        .card-container.shaking { animation: shake 0.5s ease-in-out infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        /* 卡片正反面共用設定 */
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            /* 注意：這裡把原本的 overflow: hidden 拿掉，才不會切到凸出去的稀有度徽章 */
        }

        /* 🃏 卡背 (未抽卡的狀態) */
        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a1a 100%);
            border: 4px solid #f39c12;
            color: #f39c12;
            font-size: 60px;
            overflow: hidden; /* 卡背的問號還是需要 hidden 防溢出 */
        }
        .card-back::after {
            content: '?'; font-weight: 900;
            background: -webkit-linear-gradient(#f1c40f, #e67e22);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        /* 👸 卡片正面 (抽出來的女神) */
        .card-front {
            background: #fff;
            transform: rotateY(180deg);
            border: 6px solid #ccc; /* 邊框厚度現在會被往內縮，不會撐爆卡片 */
            padding: 20px 15px; /* 內部留白 */
            justify-content: flex-start; /* 讓內容由上往下排 */
        }

        .gacha-photo {
            width: 100%; height: 180px; /* 微調高度給名字跟按鈕空間 */
            object-fit: cover;
            border-radius: 12px; 
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .gacha-name { font-size: 22px; font-weight: 900; color: #333; margin-bottom: 5px; }
        .gacha-team { font-size: 13px; color: white; padding: 4px 12px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; display: inline-block;}
        .gacha-stats { font-size: 13px; color: #666; font-weight: bold; background: #f8f9fa; padding: 8px; border-radius: 10px; width: 100%; margin-bottom: 10px;}

        /* 🔥 稀有度專屬樣式 (凸出卡片右上角) */
        .rarity-badge {
            position: absolute; top: -15px; right: -15px;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }

        /* UR (極限彩光) */
        .card-UR { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff, inset 0 0 20px rgba(255,0,255,0.2); animation: ur-glow 2s infinite; }
        .badge-UR { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); background-size: 400% 400%; animation: rainbow 3s ease infinite; }
        
        /* SSR (閃光金) */
        .card-SSR { border-color: #FFD700; box-shadow: 0 0 25px #FFD700; }
        .badge-SSR { background: linear-gradient(135deg, #FFD700 0%, #F39C12 100%); }
        
        /* SR (史詩紫) */
        .card-SR { border-color: #9b59b6; box-shadow: 0 0 15px #9b59b6; }
        .badge-SR { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); }
        
        /* R (稀有藍) */
        .card-R { border-color: #3498db; }
        .badge-R { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }

        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes ur-glow { 0% { box-shadow: 0 0 20px #ff00ff; } 50% { box-shadow: 0 0 40px #00ffff; } 100% { box-shadow: 0 0 20px #ff00ff; } }

        /* 🔘 抽卡按鈕 */
        .draw-btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; font-size: 20px; font-weight: 900;
            padding: 15px 40px; border: none; border-radius: 40px;
            cursor: pointer; margin-top: 40px;
            box-shadow: 0 8px 25px rgba(255, 117, 140, 0.4);
            transition: all 0.2s;
        }
        .draw-btn:hover { transform: scale(1.05); box-shadow: 0 12px 35px rgba(255, 117, 140, 0.6); }
        .draw-btn:active { transform: scale(0.95); }
        .draw-btn:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">🎲 正在準備抽卡卡池...</div>
    </div>

    <div class="container" style="text-align: center;">
        <div class="back-btn-container" style="margin-bottom: 10px; text-align: left;">
            <a href="index.html" class="btn" style="background: rgba(255,255,255,0.15); color:white; border:none; backdrop-filter: blur(5px);">◀ 返回首頁</a>
        </div>

        <div class="header">
            <h1>🎁 女神盲盒抽卡機</h1>
            <p style="color: #aaa; font-weight: bold; font-size: 15px; margin-top:0;">誰會是你今天的幸運女神？測試你的手氣吧！</p>
        </div>

        <div class="gacha-stage">
            <div class="card-container" id="gacha-card">
                <div class="card-face card-back"></div>
                <div class="card-face card-front" id="card-front-content">
                    </div>
            </div>
            
            <button class="draw-btn" id="draw-button" onclick="startGacha()">✨ 點擊抽卡 ✨</button>
        </div>

        <div style="margin-top: 25px; font-size: 13px; color: #888; font-weight: bold;">
            👑 卡池機率：UR 5% | SSR 15% | SR 30% | R 50%
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let poolUR = [], poolSSR = [], poolSR = [], poolR = [];
        
        const teamNamesMap = {
            '樂天': 'Rakuten Girls', '中信兄弟': 'Passion Sisters', '味全龍': 'Dragon Beauties',
            '統一獅': 'Uni Girls', '富邦悍將': 'Fubon Angels', '台鋼雄鷹': 'WING STARS'
        };
        const teamColorsMap = {
            '樂天': '#dc2743', '中信兄弟': '#f1c40f', '味全龍': '#e74c3c',
            '統一獅': '#e67e22', '富邦悍將': '#3498db', '台鋼雄鷹': '#2ecc71'
        };

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if(overlay) { overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500); }
        }

        async function initGachaPool() {
            try {
                const [scheduleData, matchesData, girlsData] = await Promise.all([
                    fetchCSV(CONFIG.scheduleUrl), fetchCSV(CONFIG.matchesUrl), fetchCSV(CONFIG.girlsUrl)
                ]);

                // 計算每位女孩的戰力
                let girlStats = {};
                girlsData.forEach(g => {
                    const key = g.name.trim() + "_" + g.team.trim();
                    girlStats[key] = { ...g, name: g.name.trim(), team: g.team.trim(), wins: 0, losses: 0, games: 0 };
                });

                scheduleData.forEach(s => {
                    if(!s.working_dates) return;
                    const girlName = (s.girl_name || '').trim();
                    const girlInfo = girlsData.find(g => g.name && g.name.trim() === girlName);
                    const girlTeam = (girlInfo && girlInfo.team) ? girlInfo.team.trim() : (s.team || '').trim();
                    const key = girlName + "_" + girlTeam;
                    if(!girlStats[key]) return; 

                    parseWorkingDate(s.working_dates).forEach(w => {
                        girlStats[key].games++;
                        const wNums = w.date ? w.date.match(/\d+/g) : null;
                        if (!wNums || wNums.length < 2) return;
                        
                        const match = matchesData.find(m => {
                            const mNums = m.date ? m.date.match(/\d+/g) : null;
                            return mNums && mNums.length >= 2 && parseInt(mNums[0],10) === parseInt(wNums[0],10) && parseInt(mNums[1],10) === parseInt(wNums[1],10) && (!m.team || m.team.trim() === girlTeam);
                        });

                        if(match && match.result) {
                            if(match.result.includes('勝')) girlStats[key].wins++;
                            else if(match.result.includes('敗')) girlStats[key].losses++;
                        }
                    });
                });

                // 自動將女孩分配到對應的卡池
                Object.values(girlStats).forEach(g => {
                    const winRate = (g.wins + g.losses) > 0 ? (g.wins / (g.wins + g.losses)) * 100 : 0;
                    g.winRateDisplay = winRate.toFixed(1);
                    
                    if (winRate >= 60 && g.games >= 10) { g.rarity = 'UR'; poolUR.push(g); }
                    else if ((winRate >= 50 && g.games >= 5) || g.games >= 15) { g.rarity = 'SSR'; poolSSR.push(g); }
                    else if (g.games >= 5 || winRate >= 40) { g.rarity = 'SR'; poolSR.push(g); }
                    else { g.rarity = 'R'; poolR.push(g); }
                });

                if(poolUR.length === 0) poolUR = [...poolSSR, ...poolSR];
                if(poolSSR.length === 0) poolSSR = [...poolSR, ...poolR];

            } catch (error) {
                console.error("卡池初始化失敗", error);
                alert("卡池連線失敗，請重新整理頁面！");
            } finally { hideLoading(); }
        }

        function startGacha() {
            const btn = document.getElementById('draw-button');
            const card = document.getElementById('gacha-card');
            
            btn.disabled = true;
            btn.innerText = "抽卡中...";
            card.className = "card-container"; // 重置翻轉
            
            setTimeout(() => { card.classList.add('shaking'); }, 100);

            setTimeout(() => {
                card.classList.remove('shaking');
                
                const roll = Math.random() * 100;
                let drawnGirl = null;
                
                if (roll < 5) drawnGirl = poolUR[Math.floor(Math.random() * poolUR.length)];
                else if (roll < 20) drawnGirl = poolSSR[Math.floor(Math.random() * poolSSR.length)];
                else if (roll < 50) drawnGirl = poolSR[Math.floor(Math.random() * poolSR.length)];
                else drawnGirl = poolR[Math.floor(Math.random() * poolR.length)];

                if(!drawnGirl) drawnGirl = poolR[0];

                renderCard(drawnGirl);

                card.classList.add('flipped');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "再抽一次 🔄";
                }, 800);

            }, 1200); 
        }

        function renderCard(girl) {
            const front = document.getElementById('card-front-content');
            
            let displayTeam = girl.team;
            let tColor = '#333';
            Object.keys(teamNamesMap).forEach(k => { if(girl.team.includes(k)) displayTeam = teamNamesMap[k]; });
            Object.keys(teamColorsMap).forEach(k => { if(girl.team.includes(k)) tColor = teamColorsMap[k]; });

            const photoUrl = girl.photo || girl['圖片'] || girl['image'] || girl.photo_url || '';
            const photoHtml = photoUrl ? `<img src="${photoUrl}" class="gacha-photo">` : `<div class="gacha-photo" style="background:#eee;display:flex;align-items:center;justify-content:center;font-size:40px;">👱‍♀️</div>`;

            front.className = `card-face card-front card-${girl.rarity}`;

            front.innerHTML = `
                <div class="rarity-badge badge-${girl.rarity}">${girl.rarity}</div>
                ${photoHtml}
                <div class="gacha-team" style="background:${tColor}">${displayTeam}</div>
                <div class="gacha-name">${girl.name}</div>
                <div class="gacha-stats">
                    出勤：${girl.games} 場 &nbsp;|&nbsp; 勝率：${girl.winRateDisplay}%
                </div>
                <button onclick="window.location.href='detail.html?name=${encodeURIComponent(girl.name)}&team=${encodeURIComponent(girl.team)}'" style="margin-top:auto; padding:8px 20px; font-weight:bold; border-radius:15px; background:#333; color:white; border:none; cursor:pointer; width:100%; transition: background 0.2s;">情報 🔍</button>
            `;
        }

        initGachaPool();
    </script>
</body>
</html>
